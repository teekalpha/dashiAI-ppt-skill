<script>
/* =============== Preview Undo =============== */
(function(){
  const stack = [];
  let applying = false;
  window.__dashiUndo = {
    get applying(){ return applying; },
    push(action){
      if(applying || !action || typeof action.undo !== 'function') return;
      stack.push(action);
      if(stack.length > 80) stack.shift();
    },
    undo(){
      const action = stack.pop();
      if(!action) return false;
      applying = true;
      try { action.undo(); }
      finally { applying = false; }
      return true;
    }
  };
  addEventListener('keydown', event => {
    const key = String(event.key || '').toLowerCase();
    if(key !== 'z' || !(event.metaKey || event.ctrlKey) || event.shiftKey || event.altKey) return;
    if(isDeckTypingTarget(event.target)) return;
    if(window.__dashiUndo.undo()){
      event.preventDefault();
      event.stopImmediatePropagation();
    }
  }, true);
})();
</script>
<script>
/* =============== Preview Controller =============== */
(function(){
  const optionsEl = document.getElementById('preview-options');
  const panel = document.getElementById('preview-panel');
  const toggle = document.getElementById('preview-toggle');
  const close = document.getElementById('preview-close');
  if(!optionsEl || !panel || !toggle) return;

  let options = {};
  try {
    options = JSON.parse(optionsEl.textContent || '{}');
  } catch (err) {
    console.warn('[preview] invalid options', err);
  }

  const STORE = 'dashi-ppt-preview';
  const viewModel = window.__deckViewModel;
  let deckSlides = [...document.querySelectorAll('#deck > .slide')];
  const propsField = document.getElementById('preview-props-field');
  const propsPanel = document.getElementById('preview-props');
  const themePackField = document.getElementById('preview-theme-field');
  const themePackSelect = document.getElementById('preview-theme-pack');
  const transitionSelect = document.getElementById('preview-transition');

  const saved = readSaved();
  const transitionModes = ['none', 'liquidMorph'];
  const themePacks = options.themePacks || {};
  const initialThemePack = normalizeThemePack(saved.themePack)
    || normalizeThemePack(options.current?.themePack)
    || normalizeThemePack(document.documentElement.dataset.themePack)
    || '';
  const state = {
    themePack: initialThemePack,
    pageTransition: transitionModes.includes(saved.pageTransition)
      ? saved.pageTransition
      : (transitionModes.includes(options.current?.pageTransition) ? options.current.pageTransition : 'liquidMorph'),
  };
  window.__getPreviewState = () => ({...state});

  const count = document.getElementById('preview-slide-count');
  renderThemePackControl();
  refreshDeckSlides();
  window.__setActiveThemePack?.(state.themePack || document.documentElement.dataset.themePack || 'theme3', {navigate:false});
  refreshDeckSlides();
  syncTransitionControl();
  applyStoredSlideControls();
  renderPropControls();

  function readSaved(){
    try {
      return JSON.parse(localStorage.getItem(window.__previewStoreKey?.() || STORE) || '{}');
    } catch {
      return {};
    }
  }

  function writeSaved(){
    localStorage.setItem(window.__previewStoreKey?.() || STORE, JSON.stringify(state));
  }

  function refreshDeckSlides(){
    deckSlides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    if(count) count.textContent = `${Math.min(deckSlides.length, Math.max(1, (window.__currentSlideIndex || 0) + 1))}/${deckSlides.length}页`;
  }

  function renderThemePackControl(){
    if(!themePackField || !themePackSelect) return;
    const entries = Object.entries(themePacks);
    if(!entries.length){
      themePackField.classList.add('is-hidden');
      return;
    }
    const counts = countSlidesByThemePack();
    themePackSelect.innerHTML = '';
    entries.forEach(([key, option]) => {
      const optionEl = document.createElement('option');
      const slideCount = counts[key] || 0;
      optionEl.value = key;
      optionEl.textContent = option.label || key;
      optionEl.disabled = slideCount === 0;
      themePackSelect.appendChild(optionEl);
    });
    const nextThemePack = counts[state.themePack] ? state.themePack : entries.find(([key]) => counts[key])?.[0] || state.themePack;
    if(nextThemePack) state.themePack = nextThemePack;
    themePackSelect.value = state.themePack;
    themePackField.classList.remove('is-hidden');
  }

  function countSlidesByThemePack(){
    return [...document.querySelectorAll('#deck > .slide')].reduce((acc, slide) => {
      const key = slide.dataset.themePack || '';
      if(key) acc[key] = (acc[key] || 0) + 1;
      return acc;
    }, {});
  }

  function normalizeThemePack(value){
    if(!value || !themePacks[value]) return '';
    return value;
  }

  transitionSelect?.addEventListener('change', () => {
    state.pageTransition = transitionSelect.value || 'liquidMorph';
    window.__setPageTransition?.(state.pageTransition);
    transitionSelect.blur();
    writeSaved();
  });

  themePackSelect?.addEventListener('change', () => {
    if(!themePackSelect.value || themePackSelect.selectedOptions[0]?.disabled) return;
    state.themePack = themePackSelect.value;
    window.__setActiveThemePack?.(state.themePack);
    refreshDeckSlides();
    applyStoredSlideControls();
    renderPropControls();
    writeSaved();
  });

  addEventListener('swiss-slide-change', refreshSlideControls);
  addEventListener('swiss-slide-reorder', refreshSlideControls);

  function refreshSlideControls(){
    refreshDeckSlides();
    renderPropControls();
  }

  function syncTransitionControl(){
    if(transitionSelect) transitionSelect.value = state.pageTransition || 'liquidMorph';
    window.__setPageTransition?.(state.pageTransition || 'liquidMorph');
  }

  function applyStoredSlideControls(){
    const vmState = viewModel?.getState?.() || {};
    const slide = getCurrentSlide();
    if(slide) applyPropValues(slide, getSlidePropValues(slide, vmState), {persist:false});
  }

  function getCurrentPropRoot(){
    return getCurrentSlide()?.querySelector('[data-prop-controls]') || null;
  }

  function parsePropControls(root){
    try {
      return JSON.parse(root?.dataset.propControls || '[]') || [];
    } catch {
      return [];
    }
  }

  function parsePropDefaults(root){
    try {
      return JSON.parse(root?.dataset.propDefaults || '{}') || {};
    } catch {
      return {};
    }
  }

  function getSlidePropValues(slide, vmState = viewModel?.getState?.() || {}){
    const root = slide?.querySelector('[data-prop-controls]');
    if(!root) return {};
    const controls = parsePropControls(root).filter(control => !isHiddenPropControl(control));
    const defaults = parsePropDefaults(root);
    const sourceProps = getSlideSourceProps(slide);
    const savedProps = vmState.props?.[slide.dataset.vmSlideId] || {};
    const values = {...defaults, ...sourceProps, ...savedProps};
    controls.forEach(control => {
      values[control.key] = coercePropValue(control, values[control.key]);
    });
    return values;
  }

  function getSlideSourceProps(slide){
    const slideId = slide?.dataset.vmSlideId;
    if(!slideId) return {};
    return viewModel?.model?.slides?.find(item => item.id === slideId)?.props || {};
  }

  function renderPropControls(){
    if(!propsField || !propsPanel) return;
    const root = getCurrentPropRoot();
    const controls = parsePropControls(root);
    if(!root || !controls.length){
      propsField.classList.add('is-hidden');
      propsPanel.innerHTML = '';
      return;
    }
    const slide = getCurrentSlide();
    const values = getSlidePropValues(slide);
    propsField.classList.remove('is-hidden');
    propsPanel.innerHTML = '';
    controls.forEach(control => {
      if(!shouldRenderPropControl(control, values)) return;
      const row = document.createElement('div');
      row.className = 'preview-prop-row';
      const controlType = normalizePropControlType(control.type);
      const isColor = control.display === 'color';
      const label = document.createElement('span');
      label.innerHTML = propTypeIcon(controlType, isColor);
      label.appendChild(document.createTextNode(control.label || control.key));
      row.appendChild(label);
      if(controlType === 'toggle'){
        const sw = document.createElement('label');
        sw.className = 'pp-switch';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = !!values[control.key];
        input.addEventListener('change', () => updateCurrentProp(control, input.checked));
        const track = document.createElement('span'); track.className = 'pp-track';
        const knob = document.createElement('span'); knob.className = 'pp-knob';
        sw.appendChild(input); sw.appendChild(track); sw.appendChild(knob);
        row.appendChild(sw);
      } else if(controlType === 'selection'){
        row.classList.add('is-choice');
        const group = document.createElement('div');
        group.className = 'preview-prop-choice-group' + (isColor ? ' is-color' : '');
        group.setAttribute('role', 'group');
        group.setAttribute('aria-label', control.label || control.key);
        normalizePropOptions(control.options).forEach(item => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'preview-prop-choice';
          button.dataset.propValue = String(item.value);
          button.textContent = item.label;
          if(isColor){
            button.textContent = '';
            button.style.background = item.value;
            button.title = item.label;
            button.setAttribute('aria-label', item.label);
          }
          button.addEventListener('click', () => {
            updateCurrentProp(control, item.value);
            syncSelectionButtons(group, item.value);
          });
          group.appendChild(button);
        });
        syncSelectionButtons(group, values[control.key]);
        row.appendChild(group);
      } else if(controlType === 'icons'){
        row.classList.add('is-icons');
        const group = document.createElement('div');
        group.className = 'preview-prop-icon-grid';
        group.setAttribute('role', 'group');
        group.setAttribute('aria-label', control.label || control.key);
        [{value:'', label:'无'}, ...normalizePropOptions(control.options)].forEach(item => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'preview-prop-icon-choice';
          button.dataset.propValue = String(item.value ?? '');
          button.title = item.label;
          button.setAttribute('aria-label', item.label);
          if(item.image){
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = '';
            button.appendChild(img);
          } else {
            const empty = document.createElement('span');
            empty.className = 'preview-prop-icon-empty';
            empty.textContent = '无';
            button.appendChild(empty);
          }
          const text = document.createElement('span');
          text.textContent = item.label;
          button.appendChild(text);
          button.addEventListener('click', () => {
            const nextValue = item.value || null;
            updateCurrentProp(control, nextValue, {
              extra: control.key === 'decorSrc' && nextValue ? {showDecor: true} : {},
            });
            syncIconButtons(group, nextValue);
          });
          group.appendChild(button);
        });
        syncIconButtons(group, values[control.key]);
        row.appendChild(group);
      } else if(controlType === 'text' || controlType === 'textarea'){
        if(controlType === 'textarea') row.classList.add('is-textarea');
        const input = document.createElement(controlType === 'textarea' ? 'textarea' : 'input');
        input.className = controlType === 'textarea' ? 'pp-textarea' : 'pp-text';
        if(controlType === 'text') input.type = 'text';
        input.spellcheck = false;
        input.value = values[control.key] ?? control.default ?? '';
        input.placeholder = control.placeholder || control.label || control.key;
        input.addEventListener('input', () => updateCurrentProp(control, input.value, {render:false}));
        input.addEventListener('change', () => updateCurrentProp(control, input.value));
        row.appendChild(input);
      } else if(controlType === 'image'){
        const wrap = document.createElement('div');
        wrap.className = 'pp-image';
        const preview = document.createElement('button');
        preview.type = 'button';
        preview.className = 'pp-image-preview';
        const current = values[control.key] ?? control.default ?? '';
        if(current){
          preview.classList.add('has-image');
          const img = document.createElement('img');
          img.src = current;
          img.alt = '';
          preview.appendChild(img);
        }
        const input = document.createElement('input');
        input.className = 'pp-image-file';
        input.type = 'file';
        input.accept = 'image/*';
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'pp-image-btn';
        button.textContent = current ? '替换图片' : '选择图片';
        const openPicker = event => {
          event.preventDefault();
          event.stopPropagation();
          input.click();
        };
        preview.addEventListener('click', openPicker);
        button.addEventListener('click', openPicker);
        input.addEventListener('click', event => event.stopPropagation());
        input.addEventListener('change', () => {
          const file = input.files && input.files[0];
          if(!file || !file.type.startsWith('image/')) return;
          const reader = new FileReader();
          reader.onload = () => updateCurrentProp(control, reader.result, {extra: {showDecor: true}});
          reader.readAsDataURL(file);
          input.value = '';
        });
        wrap.appendChild(preview);
        wrap.appendChild(button);
        wrap.appendChild(input);
        row.appendChild(wrap);
      } else if(controlType === 'list'){
        row.classList.add('is-json');
        const textarea = document.createElement('textarea');
        textarea.className = 'pp-json';
        textarea.spellcheck = false;
        textarea.value = JSON.stringify(values[control.key] ?? control.default ?? [], null, 2);
        textarea.addEventListener('change', () => {
          try {
            updateCurrentProp(control, JSON.parse(textarea.value));
            textarea.classList.remove('is-invalid');
          } catch {
            textarea.classList.add('is-invalid');
          }
        });
        row.appendChild(textarea);
      } else {
        const min = Number(control.min ?? 0), max = Number(control.max ?? 10), step = Number(control.step ?? 1);
        const span = (max - min) / (step || 1);
        const stepped = Number.isInteger(step) && step >= 1 && Number.isInteger(min) && Number.isInteger(max) && span <= 12;
        const wrap = document.createElement('div');
        wrap.className = 'pp-slider ' + (stepped ? 'is-stepped' : 'is-smooth');
        const track = document.createElement('div');
        track.className = 'pp-slider-track';
        const input = document.createElement('input');
        input.type = 'range';
        input.min = min; input.max = max; input.step = step;
        input.value = values[control.key];
        track.appendChild(input);
        let ticks = null;
        if(stepped){
          ticks = document.createElement('div');
          ticks.className = 'pp-ticks';
          for(let i = 0; i <= span; i++) ticks.appendChild(document.createElement('span'));
          track.appendChild(ticks);
        }
        const output = document.createElement('output');
        const unit = control.unit || '';
        const sync = () => {
          const v = Number(input.value);
          track.style.setProperty('--pp-pct', (max > min ? (v - min) / (max - min) * 100 : 0) + '%');
          output.textContent = v + unit;
          if(ticks) ticks.querySelectorAll('span').forEach((t, i) => t.classList.toggle('on', i <= (v - min) / step));
        };
        sync();
        input.addEventListener('input', () => { sync(); updateCurrentProp(control, Number(input.value), {render:false}); });
        input.addEventListener('change', () => updateCurrentProp(control, Number(input.value)));
        wrap.appendChild(track);
        wrap.appendChild(output);
        row.appendChild(wrap);
      }
      propsPanel.appendChild(row);
    });
    applyPropValues(slide, values, {persist:false});
  }

  function normalizePropControlType(type){
    if(type === 'select' || type === 'selection' || type === 'segment' || type === 'color') return 'selection';
    if(type === 'icons') return 'icons';
    if(type === 'text' || type === 'string' || type === 'input' || type === 'url' || type === 'email') return 'text';
    if(type === 'textarea' || type === 'multiline') return 'textarea';
    if(type === 'image' || type === 'media' || type === 'picture') return 'image';
    if(type === 'list' || type === 'array' || type === 'object') return 'list';
    return type || 'range';
  }

  function isHiddenPropControl(control){
    const type = normalizePropControlType(control?.type);
    return type === 'text' || type === 'textarea';
  }

  function shouldRenderPropControl(control, values){
    if(control.dependsOn && !values[control.dependsOn]) return false;
    if(control.countKey && control.countIndex !== undefined){
      const count = Number(values[control.countKey]);
      const index = Number(control.countIndex);
      if(Number.isFinite(count) && Number.isFinite(index) && index >= count) return false;
    }
    return true;
  }

  function propTypeIcon(controlType, isColor){
    const a = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">';
    if(controlType === 'toggle') return a + '<rect x="2.5" y="7" width="19" height="10" rx="5"/><circle cx="16" cy="12" r="2.6" fill="currentColor" stroke="none"/></svg>';
    if(controlType === 'selection') return isColor
      ? a + '<path d="M12 3c-3.6 3.2-6 6.3-6 9a6 6 0 0 0 12 0c0-2.7-2.4-5.8-6-9Z"/></svg>'
      : a + '<rect x="3" y="5" width="18" height="6" rx="1.6"/><rect x="3" y="14" width="11" height="5" rx="1.6"/></svg>';
    if(controlType === 'icons') return a + '<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8" cy="10" r="1.5"/><path d="m21 16-5.2-5.2a2 2 0 0 0-2.8 0L6 18"/></svg>';
    if(controlType === 'text' || controlType === 'textarea') return a + '<path d="M4 6h16"/><path d="M8 6v12"/><path d="M6 18h4"/><path d="M14 11h6"/><path d="M14 16h5"/></svg>';
    if(controlType === 'image') return a + '<rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.5"/><path d="m21 16-5.2-5.2L7 19"/></svg>';
    if(controlType === 'list') return a + '<path d="M8 6h13"/><path d="M8 12h13"/><path d="M8 18h13"/><path d="M3 6h.01"/><path d="M3 12h.01"/><path d="M3 18h.01"/></svg>';
    return a + '<line x1="3" y1="12" x2="21" y2="12"/><circle cx="9" cy="12" r="3" fill="var(--pp-bg)"/></svg>';
  }

  function syncSelectionButtons(group, value){
    const current = String(value ?? '');
    group.querySelectorAll('.preview-prop-choice').forEach(button => {
      const active = button.dataset.propValue === current;
      button.classList.toggle('is-active', active);
      button.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function syncIconButtons(group, value){
    const current = String(value ?? '');
    group.querySelectorAll('.preview-prop-icon-choice').forEach(button => {
      const active = button.dataset.propValue === current;
      button.classList.toggle('is-active', active);
      button.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function updateCurrentProp(control, value, opts = {}){
    const slide = getCurrentSlide();
    if(!slide) return;
    const values = getSlidePropValues(slide);
    values[control.key] = coercePropValue(control, value);
    Object.assign(values, opts.extra || {});
    if(slide.dataset.themePack === 'theme03' && control.key === 'accent'){
      applyTheme03GlobalAccent(values[control.key], opts);
      if(opts.render !== false) renderPropControls();
      return;
    }
    applyPropValues(slide, values);
    if(opts.render !== false) renderPropControls();
  }

  function applyTheme03GlobalAccent(accent, opts = {}){
    const vmState = viewModel?.getState?.() || {};
    document.querySelectorAll('#deck > .slide[data-theme-pack="theme03"]').forEach(target => {
      const root = target.querySelector('[data-prop-controls]');
      const controls = parsePropControls(root);
      if(!controls.some(item => item.key === 'accent')) return;
      const values = getSlidePropValues(target, vmState);
      values.accent = accent;
      if(target === getCurrentSlide()){
        applyPropValues(target, values);
      } else {
        const next = {...parsePropDefaults(root), ...getSlideSourceProps(target), ...values};
        viewModel?.setProps?.(target.dataset.vmSlideId, next);
        if(opts.renderAll) applyPropValues(target, values);
      }
    });
    window.dispatchEvent(new CustomEvent('rd-accentchange', { detail: { accent } }));
  }

  function normalizePropOptions(options){
    return (options || []).map(item => Array.isArray(item)
      ? {value:item[0], label:String(item[1] ?? item[0]), image:item[2] || ''}
      : item && typeof item === 'object' && 'value' in item
        ? {value:item.value, label:String(item.label ?? item.value), image:item.image || item.src || ''}
      : {value:item, label:String(item), image:''});
  }

  function coercePropValue(control, value){
    const controlType = normalizePropControlType(control.type);
    if(controlType === 'toggle') return value === true || value === 'true' || value === 1 || value === '1';
    if(controlType === 'range') return Number.isFinite(Number(value)) ? Number(value) : Number(control.min ?? 0);
    if(controlType === 'list'){
      if(typeof value === 'string'){
        try { return JSON.parse(value); }
        catch { return control.default ?? value; }
      }
      if(value == null) return control.default ?? [];
      return value;
    }
    if(controlType === 'selection'){
      const match = normalizePropOptions(control.options).find(item => String(item.value) === String(value));
      if(match) return match.value;
    }
    if(controlType === 'icons'){
      if(value == null || value === '') return null;
      const match = normalizePropOptions(control.options).find(item => String(item.value) === String(value));
      return match ? match.value : String(value);
    }
    if(controlType === 'image') return value == null ? '' : String(value);
    if(controlType === 'text' || controlType === 'textarea') return value == null ? '' : String(value);
    return value == null ? '' : String(value);
  }

  function applyPropValues(slide, values, opts = {}){
    if(!slide) return;
    const root = slide.querySelector('[data-prop-controls]');
    if(!root) return;
    const next = {...parsePropDefaults(root), ...getSlideSourceProps(slide), ...(values || {})};
    if(opts.persist !== false) viewModel?.setProps?.(slide.dataset.vmSlideId, next);
    if(window.__renderRuntimeSlide?.(slide, next)){
      window.__initEditableText?.(slide);
      window.__syncActiveEffects?.(slide);
    }
  }

  function setOpen(open){
    document.body.classList.toggle('preview-panel-open', open);
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
    window.__setEditableTextMode?.(open);
    requestAnimationFrame(() => {
      window.__layoutDeck?.();
      window.__fitOverviewThumbnails?.();
    });
  }

  panel.addEventListener('mousedown', e => e.stopPropagation());
  toggle.addEventListener('mousedown', e => e.stopPropagation());
  toggle.addEventListener('click', () => setOpen(!document.body.classList.contains('preview-panel-open')));
  close?.addEventListener('click', () => setOpen(false));
  document.getElementById('preview-overview-btn')?.addEventListener('click', () => window.__toggleOverview?.());

  // merged export dropdown
  const exportWrap = document.getElementById('preview-export-wrap');
  const exportMain = document.getElementById('preview-export-main');
  const setExportOpen = (open) => {
    exportWrap?.classList.toggle('open', open);
    exportMain?.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  exportMain?.addEventListener('click', e => {
    e.stopPropagation();
    setExportOpen(!exportWrap.classList.contains('open'));
  });
  document.addEventListener('click', e => {
    if(exportWrap && !exportWrap.contains(e.target)) setExportOpen(false);
  });
  document.getElementById('preview-export')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckHtml?.(); });
  document.getElementById('preview-export-pdf')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckPdf?.(); });
  document.getElementById('preview-export-pptx')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckPptx?.(); });
  document.getElementById('preview-reset')?.addEventListener('click', () => {
    localStorage.removeItem(STORE);
    Object.keys(localStorage).filter(key => key.startsWith(`${STORE}:`)).forEach(key => localStorage.removeItem(key));
    localStorage.removeItem('dashi-ppt-view-model');
    Object.keys(localStorage).filter(key => key.startsWith('dashi-ppt-current-slide:')).forEach(key => localStorage.removeItem(key));
    location.reload();
  });

  function getCurrentSlide(){
    const index = window.__currentSlideIndex || 0;
    return deckSlides[index] || null;
  }
})();

  window.__exportDeckHtml = async function(){

  async function materializeExportSlides(exportUi, label){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];

  function finishSlidesForExport(slides){

      active: slide.classList.contains('active'),

    slides.forEach(slide => {
      slide.classList.add('active');
      slide.setAttribute('data-deck-active', '');

  function staticUnicornRuntime(){
    const DEFAULT_SDK_URL = 'https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js';
    let sdkPromise = null;

    window.__initUnicornScenes = initUnicornScenes;
    window.__resetUnicornSceneFrame = resetFrame;
    window.__syncUnicornSceneActivity = syncUnicornSceneActivity;

    addEventListener('swiss-slide-change', event => {
      const {index, slide} = event.detail || {};
      syncUnicornSceneActivity(slide);
      setTimeout(() => {
        if((window.__currentSlideIndex || 0) === index) initUnicornScenes(slide);
      }, 80);
    });

    syncUnicornSceneActivity(getCurrentSlide());
    initUnicornScenes(getCurrentSlide());

    function initUnicornScenes(scope = getCurrentSlide(), options = {}){
      const root = scope instanceof Element ? scope : document;
      const selector = '.bt-unicorn-frame[data-unicorn-project-id],.bt-unicorn-frame[data-unicorn-json-file-path]';
      const frames = [
        ...(root.matches?.(selector) ? [root] : []),
        ...Array.from(root.querySelectorAll(selector)),
      ];
      const activeSlide = getCurrentSlide();
      const pending = frames.filter(frame => {
        if(frame.dataset.unicornReady || frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media')) return false;
        return options.force || activeSlide.contains(frame) || frame === activeSlide;
      });
      if(!pending.length) return Promise.resolve([]);
      const sdkUrl = pending[0].dataset.unicornSdkUrl || DEFAULT_SDK_URL;
      return loadSdk(sdkUrl)
        .then(() => Promise.allSettled(pending.map(initFrame)))
        .catch(error => {
          console.warn('[unicorn] failed to load scene runtime', error);
          return [];
        });
    }

    function getCurrentSlide(){
      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
      return slides[window.__currentSlideIndex || 0] || document;
    }

    function loadSdk(sdkUrl){
      if(window.UnicornStudio?.addScene) return Promise.resolve();
      if(sdkPromise) return sdkPromise;
      sdkPromise = new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${sdkUrl}"]`);
        const script = existing || document.createElement('script');
        script.addEventListener('load', resolve, {once:true});
        script.addEventListener('error', reject, {once:true});
        if(!existing){
          script.src = sdkUrl;
          script.async = true;
          document.head.appendChild(script);
        }
      }).then(() => {
        if(!window.UnicornStudio?.addScene) throw new Error('UnicornStudio.addScene not found');
      });
      return sdkPromise;
    }

    function initFrame(frame){
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(!scene || frame.dataset.unicornReady) return;
      const elementId = scene.id || `unicorn-${Math.random().toString(36).slice(2, 11)}`;
      scene.id = elementId;
      frame.dataset.unicornReady = 'true';
      const config = {
        elementId,
        scale: Number(frame.dataset.unicornScale || 1),
        dpi: Number(frame.dataset.unicornDpi || 1.5),
        lazyLoad: false,
        production: true,
        altText: 'Shader scene',
        ariaLabel: 'Shader scene',
      };
      if(frame.dataset.unicornJsonFilePath) config.filePath = frame.dataset.unicornJsonFilePath;
      else config.projectId = frame.dataset.unicornProjectId;
      return window.UnicornStudio.addScene(config).then(sceneInstance => {
        frame.__unicornScene = sceneInstance;
      }).catch(error => {
        frame.removeAttribute('data-unicorn-ready');
        console.warn('[unicorn] failed to initialize scene', error);
      });
    }

    function resetFrame(frame){
      if(!frame) return;
      frame.__unicornScene?.destroy?.();
      frame.__unicornScene = null;
      frame.removeAttribute('data-unicorn-ready');
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(scene){
        scene.innerHTML = '';
        scene.removeAttribute('id');
      }
    }

    function syncUnicornSceneActivity(activeSlide = getCurrentSlide()){
      document.querySelectorAll('.bt-unicorn-frame[data-unicorn-ready]').forEach(frame => {
        if(activeSlide && activeSlide.contains(frame)) return;
        resetFrame(frame);
      });
    }
  }


	  function captureSlideImage(slideEl, options){
	    const image = window.htmlToImage.toPng(slideEl, withSlideCaptureFilter(options));
	    const timeout = new Promise((_, reject) => {
	      setTimeout(() => reject(new Error('Slide image capture timed out')), 20000);
	    });
	    return Promise.race([image, timeout]);
	  }

  const slideCaptureIgnoredTags = new Set(['STYLE', 'SCRIPT', 'NOSCRIPT', 'TEMPLATE']);

  function withSlideCaptureFilter(options = {}){
    const customFilter = options.filter;
    return {
      ...options,
      filter(node){
        if(typeof customFilter === 'function' && !customFilter(node)) return false;
        if(node?.nodeType === 1 && node.tagName === 'IMG' && !(node.currentSrc || node.getAttribute('src'))) return false;
        if(node?.nodeType === 1 && node.tagName === 'VIDEO' && !(node.currentSrc || node.getAttribute('src') || node.querySelector('source[src]'))) return false;
        let current = node?.nodeType === 1 ? node : node?.parentNode;
        while(current){
          if(current.nodeType === 1 && slideCaptureIgnoredTags.has(current.tagName)) return false;
          current = current.parentNode;
        }
        return true;
      },
    };
  }

  async function waitForSlideCaptureReady(slide){
    if(document.fonts?.ready) await document.fonts.ready.catch(() => {});
    const images = [...(slide?.querySelectorAll?.('img') || [])].filter(img => !img.complete);
    await Promise.race([
      Promise.all(images.map(img => new Promise(resolve => {
        img.addEventListener('load', resolve, {once:true});
        img.addEventListener('error', resolve, {once:true});
      }))),
      new Promise(resolve => setTimeout(resolve, 1800)),
    ]);
    slide?.querySelectorAll?.('video').forEach(video => {
      if(video.readyState < 2) video.load?.();
    });
    await nextFrame();
    finishSlideCaptureMotion(slide);
    await nextFrame();
    await nextFrame();
  }

  function runBrowserPrint(){
    const printWindow = arguments[0] || window;
    return new Promise(resolve => {
      let done = false;
      let timer = null;
      const finish = () => {
        if(done) return;
        done = true;
        clearTimeout(timer);
        printWindow.removeEventListener?.('afterprint', finish);
        resolve();
      };
      printWindow.addEventListener?.('afterprint', finish, {once:true});
      timer = setTimeout(finish, 15000);
      printWindow.focus?.();
      if(printWindow === window) window.print();
      else printWindow.print();
    });
  }

  function finishSlideCaptureMotion(slide){
    if(!slide?.getAnimations) return;
    slide.getAnimations({subtree:true}).forEach(animation => {
      const timing = animation.effect?.getComputedTiming?.();
      const endTime = Number(timing?.endTime);
      if(!Number.isFinite(endTime) || endTime <= 0) return;
      try { animation.finish(); } catch {}
    });
  }

  const retainedDownloadUrls = [];
  window.addEventListener('pagehide', releaseRetainedDownloadUrls);
  window.addEventListener('beforeunload', releaseRetainedDownloadUrls);

	  function downloadBlob(blob, filename){
	    const type = blob.type || getDownloadMime(filename);
	    const file = typeof File === 'function'
	      ? new File([blob], filename, {type})
	      : new Blob([blob], {type});
	    const url = URL.createObjectURL(file);
	    retainedDownloadUrls.push(url);
	    const link = document.createElement('a');
	    link.href = url;
	    link.download = filename;
	    link.rel = 'noopener';
	    link.style.display = 'none';
	    document.body.appendChild(link);
	    return new Promise(resolve => {
	      setTimeout(() => {
	        link.click();
	        setTimeout(() => link.remove(), 1000);
	        resolve();
	      }, 0);
	    });
	  }

  function releaseRetainedDownloadUrls(){
    while(retainedDownloadUrls.length){
      URL.revokeObjectURL(retainedDownloadUrls.pop());
    }
  }

  function getDownloadMime(filename){
    const lower = String(filename || '').toLowerCase();
    if(lower.endsWith('.pptx')) return 'application/vnd.openxmlformats-officedocument.presentationml.presentation';
    if(lower.endsWith('.html') || lower.endsWith('.htm')) return 'text/html;charset=utf-8';
    if(lower.endsWith('.pdf')) return 'application/pdf';
    return 'application/octet-stream';
  }

	  function beginDeckExport(label){
	    window.__deckExportLocked = true;
	    document.body.classList.add('exporting-deck');
	    const overlay = document.createElement('div');
	    overlay.className = 'deck-export-overlay';
	    overlay.__deckExportCancelled = false;
	    overlay.innerHTML = `
	      <div class="deck-export-card" role="status" aria-live="polite">
	        <div class="deck-export-title">${label} 导出中</div>
	        <div class="deck-export-detail">准备中...</div>
	        <div class="deck-export-bar"><div class="deck-export-fill"></div></div>
	        <div class="deck-export-actions"><button class="deck-export-cancel" type="button">取消</button></div>
	      </div>`;
	    overlay.querySelector('.deck-export-cancel')?.addEventListener('click', event => {
	      event.preventDefault();
	      event.stopPropagation();
	      requestDeckExportCancel(overlay);
	    });
	    overlay.addEventListener('mousedown', event => event.preventDefault());
	    overlay.addEventListener('click', event => event.preventDefault());
	    document.body.appendChild(overlay);
	    return overlay;
	  }

  function updateDeckExport(overlay, current, total, detail){
    if(!overlay) return;
    const pct = total > 0 ? Math.min(100, Math.max(0, Math.round((current / total) * 100))) : 0;
    const text = detail || `导出进度 ${pct}%`;
    overlay.querySelector('.deck-export-detail').textContent = `${text} · ${pct}%`;
	    overlay.querySelector('.deck-export-fill').style.width = pct + '%';
	  }

  function requestDeckExportCancel(overlay){
    if(!overlay || overlay.__deckExportCancelled) return;
    overlay.__deckExportCancelled = true;
    const cancel = overlay.querySelector('.deck-export-cancel');
    if(cancel){
      cancel.disabled = true;
      cancel.textContent = '正在取消...';
    }
    const detail = overlay.querySelector('.deck-export-detail');
    if(detail) detail.textContent = '正在取消，正在恢复页面状态...';
  }

  function throwIfDeckExportCancelled(overlay){
    if(!overlay?.__deckExportCancelled) return;
    const error = new Error('Deck export cancelled');
    error.name = 'DeckExportCancelled';
    throw error;
  }

  function isDeckExportCancelledError(error){
    return error?.name === 'DeckExportCancelled';
  }

	  function endDeckExport(overlay){
	    window.__deckExportLocked = false;
	    document.body.classList.remove('exporting-deck');
    overlay?.remove();
  }


  function loadExportScript(src, isReady){
    if(isReady()) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const existing = [...document.scripts].find(script => script.getAttribute('src') === src);
      const script = existing || document.createElement('script');
      const done = () => isReady() ? resolve() : reject(new Error(`${src} did not expose its browser API`));
      script.addEventListener('load', done, {once:true});
      script.addEventListener('error', () => reject(new Error(`${src} failed to load`)), {once:true});
      if(existing) setTimeout(done, 0);
      else {
        script.src = src;
        script.async = true;
        document.head.appendChild(script);
      }
    });
  }

  function restorePptxExportState(state){
    if(!state) return;
    go(state.index, {animate:false, force:true});
    document.body.classList.toggle('preview-panel-open', state.panelOpen);
    document.body.classList.toggle('overview-on', state.overviewOn);
    const overview = document.getElementById('overview');
    if(overview) overview.style.display = state.overviewDisplay;
    document.getElementById('preview-toggle')?.setAttribute('aria-expanded', state.panelOpen ? 'true' : 'false');
    window.__layoutDeck?.();
  }

  function getCaptureBackground(slide){
    const value = getComputedStyle(slide).backgroundColor;
    return value && value !== 'rgba(0, 0, 0, 0)' ? value : getComputedStyle(document.documentElement).getPropertyValue('--paper').trim() || '#fff';
  }

	  function nextFrame(){
	    return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
	  }

	  async function waitForUnicornFrames(scope=document, timeout=6000){
	    const start = performance.now();
	    do {
	      await nextFrame();
	      const loading = scope.querySelector?.('[data-unicorn-loading="true"]');
	      const frames = [...(scope.querySelectorAll?.('.bt-unicorn-frame[data-unicorn-json-file-path],.bt-unicorn-frame[data-unicorn-project-id]') || [])]
	        .filter(frame => !frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media'));
	      const ready = !frames.length || frames.every(frame => frame.dataset.unicornReady || frame.querySelector('canvas'));
	      if(!loading && ready) return;
	    } while(performance.now() - start < timeout);
	  }

  function getDeckFileName(){
    return (document.title || 'presentation')
      .replace(/[\\/:*?"<>|]+/g, '')
      .replace(/\s+/g, '-')
      .trim() || 'presentation';
  }

  staticUnicornRuntime();
})();

</script>
<script>
/* =============== Text State =============== */
(function(){
  const deck = document.getElementById('deck');
  if(!deck) return;
  const stateEl = document.getElementById('embedded-text-state');
  const textState = readTextState();
  const textCounters = new Map();

  window.__initEditableText = scope => applyTextState(scope);
  window.__setEditableTextMode = (on, scope = deck) => syncEditableMode(scope, on);
  window.__flushEditableTextState = flushTextState;
  applyTextState(deck);
  deck.addEventListener('pointerdown', handleEditablePointerDown, true);
  deck.addEventListener('focusin', handleFocusIn, true);
  deck.addEventListener('input', handleInput, true);
  deck.addEventListener('blur', handleBlur, true);

  function applyTextState(scope = deck){
    prepareTextElements(scope);
    syncEditableMode(scope);
  }

  function prepareTextElements(scope = deck){
    const root = scope instanceof Element ? scope : deck;
    resetTextCounters(root);
    const candidates = [
      ...(isTextCandidate(root) ? [root] : []),
      ...root.querySelectorAll('*'),
    ];
    candidates.forEach(el => {
      if(el !== root && !root.contains(el)) return;
      if(el !== root && el.parentElement?.closest('[data-editable-id]')) return;
      if(!el.dataset.editableId && !isTextCandidate(el)) return;
      if(!el.dataset.editableId) el.dataset.editableId = nextTextId(el);
      const synced = el.dataset.syncText ? textState[`sync:${el.dataset.syncText}`] : undefined;
      if(synced !== undefined) el.innerHTML = synced;
      else if(textState[el.dataset.editableId] !== undefined) el.innerHTML = textState[el.dataset.editableId];
      makeEditable(el);
    });
  }

  function resetTextCounters(root){
    let slides = root.classList?.contains('slide') ? [root] : [...(root.querySelectorAll?.('.slide') || [])];
    if(!slides.length){
      const slide = root.closest?.('.slide');
      if(slide) slides = [slide];
    }
    slides.forEach(slide => textCounters.set(getTextSlideKey(slide), 0));
  }

  function makeEditable(el){
    el.dataset.editableReady = 'true';
  }

  function syncEditableMode(scope = deck, on){
    const root = scope instanceof Element ? scope : deck;
    const enabled = on ?? document.body.classList.contains('preview-panel-open');
    const editable = [
      ...(root.dataset?.editableId ? [root] : []),
      ...(root.querySelectorAll?.('[data-editable-id]') || []),
    ];
    editable.forEach(el => {
      if(enabled){
        el.setAttribute('contenteditable', 'true');
        el.setAttribute('spellcheck', 'false');
        el.setAttribute('role', 'textbox');
      } else {
        el.removeAttribute('contenteditable');
        el.removeAttribute('spellcheck');
        el.removeAttribute('role');
      }
    });
  }

  function handleEditablePointerDown(e){
    if(!document.body.classList.contains('preview-panel-open')) return;
    if(e.defaultPrevented || (e.button !== undefined && e.button !== 0)) return;
    const target = e.target instanceof Element ? e.target : null;
    if(!target || !deck.contains(target)) return;
    if(target.closest('button,input,textarea,select,a,#preview-panel,#preview-toggle')) return;
    if(window.__isDeckFileSlotTarget?.(target)) return;
    if(target.closest('[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]')) return;
    const el = findEditableAtPoint(e.clientX, e.clientY);
    if(!el) return;
    e.preventDefault();
    e.stopPropagation();
    el.focus({preventScroll:true});
    placeCaretAtPoint(el, e.clientX, e.clientY);
  }

  function findEditableAtPoint(x, y){
    const activeSlide = deck.querySelector('.slide.active') || deck;
    const editable = [...activeSlide.querySelectorAll('[data-editable-id][contenteditable="true"]')]
      .filter(el => !window.__isDeckFileSlotTarget?.(el));
    for(let i = editable.length - 1; i >= 0; i--){
      const rects = editable[i].getClientRects();
      for(const rect of rects){
        if(x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) return editable[i];
      }
    }
    return null;
  }

  function placeCaretAtPoint(el, x, y){
    let range = document.caretRangeFromPoint?.(x, y);
    if(!range && document.caretPositionFromPoint){
      const pos = document.caretPositionFromPoint(x, y);
      if(pos){
        range = document.createRange();
        range.setStart(pos.offsetNode, pos.offset);
        range.collapse(true);
      }
    }
    if(!range || !el.contains(range.startContainer)){
      range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
    }
    const selection = getSelection();
    selection?.removeAllRanges();
    selection?.addRange(range);
  }

	  function handleFocusIn(e){
	    const el = e.target.closest('[data-editable-id]');
	    if(!el || !deck.contains(el)) return;
	    if(!document.body.classList.contains('preview-panel-open')){
	      el.blur();
	      return;
	    }
	    el.dataset.editing = 'true';
	    el.dataset.editBefore = el.innerHTML;
	  }

  function handleInput(e){
    const el = e.target.closest('[data-editable-id]');
    if(!el || !deck.contains(el)) return;
    saveTextElement(el);
  }

	  function handleBlur(e){
	    const el = e.target.closest('[data-editable-id]');
	    if(!el || !deck.contains(el)) return;
	    const before = el.dataset.editBefore;
	    const after = el.innerHTML;
	    delete el.dataset.editing;
	    delete el.dataset.editBefore;
	    saveTextElement(el);
	    if(before !== undefined && before !== after && !window.__dashiUndo?.applying){
	      const key = el.dataset.editableId;
	      const syncName = el.dataset.syncText || '';
	      window.__dashiUndo?.push?.({
	        label: 'text',
	        undo: () => restoreTextElement(key, syncName, before),
	      });
	    }
	  }

  function saveTextElement(el){
    const key = el.dataset.editableId;
    if(!key) return;
    textState[key] = el.innerHTML;
    if(el.dataset.syncText) textState[`sync:${el.dataset.syncText}`] = el.innerHTML;
    writeTextState();
  }

  function flushTextState(scope){
    const roots = scope instanceof Element
      ? [scope]
      : (window.__getVisibleSlides?.() || [deck]);
    const seen = new Set();
    roots.forEach(root => {
      [
        ...(root.dataset?.editableId ? [root] : []),
        ...(root.querySelectorAll?.('[data-editable-id]') || []),
      ].forEach(el => {
        if(seen.has(el)) return;
        seen.add(el);
        saveTextElement(el);
      });
    });
    writeTextState();
  }

	  function restoreTextElement(key, syncName, value){
	    if(!key) return;
	    textState[key] = value;
	    if(syncName) textState[`sync:${syncName}`] = value;
	    deck.querySelectorAll('[data-editable-id]').forEach(el => {
	      if(el.dataset.editableId === key || (syncName && el.dataset.syncText === syncName)){
	        el.innerHTML = value;
	      }
	    });
	    writeTextState();
	  }

  function writeTextState(){
    if(stateEl) stateEl.textContent = JSON.stringify(textState).replace(/</g, '\\u003c');
    window.__deckViewModel?.setTextState?.(textState);
  }

  function nextTextId(el){
    const slide = el.closest('.slide');
    const slideKey = getTextSlideKey(slide);
    const count = (textCounters.get(slideKey) || 0) + 1;
    textCounters.set(slideKey, count);
    return `text:${slideKey}:${count}`;
  }

  function getTextSlideKey(slide){
    return slide?.dataset.vmSlideKey || slide?.dataset.vmLayout || slide?.dataset.vmSlideId || 'deck';
  }

  function readTextState(){
    try {
      return JSON.parse(stateEl?.textContent || '{}') || {};
    } catch {
      return {};
    }
  }

  function isTextCandidate(el){
    if(!(el instanceof HTMLElement)) return false;
    if(el.hasAttribute('data-editable-skip')) return false;
    if(el.parentElement?.closest('[data-editable-id]')) return false;
    if(window.__isDeckFileSlotTarget?.(el) || el.closest('#nav,#preview-panel,#preview-toggle')) return false;
    if(['SCRIPT','STYLE','CANVAS','SVG','PATH','BUTTON','INPUT','SELECT','TEXTAREA','VIDEO','IMG'].includes(el.tagName)) return false;
    if(!el.textContent?.trim()) return false;
    return [...el.children].every(child => ['BR','SPAN','B','I','EM','STRONG','SMALL'].includes(child.tagName));
  }
})();

</script>
<script src="assets/vendor/gsap.min.js"></script>
<script>
(function(){
  window.__playSlide = function(index){
    const visibleSlides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    const slide = visibleSlides[index ?? window.__currentSlideIndex ?? 0];
    if(!slide) return;
    slide.removeAttribute('data-deck-active');
    void slide.offsetWidth;
    slide.setAttribute('data-deck-active', '');
    window.__syncTheme10Motion?.(slide);
  };
	  window.__playPageTransition = function(mode, currentSlide, nextSlide, direction, commit){
	    if(!window.gsap || mode !== 'liquidMorph') { commit?.(); return Promise.resolve(); }
	    const stage = document.createElement('div');
	    stage.className = 'page-transition-stage is-active';
	    const current = currentSlide.cloneNode(true);
	    const next = nextSlide.cloneNode(true);
	    current.classList.add('active');
	    next.classList.add('active');
	    current.setAttribute('data-deck-active', '');
	    next.removeAttribute('data-deck-active');
	    stage.append(current, next);
	    document.body.appendChild(stage);
	    gsap.set([current, next], {position:'absolute', inset:0});
	    let tl = gsap.timeline({defaults:{ease:'power3.inOut'}});
	    gsap.set(next, {scale:1.02, filter:'blur(18px)', clipPath:'circle(0% at 50% 52%)', autoAlpha:1});
	    tl.to(current, {scale:.985, filter:'blur(12px)', autoAlpha:.18, duration:.45}, 0)
	      .to(next, {clipPath:'circle(142% at 50% 52%)', filter:'blur(0px)', scale:1, duration:.58, ease:'power4.inOut'}, 0);
	    return new Promise(resolve => tl.eventCallback('onComplete', () => { commit?.(); stage.remove(); resolve(); }));
	  };
})();
</script>
