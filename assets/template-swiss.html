<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Deck Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fafaf8;
    --paper-rgb:250,250,248;
    --ink:#0a0a0a;
    --ink-rgb:10,10,10;
    --focus-mark:#46e3c6;
    --focus-bg:#002fa7;
    --focus-fg:#ffffff;
    --border-subtle:rgba(255,255,255,.14);
    --border-strong:rgba(255,255,255,.28);
    --text-secondary:rgba(255,255,255,.66);
    --text-helper:rgba(255,255,255,.46);
    --sans:"Inter","Noto Sans SC",system-ui,-apple-system,sans-serif;
    --sans-zh:"Noto Sans SC","PingFang SC",var(--sans);
    --mono:"Space Mono","JetBrains Mono",ui-monospace,monospace;
    --ease-prod:cubic-bezier(.2,0,.38,.9);
    --preview-panel-w:min(380px,92vw);
    --slide-rail-w:184px;
    --slide-rail-min-w:156px;
    --slide-rail-max-w:320px;
    --deck-w:100vw;
    --deck-h:56.25vw;
    --deck-left:0px;
    --deck-top:0px;
    --deck-scale:1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--sans-zh);letter-spacing:0}
  body{user-select:none}
  body.is-rail-resizing{cursor:col-resize;user-select:none}
  body[data-mode="present"]{background:#000}
  #deck-viewport{position:fixed;left:var(--deck-left);top:var(--deck-top);z-index:1;width:var(--deck-w);height:var(--deck-h);overflow:hidden;background:#000}
  #deck{position:absolute;left:0;top:0;z-index:1;display:flex;will-change:transform}
  .slide{position:relative;flex:0 0 var(--deck-w);width:var(--deck-w);height:var(--deck-h);overflow:hidden;background:#02040c;color:#fff}
  .slide[hidden]{display:none!important}
  .slide:not(.active){pointer-events:none}
  .slide.active{pointer-events:auto}
  #hint,#nav{display:none!important}
  #nav .dot{width:6px;height:6px;padding:0;border:0;border-radius:999px;background:rgba(255,255,255,.32);cursor:pointer;transition:width .2s var(--ease-prod),background .2s var(--ease-prod)}
  #nav .dot.active{width:20px;background:var(--focus-mark)}
  /* ========== Preview controller · Figma-inspired · auto light/dark ========== */
  :root{
    --pp-fg:#1e1e1e; --pp-fg2:#6b6b6b; --pp-muted:#b3b3b3; --pp-icon:#444;
    --pp-bg:#fff; --pp-chip:#f4f4f5; --pp-chip-h:#ececed; --pp-border:#e3e3e4; --pp-divider:#ededee;
    --pp-sel-bg:#fff; --pp-sel-bd:#e1e1e1; --pp-sel-sh:0 1px 2px rgba(0,0,0,.08);
    --pp-rail:#e2e2e3; --pp-off:#d9d9db; --pp-blue:#0d99ff; --pp-blue-h:#0c87e0; --pp-blue-soft:#e8f4ff;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --pp-fg:#fff; --pp-fg2:#a0a0a0; --pp-muted:#6f6f6f; --pp-icon:#cfcfcf;
      --pp-bg:#2c2c2c; --pp-chip:#383838; --pp-chip-h:#434343; --pp-border:#222; --pp-divider:#1f1f1f;
      --pp-sel-bg:#4a4a4a; --pp-sel-bd:#5a5a5a; --pp-sel-sh:0 1px 2px rgba(0,0,0,.35);
      --pp-rail:#565656; --pp-off:#565656; --pp-blue:#0d99ff; --pp-blue-h:#2aa5ff; --pp-blue-soft:rgba(13,153,255,.16);
    }
  }
  #preview-toggle{position:fixed;right:18px;top:18px;z-index:25;width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--pp-border);border-radius:9px;background:var(--pp-bg);color:var(--pp-icon);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:opacity .2s var(--ease-prod),transform .2s var(--ease-prod),background .15s}
  #preview-toggle:hover{background:var(--pp-chip)}
  #preview-toggle svg{width:19px;height:19px}
  body.preview-panel-open #preview-toggle{opacity:0;transform:scale(.85);pointer-events:none}
  body[data-mode="present"] #preview-toggle{display:none}
  #slide-rail{position:fixed;left:0;top:0;z-index:24;width:var(--slide-rail-w);min-width:var(--slide-rail-min-w);max-width:var(--slide-rail-max-w);height:100vh;display:flex;flex-direction:column;background:var(--pp-bg);color:var(--pp-fg);border-right:1px solid var(--pp-divider);box-shadow:none;font-family:var(--sans);overflow:hidden}
  body[data-mode="present"] #slide-rail{display:none}
  .slide-rail-head{height:52px;display:flex;align-items:center;justify-content:space-between;gap:8px;padding:0 10px 0 12px;border-bottom:1px solid var(--pp-divider)}
  .slide-rail-title{font:650 13px/1 var(--sans-zh);color:var(--pp-fg)}
  .slide-rail-count{font:600 11px/1 var(--mono);color:var(--pp-fg2);letter-spacing:.02em}
  .slide-rail-resize{position:absolute;right:0;top:0;z-index:5;width:8px;height:100%;border:0;background:transparent;cursor:col-resize;touch-action:none}
  .slide-rail-resize::after{content:"";position:absolute;right:2px;top:0;width:1px;height:100%;background:transparent;transition:background .16s}
  .slide-rail-resize:hover::after,.slide-rail-resize:focus-visible::after,body.is-rail-resizing .slide-rail-resize::after{background:var(--pp-blue)}
  .slide-rail-resize:focus-visible{outline:2px solid var(--pp-blue);outline-offset:-3px}
  #slide-rail-list{--rail-pad-x:12px;--rail-scrollbar-w:0px;flex:1;overflow-y:auto;overflow-x:hidden;padding:12px max(2px,calc(var(--rail-pad-x) - var(--rail-scrollbar-w))) 18px var(--rail-pad-x);scrollbar-gutter:stable;scrollbar-width:thin;scrollbar-color:var(--pp-rail) transparent}
  #slide-rail-list::-webkit-scrollbar{width:8px}
  #slide-rail-list::-webkit-scrollbar-track{background:transparent}
  #slide-rail-list::-webkit-scrollbar-thumb{background:var(--pp-rail);border-radius:999px;border:2px solid transparent;background-clip:content-box}
  .rail-grid{position:relative;display:grid;grid-template-columns:minmax(0,1fr);gap:12px;align-items:start;width:100%;min-width:0}
  .rail-card{position:relative;display:grid;gap:5px;width:100%;min-width:0;max-width:100%;padding:5px;border:0;border-radius:8px;background:transparent;color:var(--pp-fg);cursor:pointer;text-align:left;outline:1px solid transparent;transition:outline-color .16s,background .16s,opacity .16s,transform .2s}
  .rail-card:hover{background:var(--pp-chip)}
  .rail-card[aria-current="true"]{background:#111827;color:#fff;outline-color:rgba(255,255,255,.32)}
  .rail-card[aria-current="true"]:hover{background:#1f2937}
  .rail-card.is-dragging{opacity:.45;cursor:grabbing}
  .rail-thumb-frame{position:relative;width:100%;min-width:0;max-width:100%;aspect-ratio:16/9;overflow:hidden;border-radius:5px;background:var(--paper);box-shadow:0 0 0 1px rgba(0,0,0,.12);contain:layout paint style}
  .rail-thumb{position:absolute;inset:0;width:100%;min-width:0;max-width:100%;height:100%;overflow:hidden;pointer-events:none;background:var(--paper);contain:layout paint style}
  .rail-label{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:0 1px;font:600 11px/1.1 var(--mono);letter-spacing:.04em;color:var(--pp-fg2)}
  .rail-card[aria-current="true"] .rail-label{color:#fff}
  .rail-skip-badge{position:absolute;right:10px;top:10px;z-index:3;padding:4px 7px;border-radius:999px;background:rgba(10,10,10,.72);color:#fff;font:600 10px/1 var(--sans-zh);pointer-events:none}
  .rail-drop-marker{position:absolute;z-index:6;left:5px;right:5px;height:4px;display:none;border-radius:999px;background:var(--focus-mark);box-shadow:0 0 0 3px rgba(0,0,0,.08);pointer-events:none}
  .rail-context-menu{position:fixed;z-index:130;min-width:138px;display:none;padding:5px;background:var(--pp-bg);border:1px solid var(--pp-border);border-radius:8px;box-shadow:0 14px 36px rgba(0,0,0,.22);color:var(--pp-fg)}
  .rail-context-menu button{display:flex;align-items:center;justify-content:space-between;width:100%;height:34px;padding:0 9px;border:0;border-radius:6px;background:transparent;color:var(--pp-fg);font:500 12.5px/1 var(--sans-zh);text-align:left;cursor:pointer}
  .rail-context-menu button:hover{background:var(--pp-blue-soft)}
  .rail-context-menu button[disabled]{opacity:.42;cursor:not-allowed}
  .rail-context-menu button[disabled]:hover{background:transparent}
  body[data-mode="present"] #deck,
  body[data-mode="present"] #deck *{cursor:default!important}
  #preview-panel{position:fixed;right:0;top:0;z-index:24;width:var(--preview-panel-w);height:100vh;display:flex;flex-direction:column;background:var(--pp-bg);color:var(--pp-fg);border-left:1px solid var(--pp-divider);box-shadow:none;transform:translateX(100%);transition:transform .24s var(--ease-prod);overflow:hidden;font-family:var(--sans);font-variant-numeric:tabular-nums;letter-spacing:0}
  body.preview-panel-open #preview-panel{transform:translateX(0)}
  body[data-mode="present"] #preview-panel{display:none}
  #preview-panel svg{display:block;flex:0 0 auto}
  /* header */
  .preview-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:14px 12px 14px 16px;border-bottom:1px solid var(--pp-divider)}
  .preview-title{font:600 14.5px/1 var(--sans);letter-spacing:-.01em;color:var(--pp-fg);text-transform:none}
  .preview-count{margin-top:6px;font:500 11.5px/1 var(--sans);color:var(--pp-fg2);white-space:nowrap}
  /* body / fields */
  .preview-fields{flex:1;overflow:auto;display:block}
  .preview-field{padding:13px 16px;border-bottom:1px solid var(--pp-divider);display:grid;gap:11px}
  .preview-field.is-hidden{display:none}
  .preview-field label,.preview-prop-row>span{font:600 13px/1.2 var(--sans);letter-spacing:0;color:var(--pp-fg);text-transform:none}
  .preview-field select{height:34px;border:1px solid transparent;border-radius:6px;background:var(--pp-chip);color:var(--pp-fg);padding:0 10px;font:500 12.5px/1 var(--sans-zh);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b6b6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:30px}
  .preview-field select:hover{background-color:var(--pp-chip-h)}
  .preview-props{display:grid;gap:13px}
  /* property rows */
  .preview-prop-row{display:grid;grid-template-columns:minmax(92px,max-content) minmax(0,1fr);align-items:center;gap:10px}
  .preview-prop-row.is-choice{grid-template-columns:1fr;gap:9px}
  .preview-prop-row>span{display:flex;align-items:center;gap:7px;min-width:0;max-width:138px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font:500 12.5px/1 var(--sans);color:var(--pp-fg2)}
  .preview-prop-row>span svg{width:14px;height:14px;flex:0 0 auto;color:var(--pp-muted)}
  /* slider (range) */
  .pp-slider{display:flex;align-items:center;gap:8px;width:100%;min-width:0}
  .pp-slider-track{position:relative;flex:1;min-width:48px;height:18px;display:flex;align-items:center}
  .preview-prop-row input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;margin:0;cursor:grab;outline:none;background:transparent;touch-action:none}
  .preview-prop-row input[type="range"]:active{cursor:grabbing}
  /* stepped variant */
  .pp-slider.is-stepped input[type="range"]{height:6px;border-radius:99px;background:linear-gradient(var(--pp-blue),var(--pp-blue)) 0/var(--pp-pct,0%) no-repeat var(--pp-rail)}
  .pp-slider.is-stepped input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--pp-bg);border:2px solid var(--pp-blue);box-shadow:0 1px 2px rgba(0,0,0,.22);cursor:grab}
  .pp-ticks{position:absolute;left:1px;right:1px;bottom:-5px;display:flex;justify-content:space-between;pointer-events:none}
  .pp-ticks span{width:2px;height:3px;border-radius:1px;background:var(--pp-rail)}
  .pp-ticks span.on{background:var(--pp-blue)}
  /* smooth variant */
  .pp-slider.is-smooth input[type="range"]{height:6px;border-radius:99px;background:linear-gradient(var(--pp-blue),var(--pp-blue)) 0/var(--pp-pct,0%) no-repeat var(--pp-rail)}
  .pp-slider.is-smooth input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--pp-bg);border:2px solid var(--pp-blue);box-shadow:0 1px 2px rgba(0,0,0,.22);cursor:grab}
  .preview-prop-row output{min-width:34px;height:26px;padding:0 7px;display:grid;place-items:center;font:600 12px/1 var(--sans);color:var(--pp-fg);background:var(--pp-chip);border-radius:6px;text-align:center}
  /* toggle / switch */
  .pp-switch{justify-self:end;position:relative;display:block;width:38px;height:22px;flex:0 0 auto;cursor:pointer}
  .pp-switch input{position:absolute;inset:0;z-index:2;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .pp-switch .pp-track{position:absolute;inset:0;border-radius:99px;background:var(--pp-off);transition:background .18s}
  .pp-switch .pp-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.28);transition:transform .2s cubic-bezier(.3,.7,.3,1.3)}
  .pp-switch input:checked~.pp-track{background:var(--pp-blue)}
  .pp-switch input:checked~.pp-knob{transform:translateX(16px)}
  /* segmented choice group */
  .preview-prop-choice-group{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:2px;padding:2px;background:var(--pp-chip);border-radius:7px}
  .preview-prop-choice{position:relative;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:5px;background:transparent;color:var(--pp-fg2);font:500 12px/1 var(--sans-zh);cursor:pointer;transition:color .15s}
  .preview-prop-choice:hover:not(.is-active){color:var(--pp-fg)}
  .preview-prop-choice.is-active{background:var(--pp-sel-bg);border-color:var(--pp-sel-bd);box-shadow:var(--pp-sel-sh);color:var(--pp-fg);font-weight:600}
  /* color swatch group (display:color) */
  .preview-prop-choice-group.is-color{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));grid-auto-flow:row;grid-auto-columns:initial;gap:10px;padding:0;background:transparent;border-radius:0}
  .preview-prop-choice-group.is-color .preview-prop-choice{width:100%;height:38px;min-width:0;border-radius:7px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.16);transition:transform .12s,box-shadow .12s}
  .preview-prop-choice-group.is-color .preview-prop-choice:hover{transform:scale(1.06)}
  .preview-prop-choice-group.is-color .preview-prop-choice:focus-visible{outline:2px solid var(--pp-blue);outline-offset:3px}
  .preview-prop-choice-group.is-color .preview-prop-choice.is-active{box-shadow:inset 0 0 0 1px rgba(0,0,0,.14),0 0 0 2px var(--pp-bg),0 0 0 4px var(--pp-blue)}
  .preview-prop-row.is-icons{grid-template-columns:1fr;gap:9px}
  .preview-prop-icon-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
  .preview-prop-icon-choice{min-height:72px;display:grid;grid-template-rows:46px auto;place-items:center;gap:5px;padding:6px 4px;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg2);font:500 10px/1.15 var(--sans-zh);cursor:pointer;text-align:center}
  .preview-prop-icon-choice:hover{background:var(--pp-chip-h);color:var(--pp-fg)}
  .preview-prop-icon-choice.is-active{background:var(--pp-sel-bg);border-color:var(--pp-blue);box-shadow:0 0 0 1px var(--pp-blue-soft);color:var(--pp-fg);font-weight:600}
  .preview-prop-icon-choice img{max-width:46px;max-height:46px;width:auto;height:auto;object-fit:contain;display:block}
  .preview-prop-icon-empty{width:34px;height:34px;border-radius:8px;border:1px dashed var(--pp-muted);display:grid;place-items:center;color:var(--pp-muted);font:600 11px/1 var(--sans)}
  .pp-text{width:100%;height:34px;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);padding:0 10px;font:500 12.5px/1 var(--sans-zh);outline:none}
  .pp-textarea{width:100%;min-height:74px;max-height:150px;resize:vertical;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);padding:9px 10px;font:500 12.5px/1.45 var(--sans-zh);outline:none}
  .pp-text:focus,.pp-textarea:focus{border-color:var(--pp-blue);background:var(--pp-bg)}
  .pp-image{display:grid;grid-template-columns:42px 1fr;align-items:center;gap:9px}
  .pp-image-preview{width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--pp-border);border-radius:7px;background:var(--pp-chip);overflow:hidden;cursor:pointer}
  .pp-image-preview img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .pp-image-preview:not(.has-image)::before{content:"";width:17px;height:13px;border:1.7px solid var(--pp-muted);border-radius:2px;box-sizing:border-box}
  .pp-image-btn{height:34px;border:1px solid var(--pp-border);border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);font:500 12.5px/1 var(--sans-zh);cursor:pointer}
  .pp-image-btn:hover{background:var(--pp-chip-h)}
  .pp-image-file{display:none}
  .preview-prop-row.is-image-list{grid-template-columns:1fr;gap:9px}
  .pp-image-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(54px,1fr));gap:8px}
  .pp-image-slot{position:relative;min-width:0}
  .pp-image-slot-btn{width:100%;aspect-ratio:1;border:1px solid var(--pp-border);border-radius:7px;background:var(--pp-chip);display:grid;place-items:center;overflow:hidden;cursor:pointer;color:var(--pp-muted);font:700 11px/1 var(--mono)}
  .pp-image-slot-btn:hover{background:var(--pp-chip-h);border-color:var(--pp-blue)}
  .pp-image-slot-btn img{width:100%;height:100%;object-fit:cover;display:block}
  .pp-image-slot-clear{position:absolute;right:3px;top:3px;width:18px;height:18px;border:0;border-radius:50%;background:rgba(0,0,0,.58);color:#fff;font:700 13px/18px var(--sans);cursor:pointer}
  .preview-prop-row.is-textarea{grid-template-columns:1fr;gap:8px}
  .preview-prop-row.is-json{grid-template-columns:1fr;gap:8px}
  .pp-json{width:100%;min-height:82px;max-height:180px;resize:vertical;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);padding:9px 10px;font:500 11.5px/1.45 var(--mono);outline:none}
  .pp-json:focus{border-color:var(--pp-blue);background:var(--pp-bg)}
  .pp-json.is-invalid{border-color:#ef4444;color:#ef4444}
  /* footer actions */
  .preview-author{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px 0;border-top:1px solid var(--pp-divider)}
  .preview-author-name{min-width:0;color:var(--pp-fg2);font:650 12px/1 var(--sans-zh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .preview-author-links{display:flex;align-items:center;gap:6px;flex:none}
  .preview-author-links a{width:28px;height:28px;display:grid;place-items:center;border:1px solid transparent;border-radius:6px;color:var(--pp-icon);text-decoration:none;transition:background .15s,color .15s,border-color .15s}
  .preview-author-links a:hover{background:var(--pp-chip);border-color:var(--pp-border);color:var(--pp-fg)}
  .preview-author-links svg{width:16px;height:16px;display:block}
  .preview-actions{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto;align-items:stretch;gap:8px;padding:8px 14px 12px}
  #preview-present-btn.pp-present{display:flex;align-items:center;justify-content:center;gap:8px;min-width:0;height:36px;border:0;border-radius:6px;cursor:pointer;background:var(--pp-blue);color:#fff;font:600 13px/1 var(--sans-zh)}
  #preview-present-btn.pp-present:hover{background:var(--pp-blue-h)}
  #preview-present-btn.pp-present svg{width:16px;height:16px}
  .pp-export{position:relative;min-width:0}
  #preview-export-main{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:36px;border:1px solid var(--pp-border);border-radius:6px;cursor:pointer;background:var(--pp-chip);color:var(--pp-fg);font:500 13px/1 var(--sans-zh)}
  #preview-export-main:hover{background:var(--pp-chip-h)}
  #preview-export-main svg{width:16px;height:16px}
  #preview-export-main .pp-cap{transition:transform .2s}
  .pp-export.open #preview-export-main .pp-cap{transform:rotate(180deg)}

<script>
/* =============== Deck ViewModel Runtime =============== */
(function(){
  const vmEl = document.getElementById('deck-view-model');
  const textEl = document.getElementById('embedded-text-state');
  if(!vmEl) return;

  const STORE = 'dashi-ppt-view-model';
  const URL_STATE_PARAM = 'deckState';
  const URL_STATE_MAX_LENGTH = 60000;
  const URL_STATE_DEBOUNCE_MS = 260;
  const vm = readJson(vmEl, {});
  vm.state = vm.state || {};
  const embeddedText = readJson(textEl, {});
  const baseThemePack = document.documentElement.dataset.themePack || '';
  const baseState = {
    slideOrder: [...(vm.state.slideOrder || (vm.slides || []).map(slide => slide.id))],
    skippedSlides: uniqueIds(vm.state.skippedSlides || []),
    deletedSlides: uniqueIds(vm.state.deletedSlides || []),
    duplicatedSlides: Array.isArray(vm.state.duplicatedSlides) ? [...vm.state.duplicatedSlides] : [],
    text: {...(vm.state.text || {}), ...embeddedText},
    props: {...(vm.state.props || {})},
  };
  const urlStateStatus = {param:URL_STATE_PARAM, limit:URL_STATE_MAX_LENGTH, loaded:false, tooLarge:false, lastError:''};
  const deckSignature = createDeckSignature(vm, baseState.text);
  const urlState = readUrlEditState(deckSignature);
  const restored = urlState?.state || {};
  const saved = urlState ? {} : readSaved(deckSignature);
  vm.state.slideOrder = hasOwn(restored, 'slideOrder') ? restored.slideOrder : (saved.slideOrder || baseState.slideOrder);
  vm.state.skippedSlides = hasOwn(restored, 'skippedSlides') ? restored.skippedSlides : (saved.skippedSlides || baseState.skippedSlides);
  vm.state.deletedSlides = hasOwn(restored, 'deletedSlides') ? restored.deletedSlides : (saved.deletedSlides || baseState.deletedSlides);
  vm.state.duplicatedSlides = hasOwn(restored, 'duplicatedSlides') ? restored.duplicatedSlides : (saved.duplicatedSlides || baseState.duplicatedSlides);
  vm.state.text = {...baseState.text, ...(saved.text || {}), ...(restored.text || {})};
  vm.state.props = mergePropsStates(baseState.props, saved.props, restored.props);
  vm.state.__deckSignature = deckSignature;

  writeJson(textEl, vm.state.text);
  writeVm();
  updateUrlStateStatus({loaded:Boolean(urlState)});

  window.__deckViewModel = {
    model: vm,
    getState,
    setTextState,
    setSlideOrder,
    setSkippedSlides,
    setDeletedSlides,
    setProps,
    addDuplicatedSlide,
    restoreDuplicatedSlide,
    syncFromDom,
    write: writeVm,
    persist,
  };
  window.__getDeckViewModelState = getState;
  window.__syncDeckViewModelFromDom = syncFromDom;
  window.__deckUrlStateInitial = urlState || null;
  window.__deckUrlStateStatus = {...urlStateStatus};
  window.__scheduleDeckUrlStateWrite = scheduleUrlStateWrite;
  window.__writeDeckUrlStateNow = writeUrlStateNow;

  function getState(){
    return JSON.parse(JSON.stringify(vm.state || {}));
  }


  function setTextState(text){
    vm.state.text = {...(text || {})};
    writeJson(textEl, vm.state.text);
    writeVm();
    persist();
  }

  function setSlideOrder(order){
    vm.state.slideOrder = [...(order || [])];
    writeVm();
    persist();
  }

  function setSkippedSlides(ids){
    vm.state.skippedSlides = uniqueIds(ids);
    writeVm();
    persist();
  }

  function setDeletedSlides(ids){
    vm.state.deletedSlides = uniqueIds(ids);
    writeVm();
    persist();
  }

  function setProps(slideId, props){
    if(!slideId) return;
    vm.state.props[slideId] = {...(props || {})};
    writeVm();
    persist();
  }

  function addDuplicatedSlide(record, sourceModel){
    const copyId = restoreDuplicatedSlide(record, sourceModel);
    const sourceId = record?.sourceId;
    if(!copyId || !sourceId) return;
    const order = [...(vm.state.slideOrder || [])].filter(id => id !== copyId);
    const sourceOrderIndex = order.indexOf(sourceId);
    order.splice(sourceOrderIndex >= 0 ? sourceOrderIndex + 1 : order.length, 0, copyId);
    vm.state.slideOrder = order;
    writeVm();
    persist();
  }

  function restoreDuplicatedSlide(record, sourceModel){
    const copyId = record?.copyId;
    const sourceId = record?.sourceId;
    if(!copyId || !sourceId) return '';
    vm.state.duplicatedSlides = (vm.state.duplicatedSlides || []).filter(item => item.copyId !== copyId);
    vm.state.duplicatedSlides.push({...record});
    const sourceIndex = (vm.slides || []).findIndex(slide => slide.id === sourceId);
    const source = sourceModel || (sourceIndex >= 0 ? vm.slides[sourceIndex] : null) || {};
    const modelSlide = {
      ...source,
      id:copyId,
      key:record.copyKey || copyId,
      dataLayout:source.dataLayout || source.layout || '',
      props:{...(source.props || {}), ...(record.props || {})},
    };
    if(!Array.isArray(vm.slides)) vm.slides = [];
    const existingIndex = vm.slides.findIndex(slide => slide.id === copyId);
    if(existingIndex >= 0) vm.slides.splice(existingIndex, 1);
    const insertAt = sourceIndex >= 0 ? sourceIndex + 1 : vm.slides.length;
    vm.slides.splice(insertAt, 0, modelSlide);
    writeVm();
    return copyId;
  }

  function syncFromDom(){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    setSlideOrder(slides.map((slide, index) => slide.dataset.vmSlideId || vm.slides?.[index]?.id || `slide-${index + 1}`));
    return getState();
  }

  function readSaved(signature){
    try {
      const saved = JSON.parse(localStorage.getItem(STORE) || '{}') || {};
      return saved.__deckSignature === signature ? saved : {};
    } catch {
      return {};
    }
  }

  function persist(){
    vm.state.__deckSignature = deckSignature;
    try {
      localStorage.setItem(STORE, JSON.stringify(vm.state || {}));
    } catch (error) {
      console.warn('[deck view model] state could not be persisted', error);
    }
    scheduleUrlStateWrite();
  }

  function writeVm(){
    writeJson(vmEl, vm);
  }

  let urlStateWriteTimer = null;

  function scheduleUrlStateWrite(){
    if(urlStateWriteTimer !== null) clearTimeout(urlStateWriteTimer);
    urlStateWriteTimer = setTimeout(() => {
      urlStateWriteTimer = null;
      writeUrlStateNow();
    }, URL_STATE_DEBOUNCE_MS);
  }

  function writeUrlStateNow(){
    if(urlStateWriteTimer !== null){
      clearTimeout(urlStateWriteTimer);
      urlStateWriteTimer = null;
    }
    const payload = buildUrlEditState();
    const next = new URL(location.href);
    if(!payload){
      next.searchParams.delete(URL_STATE_PARAM);
      replaceUrlIfChanged(next);
      updateUrlStateStatus({encodedLength:0, tooLarge:false, lastError:''});
      return;
    }
    const encoded = encodeUrlState(payload);
    if(encoded.length > URL_STATE_MAX_LENGTH){
      next.searchParams.delete(URL_STATE_PARAM);
      replaceUrlIfChanged(next);
      updateUrlStateStatus({
        encodedLength:encoded.length,
        tooLarge:true,
        lastError:'too-large',
      });
      return;
    }
    next.searchParams.set(URL_STATE_PARAM, encoded);
    replaceUrlIfChanged(next);
    updateUrlStateStatus({encodedLength:encoded.length, tooLarge:false, lastError:''});
  }

  function replaceUrlIfChanged(next){
    const href = next.href;
    if(href === location.href) return;
    history.replaceState(history.state, document.title, href);
  }

  function buildUrlEditState(){
    const state = getState();
    const compact = {};
    const slideOrder = uniqueIds(state.slideOrder || []);
    if(!arraysEqual(slideOrder, baseState.slideOrder)) compact.slideOrder = slideOrder;
    const skippedSlides = uniqueIds(state.skippedSlides || []);
    if(skippedSlides.length) compact.skippedSlides = skippedSlides;
    const deletedSlides = uniqueIds(state.deletedSlides || []);
    if(deletedSlides.length) compact.deletedSlides = deletedSlides;
    const duplicatedSlides = sanitizeDuplicatedSlides(state.duplicatedSlides || []);
    if(duplicatedSlides.length) compact.duplicatedSlides = duplicatedSlides;
    const text = diffFlatState(state.text || {}, getDefaultTextState());
    if(Object.keys(text).length) compact.text = text;
    const props = compactPropsState(state.props || {});
    if(Object.keys(props).length) compact.props = props;
    const hasEditState = Object.keys(compact).length > 0;
    const view = readUrlViewState();
    if(!hasEditState && !viewHasChanges(view)) return null;
    return {
      v:1,
      sig:deckSignature,
      state:compact,
      view:hasEditState ? view : compactViewState(view),
    };
  }

  function viewHasChanges(view){
    return Boolean(view.themePack && view.themePack !== baseThemePack)
      || Number(view.currentSlide || 0) > 0;
  }

  function compactViewState(view){
    const next = {};
    if(view.themePack) next.themePack = view.themePack;
    if(Number(view.currentSlide || 0) > 0) next.currentSlide = view.currentSlide;
    return next;
  }

  function readUrlViewState(){
    const preview = window.__getPreviewState?.() || {};
    const currentSlide = Number(window.__currentSlideIndex || 0);
    return {
      themePack:String(preview.themePack || document.documentElement.dataset.themePack || ''),
      currentSlide:Number.isFinite(currentSlide) ? currentSlide : 0,
    };
  }

  function readUrlEditState(signature){
    const encoded = new URLSearchParams(location.search).get(URL_STATE_PARAM);
    if(!encoded) return null;
    if(encoded.length > URL_STATE_MAX_LENGTH){
      updateUrlStateStatus({encodedLength:encoded.length, tooLarge:true, lastError:'too-large'});
      return null;
    }
    try {
      const payload = JSON.parse(decodeUrlState(encoded));
      if(payload?.v !== 1) throw new Error('version');
      if(payload.sig && payload.sig !== signature){
        updateUrlStateStatus({encodedLength:encoded.length, lastError:'signature-mismatch'});
        return null;
      }
      const normalized = normalizeUrlEditState(payload);
      updateUrlStateStatus({encodedLength:encoded.length, loaded:true, lastError:''});
      return normalized;
    } catch (error) {
      updateUrlStateStatus({encodedLength:encoded.length, lastError:'invalid'});
      console.warn('[deck url state] could not be restored', error);
      return null;
    }
  }

  function normalizeUrlEditState(payload){
    const state = payload.state || {};
    const view = payload.view || {};
    return {
      v:1,
      sig:payload.sig || '',
      state:{
        ...(hasOwn(state, 'slideOrder') ? {slideOrder:uniqueIds(state.slideOrder)} : {}),
        ...(hasOwn(state, 'skippedSlides') ? {skippedSlides:uniqueIds(state.skippedSlides)} : {}),
        ...(hasOwn(state, 'deletedSlides') ? {deletedSlides:uniqueIds(state.deletedSlides)} : {}),
        ...(hasOwn(state, 'duplicatedSlides') ? {duplicatedSlides:sanitizeDuplicatedSlides(state.duplicatedSlides)} : {}),
        ...(state.text && typeof state.text === 'object' ? {text:sanitizeTextState(state.text)} : {}),
        ...(state.props && typeof state.props === 'object' ? {props:sanitizePropsState(state.props)} : {}),
      },
      view:{
        themePack: typeof view.themePack === 'string' ? view.themePack : '',
        currentSlide: Number.isFinite(Number(view.currentSlide)) ? Number(view.currentSlide) : null,
      },
    };
  }

  function sanitizeTextState(text){
    return Object.fromEntries(
      Object.entries(text || {})
        .filter(([key, value]) => key && typeof value === 'string'),
    );
  }

  function compactPropsState(props){
    const out = {};
    Object.entries(props || {}).forEach(([slideId, values]) => {
      const current = sanitizeForUrl(values);
      if(!current || typeof current !== 'object' || Array.isArray(current)) return;
      const base = sanitizeForUrl(getDefaultSlideProps(slideId)) || {};
      const diff = diffObject(current, base);
      if(diff && Object.keys(diff).length) out[slideId] = diff;
    });
    return out;
  }

  function sanitizePropsState(props){
    const out = {};
    Object.entries(props || {}).forEach(([slideId, values]) => {
      const sanitized = sanitizeForUrl(values);
      if(sanitized && typeof sanitized === 'object' && !Array.isArray(sanitized) && Object.keys(sanitized).length){
        out[slideId] = sanitized;
      }
    });
    return out;
  }

  function sanitizeDuplicatedSlides(records){
    return (Array.isArray(records) ? records : [])
      .map(record => {
        if(!record?.sourceId || !record?.copyId) return null;
        const sanitized = sanitizeForUrl({
          type:record.type || 'copy',
          sourceId:String(record.sourceId),
          copyId:String(record.copyId),
          copyKey:String(record.copyKey || record.copyId),
          themePack:record.themePack ? String(record.themePack) : '',
          props:record.props || {},
        });
        return sanitized?.sourceId && sanitized?.copyId ? sanitized : null;
      })
      .filter(Boolean);
  }

  function sanitizeForUrl(value){
    if(value == null) return value;
    if(typeof value === 'string'){
      return /^data:(image|video)\//i.test(value) ? undefined : value;
    }
    if(['number','boolean'].includes(typeof value)) return value;
    if(Array.isArray(value)){
      const items = value.map(sanitizeForUrl).filter(item => item !== undefined);
      return items.length ? items : undefined;
    }
    if(typeof value !== 'object') return undefined;
    if(typeof value.src === 'string' && /^data:(image|video)\//i.test(value.src)) return undefined;
    const out = {};
    Object.entries(value).forEach(([key, item]) => {
      const sanitized = sanitizeForUrl(item);
      if(sanitized !== undefined) out[key] = sanitized;
    });
    return Object.keys(out).length ? out : undefined;
  }

  function diffFlatState(current, base){
    const out = {};
    Object.entries(current || {}).forEach(([key, value]) => {
      if(value !== base[key]) out[key] = value;
    });
    return out;
  }

  function getDefaultTextState(){
    return {...(baseState.text || {}), ...(window.__getDeckDefaultTextState?.() || {})};
  }

  function diffObject(current, base){
    const out = {};
    Object.entries(current || {}).forEach(([key, value]) => {
      const baseValue = base?.[key];
      if(JSON.stringify(value) !== JSON.stringify(baseValue)) out[key] = value;
    });
    return out;
  }

  function getDefaultSlideProps(slideId){
    const source = (vm.slides || []).find(slide => slide.id === slideId)?.props || {};
    const slideEl = [...document.querySelectorAll('#deck > .slide')].find(slide => slide.dataset.vmSlideId === slideId);
    const defaults = readDatasetJson(slideEl?.querySelector('[data-prop-controls]')?.dataset.propDefaults, {});
    return {...defaults, ...source, ...(baseState.props?.[slideId] || {})};
  }

  function mergePropsStates(...states){
    const out = {};
    states.forEach(state => {
      Object.entries(state || {}).forEach(([slideId, values]) => {
        out[slideId] = {...(out[slideId] || {}), ...(values || {})};
      });
    });
    return out;
  }

  function encodeUrlState(payload){
    const bytes = new TextEncoder().encode(JSON.stringify(payload));
    let binary = '';
    const chunkSize = 0x8000;
    for(let i = 0; i < bytes.length; i += chunkSize){
      binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
    }
    return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/g, '');
  }

  function decodeUrlState(encoded){
    const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
    const padded = base64 + '='.repeat((4 - base64.length % 4) % 4);
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for(let i = 0; i < binary.length; i += 1) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder().decode(bytes);
  }

  function updateUrlStateStatus(update){
    Object.assign(urlStateStatus, update || {});
    window.__deckUrlStateStatus = {...urlStateStatus};
  }

  function hasOwn(object, key){
    return Object.prototype.hasOwnProperty.call(object || {}, key);
  }

  function arraysEqual(a, b){
    if(a.length !== b.length) return false;
    return a.every((item, index) => item === b[index]);
  }

  function readDatasetJson(value, fallback){
    try {
      return JSON.parse(value || '') || fallback;
    } catch {
      return fallback;
    }
  }

  function uniqueIds(ids){
    return [...new Set((ids || []).filter(Boolean).map(String))];
  }

  function readJson(el, fallback){
    if(!el) return fallback;
    try {
      return JSON.parse(el.textContent || '') || fallback;
    } catch {
      return fallback;
    }
  }

  function writeJson(el, data){
    if(el) el.textContent = JSON.stringify(data || {}).replace(/</g, '\\u003c');
  }

  function createDeckSignature(model, text){
    const payload = JSON.stringify({
      title: model.title,
      exportId: model.exportId || '',
      slides: (model.slides || []).map(slide => [slide.id, slide.key, slide.layout, slide.dataLayout, slide.props]),
      text,
    });
    let hash = 0;
    for(let i = 0; i < payload.length; i += 1){
      hash = ((hash << 5) - hash + payload.charCodeAt(i)) | 0;
    }
    return String(hash);
  }
})();

</script>
<script>
/* =============== 导航 =============== */
const deck=document.getElementById('deck');
const deckViewport=document.getElementById('deck-viewport');
const slideRail=document.getElementById('slide-rail');
const slideRailList=document.getElementById('slide-rail-list');
const slideRailCount=document.getElementById('slide-rail-count');
const slideRailResizeHandle=document.querySelector('[data-rail-resize-handle="true"]');
function collectDeckSlides(root=deck){
  return [...(root?.children || [])].filter(el => el.classList?.contains('slide'));
}
let allSlides=collectDeckSlides();
let slides=[...allSlides];
const nav=document.getElementById('nav');
let idx=0,total=0,lock=false;
let pendingNavigationDirection=0;
let deckW=innerWidth;
let deckH=innerHeight;
let deckLeft=0;
let deckTop=0;
let deckScale=1;
let activeThemePack=document.documentElement.dataset.themePack || '';
let deckMode='edit';
var overviewGrid=null;
let adjacentPreloadTimer=null;
const deckDiagnosticFlags={disableThumbGeneration:false,disableAdjacentPreload:false};
const CURRENT_SLIDE_STORE='dashi-ppt-current-slide';
const DECK_ASPECT_W=16;
const DECK_ASPECT_H=9;
document.body.dataset.mode=deckMode;
document.body.classList.add('preview-panel-open');

function isEditMode(){
  return deckMode === 'edit';
}

function isPresentMode(){
  return deckMode === 'present';
}

function canEditDeck(){
  return isEditMode() && !window.__deckExportLocked;
}
window.__canEditDeck = canEditDeck;
window.__setDeckDiagnosticFlags = flags => {
  Object.assign(deckDiagnosticFlags, flags || {});
  return {...deckDiagnosticFlags};
};
window.__getDeckDiagnosticFlags = () => ({...deckDiagnosticFlags});

function setDeckMode(mode){
  const next = mode === 'present' ? 'present' : 'edit';
  if(deckMode === next) return;
  deckMode = next;
  document.body.dataset.mode = deckMode;
  if(isPresentMode()){
    slideRail && (slideRail.inert = true);
    document.getElementById('preview-panel') && (document.getElementById('preview-panel').inert = true);
    if(typeof hideRailContextMenu === 'function') hideRailContextMenu();
    if(typeof pauseOverviewThumbs === 'function') pauseOverviewThumbs();
    if(typeof requestOverviewClosedPrewarm === 'function') requestOverviewClosedPrewarm(700);
    window.__setEditableTextMode?.(false);
  }else{
    slideRail && (slideRail.inert = false);
    document.getElementById('preview-panel') && (document.getElementById('preview-panel').inert = false);
    window.__setEditableTextMode?.(true);
    if(typeof refreshRailCatalog === 'function') refreshRailCatalog();
    if(typeof scrollOverviewToCurrent === 'function') scrollOverviewToCurrent();
  }
  layoutDeck();
  window.__syncActiveEffects?.();
}

async function enterPresentMode(){
  if(document.fullscreenElement){
    setDeckMode('present');
    return;
  }
  const root = document.documentElement;
  if(!root?.requestFullscreen) return;
  try {
    await root.requestFullscreen({navigationUI:'hide'});
    setDeckMode('present');
  } catch (error) {
    console.warn('[present fullscreen]', error);
  }
}
window.__enterPresentMode = enterPresentMode;

function exitPresentMode(){
  if(document.fullscreenElement){
    document.exitFullscreen?.().catch(error => console.warn('[present fullscreen exit]', error));
    return;
  }
  setDeckMode('edit');
}
window.__exitPresentMode = exitPresentMode;

document.addEventListener('keydown', event => {
  if(event.key !== 'Escape' || !isPresentMode()) return;
  if(document.fullscreenElement){
    document.exitFullscreen?.().catch(error => console.warn('[present fullscreen escape]', error));
    return;
  }
  exitPresentMode();
}, true);

document.addEventListener('fullscreenchange', () => {
  if(document.fullscreenElement){
    if(!isPresentMode()) setDeckMode('present');
  }else if(isPresentMode()){
    setDeckMode('edit');
  }
});

function getVisibleSlides(){
  return slides;
}
window.__getVisibleSlides = getVisibleSlides;

function getDeckPageNumberForSlide(slide){
  if(!slide) return null;
  const visible = slides && slides.length ? slides : [...document.querySelectorAll('#deck > .slide:not([hidden])')];
  const index = visible.indexOf(slide);
  if(index < 0) return null;
  return {
    current:index + 1,
    total:visible.length,
  };
}
window.__getDeckPageNumberForSlide = getDeckPageNumberForSlide;

function formatDeckPageNumber(value, pad=2){
  const number = Number(value);
  const text = Number.isFinite(number) ? String(Math.max(0, Math.trunc(number))) : String(value || '');
  return text.padStart(Math.max(0, Number(pad) || 0), '0');
}

function syncDeckPageNumbers(scope=document){
  const roots = [];
  if(scope instanceof Element && scope.classList.contains('slide')) roots.push(scope);
  else if(scope instanceof Element) roots.push(...scope.querySelectorAll('.slide'));
  else roots.push(...(slides || []));
  const seen = new Set();
  roots.forEach(slide => {
    if(!slide || seen.has(slide)) return;
    seen.add(slide);
    const state = getDeckPageNumberForSlide(slide);
    if(!state) return;
    slide.dataset.dashiPageCurrent = String(state.current);
    slide.dataset.dashiPageTotal = String(state.total);
    const signature = `${state.current}/${state.total}`;
    if(slide.dataset.dashiPageNumberSignature && slide.dataset.dashiPageNumberSignature !== signature){
      slide.dataset.overviewThumbRevision = String(Number(slide.dataset.overviewThumbRevision || 0) + 1);
    }
    slide.dataset.dashiPageNumberSignature = signature;
    slide.querySelectorAll('[data-dashi-page-number]').forEach(slot => {
      syncDeckPageNumberSlot(slot, state);
    });
  });
}
window.__syncDeckPageNumbers = syncDeckPageNumbers;

function syncDeckPageNumberSlot(slot, state){
  const pad = Number(slot.dataset.dashiPagePad || 2);
  const totalPad = Number(slot.dataset.dashiPageTotalPad || 2);
  const separator = slot.dataset.dashiPageSeparator || ' / ';
  const currentText = formatDeckPageNumber(state.current, pad);
  const totalText = formatDeckPageNumber(state.total, totalPad);
  const currentEl = slot.querySelector('[data-dashi-page-current]');
  const totalEl = slot.querySelector('[data-dashi-page-total]');
  const separatorEl = slot.querySelector('[data-dashi-page-separator]');
  if(currentEl) currentEl.textContent = currentText;
  if(totalEl) totalEl.textContent = totalText;
  if(separatorEl) separatorEl.textContent = separator;
  if(!currentEl && !totalEl){
    slot.textContent = slot.dataset.dashiPageNumber === 'current'
      ? currentText
      : `${currentText}${separator}${totalText}`;
  }
}

function currentSlideStoreKey(){
  const signature = window.__deckViewModel?.model?.state?.__deckSignature || location.pathname || 'deck';
  return `${CURRENT_SLIDE_STORE}:${signature}`;
}

function readStoredSlideIndex(){
  try {
    const raw = localStorage.getItem(currentSlideStoreKey());
    if(!raw) return null;
    const saved = JSON.parse(raw);
    const value = typeof saved === 'number' ? saved : saved?.index;
    return Number.isFinite(Number(value)) ? Number(value) : null;
  } catch {
    return null;
  }
}

function writeStoredSlideIndex(index){
  try {
    localStorage.setItem(currentSlideStoreKey(), JSON.stringify({
      index,
      updatedAt: new Date().toISOString(),
    }));
  } catch {}
  window.__scheduleDeckUrlStateWrite?.();
}

function previewStoreKey(){
  const signature = window.__deckViewModel?.model?.state?.__deckSignature || location.pathname || 'deck';
  return `dashi-ppt-preview:${signature}`;
}
window.__previewStoreKey = previewStoreKey;

function getSlideVmId(slide, index=allSlides.indexOf(slide)){
  return slide?.dataset?.vmSlideId || slide?.id || slide?.dataset?.layout || `slide-${Math.max(0, index) + 1}`;
}

function restorePersistedCatalogSlides(){
  const state = window.__deckViewModel?.getState?.() || {};
  const records = Array.isArray(state.duplicatedSlides) ? state.duplicatedSlides : [];
  if(!records.length) return;
  const slideById = new Map(collectDeckSlides().map((slide, index) => [getSlideVmId(slide, index), slide]));
  records.forEach(record => {
    if(!record?.sourceId || !record?.copyId || slideById.has(record.copyId)) return;
    const source = slideById.get(record.sourceId);
    if(!source) return;
    const clone = source.cloneNode(true);
    prepareDuplicatedSlideClone(clone, source, record.copyId);
    deck.insertBefore(clone, source.nextSibling);
    slideById.set(record.copyId, clone);
    const sourceModel = window.__deckViewModel?.model?.slides?.find(item => item.id === record.sourceId);
    window.__deckViewModel?.restoreDuplicatedSlide?.(record, sourceModel);
  });
}

function applyPersistedSlideOrder(){
  const order = window.__deckViewModel?.getState?.().slideOrder || [];
  if(!order.length) return;
  const current = collectDeckSlides();
  const slideById = new Map(current.map((slide, index) => [getSlideVmId(slide, index), slide]));
  order.forEach(id => {
    const slide = slideById.get(id);
    if(slide) deck.appendChild(slide);
  });
}

function getSlideStateSet(key){
  return new Set((window.__deckViewModel?.getState?.()?.[key] || []).filter(Boolean).map(String));
}

function isSlideHiddenByThemePack(slide){
  return !!(activeThemePack && slide?.dataset.themePack && slide.dataset.themePack !== activeThemePack);
}

function isSlideDeleted(slide, index=allSlides.indexOf(slide)){
  return getSlideStateSet('deletedSlides').has(getSlideVmId(slide, index));
}

function isSlideSkipped(slide, index=allSlides.indexOf(slide)){
  return getSlideStateSet('skippedSlides').has(getSlideVmId(slide, index));
}

function getCatalogSlides(){
  allSlides=collectDeckSlides();
  const deleted = getSlideStateSet('deletedSlides');
  return allSlides.filter((slide, index) => !isSlideHiddenByThemePack(slide) && !deleted.has(getSlideVmId(slide, index)));
}

function persistCatalogSlideOrder(){
  window.__deckViewModel?.setSlideOrder?.(getCatalogSlides().map((slide, index) => getSlideVmId(slide, index)));
}

function refreshSlideList(){
  allSlides=collectDeckSlides();
  const skipped = getSlideStateSet('skippedSlides');
  const deleted = getSlideStateSet('deletedSlides');
  allSlides.forEach((slide, index) => {
    const slideId = getSlideVmId(slide, index);
    const hiddenByPack = isSlideHiddenByThemePack(slide);
    const hiddenByState = deleted.has(slideId) || skipped.has(slideId);
    const hidden = hiddenByPack || hiddenByState;
    slide.hidden = hidden;
    if(skipped.has(slideId)) slide.dataset.slideSkipped = 'true';
    else delete slide.dataset.slideSkipped;
    if(hidden) slide.setAttribute('aria-hidden', 'true');
    else slide.removeAttribute('aria-hidden');
  });
  slides=allSlides.filter(slide => !slide.hidden);
  total=slides.length;
  if(total === 0) idx=0;
  if(idx >= total) idx=Math.max(0,total-1);
  syncDeckPageNumbers();
}

function ensureRuntimeSlideRendered(slide, values){
  if(!slide) return false;
  const slideId = slide.dataset.vmSlideId;
  const sourceProps = window.__deckViewModel?.model?.slides?.find(item => item.id === slideId)?.props || {};
  const savedProps = window.__deckViewModel?.getState?.().props?.[slideId] || {};
  const next = {...sourceProps, ...savedProps, ...(values || {})};
  const rendered = !!window.__renderRuntimeSlide?.(slide, next);
  if(rendered) window.__initEditableText?.(slide);
  return rendered;
}
window.__ensureRuntimeSlideRendered = ensureRuntimeSlideRendered;

function prepareSlideForTransition(slide, values){
  if(!slide) return false;
  const rendered = ensureRuntimeSlideRendered(slide, values);
  window.__restoreEffectIframes?.(slide);
  slide.dataset.transitionReady = 'true';
  return rendered || !!slide.firstElementChild;
}
window.__prepareSlideForTransition = prepareSlideForTransition;

function startTransitionSlideEnter(slide){
  if(!slide) return false;
  window.__transitionEnteredSlide = slide;
  slide.dataset.transitionEnterStarted = 'true';
  slide.setAttribute('data-deck-active', '');
  window.__restoreEffectIframes?.(slide);
  window.__syncActiveEffects?.(slide);
  return true;
}
window.__startTransitionSlideEnter = startTransitionSlideEnter;

function preloadAdjacentSlides(activeIndex=idx, opts={}){
  if(deckDiagnosticFlags.disableAdjacentPreload) return;
  const targets = [activeIndex + 1, activeIndex - 1]
    .filter(index => index >= 0 && index < slides.length)
    .map(index => slides[index])
    .filter(Boolean);
  if(!targets.length) return;
  const run = () => targets.forEach(slide => prepareSlideForTransition(slide));
  const delay = Number(opts.delay || 0);
  if(delay > 0){
    if(adjacentPreloadTimer !== null) clearTimeout(adjacentPreloadTimer);
    adjacentPreloadTimer = setTimeout(() => {
      adjacentPreloadTimer=null;
      if(activeIndex === idx) preloadAdjacentSlides(activeIndex);
    }, delay);
    return;
  }
  if('requestIdleCallback' in window) requestIdleCallback(run, {timeout: 260});
  else setTimeout(run, 60);
}
window.__preloadAdjacentSlides = preloadAdjacentSlides;

function setActiveThemePack(themePack, opts={}){
  activeThemePack=themePack || '';
  if(activeThemePack) document.documentElement.dataset.themePack=activeThemePack;
  else document.documentElement.removeAttribute('data-theme-pack');
  refreshSlideList();
  renderNav();
  layoutDeck();
  if(opts.navigate !== false) go(0, {animate:false, skipThumbPause:true});

const theme10SkipTags = new Set(['STYLE','SCRIPT','BR','HR','DEFS']);
const theme10AtomicTags = new Set(['SVG','CANVAS','IMG','VIDEO','IMAGE-SLOT']);

function theme10ElementChildren(node){
  const out = [];
  for(let child = node?.firstElementChild; child; child = child.nextElementSibling){
    if(!theme10SkipTags.has(child.tagName)) out.push(child);
  }
  return out;
}

function playTheme10Motion(slide){
  if(!slide?.hasAttribute?.('data-deck-active')) return false;
  const wrap = slide?.querySelector?.('.ds-slidewrap');
  const root = wrap?.firstElementChild || wrap;
  if(!root) return false;
  const groups = theme10ElementChildren(root);
  let targets = [];
  groups.forEach(group => {
    const children = theme10ElementChildren(group);
    if(children.length >= 2 && children.length <= 10 && !theme10AtomicTags.has(group.tagName)) targets.push(...children);
    else targets.push(group);
  });
  if(targets.length < 2 || targets.length > 26) targets = groups;
  if(!targets.length) return false;
  targets = targets.map(el => {
    const rect = el.getBoundingClientRect();
    return {el, top:rect.top, left:rect.left};
  }).sort((a,b) => {
    const band = Math.round(a.top / 64) - Math.round(b.top / 64);
    return band !== 0 ? band : a.left - b.left;
  }).map(item => item.el);
  targets.forEach(el => {
    el.classList.remove('ds-anim','ds-fade');
    el.style.removeProperty('--ds-d');
  });
  void root.offsetWidth;
  const step = Math.max(34, Math.min(72, Math.round(620 / targets.length)));
  targets.forEach((el, index) => {
    const position = getComputedStyle(el).position;
    const fade = position === 'absolute' || position === 'fixed' || theme10AtomicTags.has(el.tagName);
    el.style.setProperty('--ds-d', `${50 + index * step}ms`);
    el.classList.add(fade ? 'ds-fade' : 'ds-anim');
  });
  return true;
}

function syncTheme10Motion(activeSlide=getActiveSlide()){

    if(!activeSlide?.isConnected || !activeSlide.hasAttribute('data-deck-active')) return;

var chartMotionInclude = /chart|plot|axis|bar|bars|column|line|area|stream|trend|slope|spark|curve|donut|pie|ring|radar|rose|polar|funnel|waterfall|matrix|heat|map|mekko|scatter|bubble|treemap|waffle|gauge|meter|rank|score|stack/i;
var chartMotionExclude = /icon|logo|avatar|photo|image|media|slot|decor|ornament|bg|backdrop|button|toggle|nav|caption/i;

function chartMotionClassText(el){
  const value = el?.className;
  if(!value) return '';
  if(typeof value === 'string') return value;
  return value.baseVal || '';
}

function hasAnimatedAncestor(el, boundary){
  let current = el;
  let depth = 0;
  while(current && current !== boundary && depth++ < 4){
    const style = getComputedStyle(current);
    if(style.animationName && style.animationName !== 'none') return true;
    current = current.parentElement;
  }
  return false;
}

function isChartMotionContext(el, boundary){
  if(!chartMotionInclude || !chartMotionExclude) return false;
  let current = el;
  let depth = 0;
  while(current && current !== boundary && depth++ < 5){
    const text = chartMotionClassText(current);
    if(chartMotionInclude.test(text)) return !chartMotionExclude.test(text);
    current = current.parentElement;
  }
  const svg = el.closest?.('svg');
  const rootText = `${boundary?.dataset?.pageKey || ''} ${boundary?.dataset?.propControls || ''} ${boundary?.dataset?.propDefaults || ''}`;
  if(svg && chartMotionInclude.test(rootText) && svg.querySelectorAll('path,polyline,line,rect,circle,ellipse').length >= 3) return true;
  return false;
}

function chartMotionRole(el, boundary){
  if(!isChartMotionContext(el, boundary) || hasAnimatedAncestor(el, boundary)) return '';
  const tag = String(el.tagName || '').toUpperCase();
  const text = chartMotionClassText(el);
  const context = `${chartMotionClassText(el.parentElement)} ${text}`;
  if((tag === 'PATH' || tag === 'POLYLINE' || tag === 'LINE') && getComputedStyle(el).stroke !== 'none') return /area|stream/i.test(context) ? 'area' : 'line';
  if(tag === 'CIRCLE' || tag === 'ELLIPSE') return getComputedStyle(el).stroke !== 'none' ? 'line' : 'point';
  if(tag === 'RECT') return /heat|matrix|waffle|treemap/i.test(context) ? 'cell' : 'bar';
  if(/bar|column|fill|seg|meter|progress/i.test(text)) return /row|rank|funnel|waterfall|dumbbell/i.test(context) ? 'row' : 'bar';
  if(/cell|tile|block|bucket|node|dot|point/i.test(text)) return 'cell';
  return '';
}

function syncChartGrowthMotion(activeSlide=getActiveSlide(), tries=0){
  if(!activeSlide?.isConnected || !activeSlide.hasAttribute('data-deck-active')) return;
  const root = activeSlide?.querySelector?.('.imported-theme-root');
  if(!root) return;
  if(root.dataset.themeKey === 'theme10') return;
  const candidates = [...root.querySelectorAll('svg path,svg polyline,svg line,svg rect,svg circle,svg ellipse,div,span,i,li')];
  let index = 0;
  for(const el of candidates){
    const role = chartMotionRole(el, root);
    if(!role) continue;
    el.dataset.chartMotion = role;
    el.style.setProperty('--chart-motion-i', String(Math.min(index, 24)));
    if(role === 'line' && typeof el.getTotalLength === 'function'){
      try { el.style.setProperty('--chart-motion-len', String(Math.ceil(el.getTotalLength()) || 640)); } catch {}
    }
    index += 1;
    if(index >= 160) break;
  }
  if(index === 0 && tries < 8) requestAnimationFrame(() => syncChartGrowthMotion(activeSlide, tries + 1));
}

function go(n, opts={}){
  blurActiveEditableText();
  if(window.__deckExportLocked && !opts.force) return;
  if(lock){
    if(isEditMode() && !opts.force){
      pendingNavigationDirection = n > idx ? 1 : n < idx ? -1 : pendingNavigationDirection;
    }
    return;
  }
  if(isEditMode() && !opts.force && !opts.skipThumbPause) pauseOverviewThumbs();

  if(total <= 0){
    lock=true;
    commitSlideIndex(0, opts);
    requestAnimationFrame(releaseDeckNavigationLock);
    return;
  }
  const nextIndex=Math.max(0,Math.min(total-1,n));
  const currentSlide=slides[idx];
  const nextSlide=slides[nextIndex];
  const mode = opts.animate === false || nextIndex === idx || nextSlide?.querySelector?.('[data-page-key="theme05_page048"]')
    ? 'none'

  if(mode !== 'none') prepareSlideForTransition(nextSlide);
  if(mode !== 'none' && typeof window.__playPageTransition === 'function' && currentSlide && nextSlide){
    let committed=false;

      committed=true;
      commitSlideIndex(nextIndex, opts);

    const transitionOptions = isEditMode() ? {...opts, commitEarly:true, nonBlocking:true} : opts;
    const transition = window.__playPageTransition(mode, currentSlide, nextSlide, nextIndex >= idx ? 1 : -1, commit, transitionOptions);
    if(isEditMode()){

      .catch(error => console.warn('[page transition]', error))
      .finally(() => {

  requestAnimationFrame(releaseDeckNavigationLock);

function duplicateCatalogSlide(catalogIndex){
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  const source = catalogSlides[catalogIndex];

  const previousActiveSlide = slides[idx];
  const sourceId = getSlideVmId(source, allSlides.indexOf(source));
  const copyId = `${sourceId}__copy_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 6)}`;
  const clone = source.cloneNode(true);
  prepareDuplicatedSlideClone(clone, source, copyId);
  deck.insertBefore(clone, source.nextSibling);
  const sourceModel = window.__deckViewModel?.model?.slides?.find(item => item.id === sourceId);
  const state = window.__deckViewModel?.getState?.() || {};
  window.__deckViewModel?.addDuplicatedSlide?.({
    type:'copy',
    sourceId,
    copyId,
    copyKey:copyId,
    themePack:source.dataset.themePack || activeThemePack || '',
    props:{...(state.props?.[sourceId] || {})},
  }, sourceModel);

  ensureRuntimeSlideRendered(clone);

function prepareDuplicatedSlideClone(clone, source, copyId){
  clone.id = copyId;
  clone.dataset.vmSlideId = copyId;
  clone.dataset.vmSlideKey = copyId;
  clone.dataset.slideId = copyId;
  delete clone.dataset.overviewThumbRevision;

  clone.hidden = false;
  clone.querySelectorAll('[data-editable-id]').forEach(el => {
    el.removeAttribute('data-editable-id');

    delete el.dataset.editing;

  });
  clone.querySelectorAll('[id]').forEach(el => {
    if(el === clone) return;
    if(/^(clip|mask|filter|pattern|gradient|linear|radial)/i.test(el.id || '')) return;
    el.id = `${el.id}__${copyId}`;
  });
  clone.querySelectorAll('image-slot[id],.dslot[id],.acl-slot[id],.kx-imgslot[id],[data-slot-id],[data-dashi-slot-id]').forEach((el, index) => {
    if(el.id) el.id = `${el.id}__${copyId}`;

    if(el.dataset.mediaKey) el.dataset.mediaKey = `${copyId}:${el.dataset.mediaKey}`;
    if(!el.id && el.tagName?.toLowerCase?.() === 'image-slot') el.id = `${copyId}-slot-${index + 1}`;
  });
}

function toggleCatalogSlideSkipped(catalogIndex){
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  const slide = catalogSlides[catalogIndex];
  if(!slide) return false;
  const slideId = getSlideVmId(slide, allSlides.indexOf(slide));
  const skipped = getSlideStateSet('skippedSlides');
  const currentlySkipped = skipped.has(slideId);
  if(!currentlySkipped && slides.length <= 1) return false;
  const previousActiveSlide = slides[idx];
  const preferredIndex = Math.max(0, slides.indexOf(slide));
  if(currentlySkipped) skipped.delete(slideId);
  else skipped.add(slideId);
  window.__deckViewModel?.setSkippedSlides?.([...skipped]);
  updateAfterCatalogMutation(previousActiveSlide === slide ? null : previousActiveSlide, preferredIndex, {type:currentlySkipped ? 'unskip' : 'skip', slideId});
  return true;
}

function getOverviewGridMetrics(grid=overviewGrid){
  if(!grid) return null;
  const firstCard = grid.querySelector('[data-overview-card="true"]');
  if(!firstCard) return null;
  const style = getComputedStyle(grid);
  const columns = (style.gridTemplateColumns || '').split(' ').filter(Boolean).length || 1;
  const rowGap = parseFloat(style.rowGap || style.gap || OVERVIEW_CARD_GAP + 10) || (OVERVIEW_CARD_GAP + 10);
  const cardRect = firstCard.getBoundingClientRect();
  const cardHeight = firstCard.offsetHeight || cardRect.height || 1;
  return {
    columns,
    rowHeight: cardHeight + rowGap,
    cardHeight,
    gridTop: grid.offsetTop,
  };
}

function getOverviewThumbRange(grid=overviewGrid, {includeNear=false}={}){
  if(!grid) return {cards:[], visibleCards:[], nearCards:[]};
  const cards = getOverviewCards(grid);
  const metrics = getOverviewGridMetrics(grid);
  if(!metrics || !cards.length) return {cards:[], visibleCards:[], nearCards:[]};
  const rangeFor = margin => {
    const top = ov.scrollTop - margin;
    const bottom = ov.scrollTop + ov.clientHeight + margin;
    const startRow = Math.max(0, Math.floor((top - metrics.gridTop) / metrics.rowHeight));
    const endRow = Math.max(startRow, Math.floor((bottom - metrics.gridTop - 1) / metrics.rowHeight));
    const start = Math.max(0, startRow * metrics.columns);
    const end = Math.min(cards.length, (endRow + 1) * metrics.columns);
    return cards.slice(start, end);
  };
  const visibleCards = rangeFor(0);
  const nearCards = includeNear ? rangeFor(OVERVIEW_THUMB_NEAR_MARGIN).filter(card => !visibleCards.includes(card)) : [];
  return {cards:[...visibleCards, ...nearCards], visibleCards, nearCards};
}

function getOverviewDropSlot(e, grid, rects=overviewDragRects){
  if(!rects?.length) return null;
  const y = e.clientY;
  let best = null;
  rects.forEach((item, index) => {
    const rect = item.rect;
    const cy = rect.top + rect.height / 2;
    const x = e.clientX;
    const dx = Math.max(rect.left - x, 0, x - rect.right);
    const dy = Math.max(rect.top - y, 0, y - rect.bottom);
    const distance = dx * dx + dy * dy;
    if(!best || distance < best.distance) best = {item, index, rect, distance, before:y < cy};
  });
  if(!best) return null;
  const index = best.before ? best.index : best.index + 1;
  const marker = getOverviewDropMarkerRect(rects, index);
  return marker ? {index, kind:'horizontal', ...marker} : null;
}

function getOverviewDropMarkerRect(rects, index){
  const previous = rects[index - 1]?.rect;
  const next = rects[index]?.rect;
  let y = 0;
  if(previous && next){
    y = (previous.bottom + next.top) / 2;
  }else if(next){
    y = next.top - OVERVIEW_CARD_GAP / 2;
  }else if(previous){
    y = previous.bottom + OVERVIEW_CARD_GAP / 2;
  }else{
    return null;
  }
  return {y};
}

function fitOverviewThumb(wrap, sourceSize=getOverviewSourceSize()){
    const clone = wrap.firstElementChild;
    if(!clone) return;
    const width = Number(clone.dataset.overviewSourceWidth || 0) || sourceSize.width;
    const height = Number(clone.dataset.overviewSourceHeight || 0) || sourceSize.height;
    const rect = wrap.getBoundingClientRect();
    const targetWidth = rect.width || wrap.clientWidth || OVERVIEW_CARD_WIDTH;
    const targetHeight = rect.height || wrap.clientHeight || (targetWidth * OVERVIEW_ASPECT_H / OVERVIEW_ASPECT_W);
    const roundedTargetWidth = Math.round(targetWidth * 100) / 100;
    const roundedTargetHeight = Math.round(targetHeight * 100) / 100;
    const fitSignature = `${width}x${height}:${roundedTargetWidth}x${roundedTargetHeight}`;
    if(clone.dataset.overviewFitSignature === fitSignature) return;
    wrap.style.aspectRatio = `${OVERVIEW_ASPECT_W} / ${OVERVIEW_ASPECT_H}`;
    clone.style.width = `${width}px`;
    clone.style.height = `${height}px`;
    const scale = Math.min(targetWidth / width, targetHeight / height);
    const x = (targetWidth - width * scale) / 2;
    const y = (targetHeight - height * scale) / 2;
    clone.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    clone.dataset.overviewFitSignature = fitSignature;
}

function createOverviewDomPreview(slide){
  const derivedStartAt = performance.now();
  ensureRuntimeSlideRendered(slide);
  const {width, height} = getOverviewSourceSize();
  const clone = slide.cloneNode(true);
  clone.dataset.overviewSourceWidth=String(width);
  clone.dataset.overviewSourceHeight=String(height);
  clone.hidden=false;
  clone.classList.add('active');
  clone.setAttribute('data-deck-active', '');
  const targetWidth = OVERVIEW_CARD_WIDTH;
  const targetHeight = OVERVIEW_CARD_WIDTH * OVERVIEW_ASPECT_H / OVERVIEW_ASPECT_W;
  const scale = Math.min(targetWidth / width, targetHeight / height);
  const x = (targetWidth - width * scale) / 2;
  const y = (targetHeight - height * scale) / 2;
  clone.dataset.overviewFitSignature = `${width}x${height}:${targetWidth}x${targetHeight}`;
  clone.style.cssText=`width:${width}px;height:${height}px;--deck-w:${width}px;--deck-h:${height}px;--deck-scale:1;transform-origin:top left;position:absolute;top:0;left:0;margin:0;pointer-events:none;transform:translate(${x}px, ${y}px) scale(${scale});contain:layout paint style`;
  clone.querySelectorAll('script,style,template,noscript').forEach(node => node.remove());
  clone.querySelectorAll('iframe,video').forEach(node => {
    const placeholder = document.createElement('div');
    placeholder.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.08)';
    node.replaceWith(placeholder);
  });
  clone.querySelectorAll('*').forEach(node => {
    node.removeAttribute('contenteditable');
    node.removeAttribute('tabindex');
    node.removeAttribute('aria-describedby');
    node.style.animation='none';
    node.style.animationDelay='0s';
    node.style.animationDuration='0s';
    node.style.animationPlayState='paused';
    node.style.transition='none';
    if(node.hasAttribute('data-chart-motion')){
      node.style.opacity='1';
      node.style.transform='none';
      node.style.strokeDashoffset='0';
    }
  });
  recordOverviewStage('dom-derived-preview', derivedStartAt, {
    slideId:getOverviewStableSlideId(slide),
    candidateCount:clone.querySelectorAll('*').length,
    rectReadCount:0,
    styleReadCount:0,
    count:1,
  });
  return clone;
}

function rememberOverviewThumb(slide, value){
  const entry = {...(value || {})};
  const key = getOverviewThumbCacheKey(slide);
  overviewThumbBitmapCache.set(key, {...entry, usedAt: Date.now()});
  while(overviewThumbBitmapCache.size > OVERVIEW_THUMB_CACHE_LIMIT){
    let oldestKey=null;
    let oldestTime=Infinity;
    overviewThumbBitmapCache.forEach((value, key) => {
      const usedAt = Number(value?.usedAt || 0);
      if(usedAt < oldestTime){
        oldestTime=usedAt;
        oldestKey=key;
      }
    });
    if(!oldestKey) break;
    overviewThumbBitmapCache.delete(oldestKey);
  }
}

function rememberOverviewThumbFromDom(slide, node){
  rememberOverviewThumb(slide, {
    children:[node.cloneNode(true)],
    nodeCount:node.querySelectorAll('*').length + 1,
  });
}

function requestOverviewClosedPrewarm(delay=900){
  if(overviewClosedPrewarmTimer !== null) clearTimeout(overviewClosedPrewarmTimer);
  overviewClosedPrewarmTimer = setTimeout(() => {
    overviewClosedPrewarmTimer=null;
    runOverviewClosedPrewarm();
  }, delay);
}

function runOverviewClosedPrewarm(){
  const runId = ++overviewClosedPrewarmRunId;
  if(isEditMode()) return;
  const catalogSlides = getCatalogSlides();
  const activeIndex = Math.max(0, catalogSlides.indexOf(slides[idx]));
  const start = Math.max(0, activeIndex - 2);
  const targets = catalogSlides.slice(start, start + 24);
  targets.forEach((slide, order) => {
    setTimeout(() => {
      if(isEditMode() || runId !== overviewClosedPrewarmRunId) return;
      predecodeOverviewSlideResources(slide);
      prewarmOverviewThumbCache(slide, runId);
    }, order * 160);
  });
}

function prewarmOverviewThumbCache(slide, runId){
  if(!slide || isEditMode() || runId !== overviewClosedPrewarmRunId) return;
  const key = getOverviewThumbCacheKey(slide);
  if(overviewThumbBitmapCache.has(key)) return;
  const startAt = performance.now();
  try{
    const preview = createOverviewDomPreview(slide);
    rememberOverviewThumbFromDom(slide, preview);
    recordOverviewStage('closed-rail-thumb-prewarm', startAt, {
      slideId:getOverviewStableSlideId(slide),
      count:1,
    });
  }catch(error){
    console.warn('[overview prewarm]', error);
  }finally{
    if(slide !== slides[idx]) window.__releaseRuntimeSlide?.(slide);
  }
}

function predecodeOverviewSlideResources(slide){
  const urls = new Set();
  slide.querySelectorAll('img[src],video[poster],[style*="url("]').forEach(node => {
    const src = node.getAttribute('src') || node.getAttribute('poster');
    if(src) urls.add(src);
    const style = node.getAttribute('style') || '';
    [...style.matchAll(/url\((['"]?)(.*?)\1\)/g)].forEach(match => {
      if(match[2]) urls.add(match[2]);
    });
  });
  [...urls].slice(0, 24).forEach(value => {
    if(!value || /^(data:|blob:)/i.test(value)) return;
    const img = new Image();
    try { img.src = new URL(value, location.href).href; } catch { img.src = value; }
    img.decode?.().catch(() => {});
  });
}

function getOverviewPreviewCost(slide){
  if(!slide) return 0;
  const elementCount = slide.querySelectorAll('*').length;
  const mediaCount = slide.querySelectorAll('img,svg,canvas,video,iframe,[style*="url("]').length;
  return elementCount + mediaCount * 8;
}

async function renderOverviewThumb(wrap, runId=overviewThumbRunId){
  if(!isEditMode() || !wrap?.isConnected || wrap.dataset.overviewRendered === 'true') return;
  delete wrap.dataset.overviewQueued;
  const card = wrap.closest('[data-overview-card="true"]');
  const slide = card?.__overviewSlide || getCatalogSlides()[Number(card?.dataset.index)];
  if(!slide || runId !== overviewThumbRunId) return;
  const previewStartAt = performance.now();
  const trigger = wrap.dataset.overviewTrigger || 'queue';
  try {
    if(runId !== overviewThumbRunId || !isEditMode() || !wrap.isConnected) return;
    const cachedThumb = overviewThumbBitmapCache.get(getOverviewThumbCacheKey(slide));
    if(restoreOverviewThumb(wrap, cachedThumb)){
      fitOverviewThumb(wrap);
      recordOverviewStage('dom-cache-restore', previewStartAt, {slideId:getOverviewStableSlideId(slide)});
      return;
    }
    await renderOverviewThumbDomPreview(wrap, slide);
    fitOverviewThumb(wrap);
    recordOverviewStage('dom-preview-thumbnail', previewStartAt, {slideId:getOverviewStableSlideId(slide)});
  } catch (error) {
    if(runId !== overviewThumbRunId || !isEditMode() || !wrap.isConnected) return;
    console.warn('[overview thumb]', error);
    delete wrap.dataset.overviewRendered;
    wrap.dataset.overviewMode='placeholder';
    wrap.dataset.overviewError='true';
    if(!wrap.querySelector('[data-overview-placeholder="true"]')) wrap.replaceChildren(createOverviewThumbPlaceholder());
    recordOverviewStage('overview-thumb-error', previewStartAt, {
      slideId:getOverviewStableSlideId(slide),
      count:1,
    });
  } finally {
    recordOverviewStage('overview-thumb-task', previewStartAt, {
      slideId:getOverviewStableSlideId(slide),
      trigger,
    });
    if(slide !== slides[idx]) window.__releaseRuntimeSlide?.(slide);
    requestOverviewProgressUpdate();
  }
}

function scheduleOverviewThumbQueue(opts={}){
  const immediate = !!opts.immediate;
  if(overviewThumbProcessing || !isEditMode()) return;
  if(overviewThumbScheduled){
    if(immediate && overviewThumbQueueHandle !== null){
      clearTimeout(overviewThumbQueueHandle);
      overviewThumbQueueHandle=null;
      overviewThumbScheduled=false;
    }else{
      return;
    }
  }
  overviewThumbScheduled=true;
  const runId = overviewThumbRunId;
  overviewThumbQueueHandle = setTimeout(async () => {
    overviewThumbQueueHandle=null;
    overviewThumbScheduled=false;
    if(!isEditMode() || runId !== overviewThumbRunId) return;
    const sliceStartAt = performance.now();
    const budgetMs = 10;
    overviewPerfMarks.queueRuns.push({at:sliceStartAt, scheduler:'time-sliced', budgetMs, queueLength:overviewThumbQueue.length});
    if(performance.now() < overviewThumbPauseUntil){
      if(overviewThumbQueue.length) scheduleOverviewThumbQueue();
      return;
    }
    let processed=0;
    while(overviewThumbQueue.length && isEditMode() && runId === overviewThumbRunId){
      if(performance.now() < overviewThumbPauseUntil) break;
      if(processed > 0 || performance.now() - sliceStartAt >= budgetMs) break;
      const wrap = overviewThumbQueue.shift();
      if(wrap?.dataset) delete wrap.dataset.overviewQueued;
      if(wrap?.isConnected && wrap.dataset.overviewRendered !== 'true'){
        overviewThumbProcessing=true;
        try {
          await renderOverviewThumb(wrap, runId);
        } finally {
          overviewThumbProcessing=false;
        }
      }
      processed += 1;
      if(processed >= 1) break;
    }
    if(isEditMode() && runId === overviewThumbRunId && overviewThumbQueue.length) scheduleOverviewThumbQueue();
  }, immediate ? 0 : OVERVIEW_THUMB_QUEUE_DELAY);
}

function queueOverviewThumb(wrap, priority=false){
  if(!wrap || wrap.dataset.overviewRendered === 'true') return;
  if(wrap.dataset.overviewQueued === 'true'){
    if(priority){
      const existing = overviewThumbQueue.indexOf(wrap);
      if(existing > 0){
        overviewThumbQueue.splice(existing, 1);
        overviewThumbQueue.unshift(wrap);
      }
    }
    return;
  }
  wrap.dataset.overviewQueued='true';
  wrap.dataset.overviewKey = wrap.closest('[data-overview-card="true"]')?.dataset.slideId || '';
  wrap.dataset.overviewTrigger = priority ? 'visible' : 'near';
  if(priority) overviewThumbQueue.unshift(wrap);
  else overviewThumbQueue.push(wrap);
  scheduleOverviewThumbQueue({immediate:priority});
}

function setOverviewThumbQueue(items, opts={}){
  const next=[];
  const queued=new Set();
  items.forEach(item => {
    const wrap = item?.wrap;
    if(!wrap || queued.has(wrap) || wrap.dataset.overviewRendered === 'true') return;
    queued.add(wrap);
    wrap.dataset.overviewQueued='true';
    wrap.dataset.overviewKey = wrap.closest('[data-overview-card="true"]')?.dataset.slideId || '';
    wrap.dataset.overviewTrigger = item.trigger || 'near';
    next.push(wrap);
  });
  overviewThumbQueue.forEach(wrap => {
    if(!queued.has(wrap) && wrap?.dataset) delete wrap.dataset.overviewQueued;
  });
  overviewThumbQueue=next;
  if(overviewThumbQueue.length) scheduleOverviewThumbQueue({immediate:!!opts.immediate});
}

function queueNearbyOverviewThumbs(opts={}){
  if(!isEditMode()) return;
  const startAt = performance.now();
  const range = getOverviewThumbRange(overviewGrid, {includeNear:true});
  const visibleWraps = getOverviewViewportThumbs();
  overviewProgressThumbs = visibleWraps;
  if(deckDiagnosticFlags.disableThumbGeneration){
    setOverviewThumbQueue([]);
    recordOverviewLayoutRead('queue-nearby', 'range-card-metrics', range.cards.length);
    recordOverviewStage('queue-nearby-overview-thumbs', startAt, {count:range.cards.length, queued:0, disabled:true});
    return;
  }
  let activeWrap = null;
  const activeKey = getOverviewSlideKey(slides[idx]);
  range.cards.forEach(card => {
    const wrap = card.querySelector('[data-overview-thumb="true"]');
    if(card?.dataset.slideKey === activeKey) activeWrap = wrap;
  });
  const items = [];
  if(activeWrap) items.push({wrap:activeWrap, trigger:'active'});
  const visibleEntries = visibleWraps
    .map(wrap => {
      const card = wrap.closest('[data-overview-card="true"]');
      return {wrap, trigger:'visible', cost:getOverviewPreviewCost(card?.__overviewSlide)};
    })
    .sort((a, b) => a.cost - b.cost);
  visibleEntries.forEach(item => items.push(item));
  setOverviewThumbQueue(items, {immediate:!!opts.immediate});
  recordOverviewLayoutRead('queue-nearby', 'range-card-metrics', range.cards.length);
  recordOverviewStage('queue-nearby-overview-thumbs', startAt, {count:range.cards.length, queued:items.length});
}
function queueVisibleOverviewThumbs(){

}

function requestOverviewThumbRefresh(afterPause=false, opts={}){
  if(!isEditMode()) return;
  const runId = overviewThumbRunId;
  const refresh = () => {
    overviewThumbRefreshTimer=null;
    overviewThumbRefreshQueued=false;
    if(runId !== overviewThumbRunId) return;
    if(isEditMode()) queueNearbyOverviewThumbs({immediate:!!opts.priority});
  };
  if(afterPause){
    if(overviewThumbRefreshTimer !== null) clearTimeout(overviewThumbRefreshTimer);
    overviewThumbRefreshTimer = setTimeout(refresh, Math.max(0, overviewThumbPauseUntil - performance.now()) + 20);
    return;
  }
  if(overviewThumbRefreshQueued) return;
  overviewThumbRefreshQueued=true;
  requestAnimationFrame(refresh);
}

function observeOverviewThumbs(grid){
  const startAt = performance.now();
  overviewThumbObserver?.disconnect();
  overviewThumbObserver = new IntersectionObserver(entries => {
    if(entries.some(entry => entry.isIntersecting)) requestOverviewThumbRefresh();
  }, {root: ov, rootMargin: '600px 0px', threshold: 0.01});
  const wraps = getOverviewThumbRange(grid, {includeNear:true}).cards
    .map(card => card.querySelector('[data-overview-thumb="true"]'))
    .filter(Boolean);
  wraps.forEach(wrap => overviewThumbObserver.observe(wrap));
  recordOverviewStage('observe-overview-thumbnails', startAt, {count:wraps.length});
}

function scrollOverviewToCurrent(){

    const card = catalogIndex >= 0 ? ov.querySelector(`[data-overview-card="true"][data-index="${catalogIndex}"]`) : null;

function syncRailActiveState(scroll=false, opts={}){
  if(!overviewGrid) return;
  refreshOverviewCards(overviewGrid);
  if(!scroll) return;
  requestAnimationFrame(() => {
    const activeSlide = slides[idx];
    const catalogIndex = getCatalogSlides().indexOf(activeSlide);
    const card = catalogIndex >= 0 ? ov.querySelector(`[data-overview-card="true"][data-index="${catalogIndex}"]`) : null;
    if(!card) return;
    const railRect = ov.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    if(!(cardRect.top >= railRect.top + 8 && cardRect.bottom <= railRect.bottom - 8)){
      scrollRailCardIntoView(card, {queueThumbs: opts.refreshThumbs === false});
    }else if(opts.refreshThumbs === false && overviewProgrammaticThumbRefreshNeeded){
      const wrap = card.querySelector('[data-overview-thumb="true"]');
      if(wrap?.dataset.overviewRendered !== 'true') requestProgrammaticRailThumbRefresh();
      else overviewProgrammaticThumbRefreshNeeded=false;
    }
    if(opts.refreshThumbs !== false){
      const range = getOverviewThumbRange(overviewGrid, {includeNear:true});
      fitOverviewThumbnails(range.cards);
      observeOverviewThumbs(overviewGrid);
      requestOverviewThumbRefresh(true);
    }
  });
}
