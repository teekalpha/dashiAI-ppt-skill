  function restoreExportViewState(state){
    if(!state) return;
    go(state.index, {animate:false, force:true});
    setDeckMode(state.mode === 'present' ? 'present' : 'edit');
    if(window.__setEditorPanelsCollapsed) window.__setEditorPanelsCollapsed(Boolean(state.panelsCollapsed));
    else document.body.classList.toggle('editor-panels-collapsed', Boolean(state.panelsCollapsed));
    if(!state.panelsCollapsed){
      document.body.classList.toggle('preview-panel-open', state.panelOpen);
    }
    window.__layoutDeck?.();
  }

  async function prepareSimpleHtmlExportClone(clone, visibleSlides){
    pruneHiddenSlidesForHtmlExport(clone, visibleSlides);
    materializeHtmlExportViewModel(clone, visibleSlides);
    await inlineLocalScriptsForHtmlExport(clone);
    await embedUnicornAssetsForExport(clone);
    clone.querySelector('#deck-topbar')?.remove();
    clone.querySelector('#deck-page-pager')?.remove();
    clone.querySelector('#slide-rail')?.remove();
    clone.querySelector('#preview-panel-collapse')?.remove();
    clone.querySelector('#image-picker-input')?.remove();
    clone.querySelector('#media-picker-input')?.remove();
    clone.querySelector('.deck-export-overlay')?.remove();
    clone.querySelector('.page-transition-stage')?.remove();
    clone.querySelector('body')?.classList.remove('preview-panel-open', 'editor-panels-collapsed', 'exporting-deck');
    clone.querySelectorAll('iframe[data-effect-src]').forEach(iframe => {
      if(!iframe.getAttribute('src') && iframe.dataset.effectSrc) iframe.setAttribute('src', iframe.dataset.effectSrc);
    });
    clone.querySelectorAll('.bt-unicorn-frame').forEach(frame => {
      frame.removeAttribute('data-unicorn-ready');
    });
    clone.querySelectorAll('.bt-unicorn-scene').forEach(scene => {
      scene.innerHTML = '';
      scene.removeAttribute('id');
    });
    const clonedPreviewOptions = clone.querySelector('#preview-options');
    if(clonedPreviewOptions){
      try {
        const options = JSON.parse(clonedPreviewOptions.textContent || '{}');
        options.current = {...options.current, ...window.__getPreviewState?.()};
        clonedPreviewOptions.textContent = JSON.stringify(options).replace(/</g, '\\u003c');
      } catch {}
    }
  }

  function materializeHtmlExportViewModel(clone, visibleSlides){
    const vmEl = clone.querySelector('#deck-view-model');
    if(!vmEl || !window.__deckViewModel?.model) return;
    const state = window.__deckViewModel.getState?.() || {};
    const liveModel = window.__deckViewModel.model;
    const sourceSlides = new Map((liveModel.slides || []).map(slide => [slide.id, slide]));
    const slides = (visibleSlides || []).map(slide => {
      const id = slide.dataset.vmSlideId;
      const source = sourceSlides.get(id);
      if(!source) return null;
      return {
        ...source,
        props: {
          ...(source.props || {}),
          ...(state.props?.[id] || {}),
        },
      };
    }).filter(Boolean);
    const slideIds = slides.map(slide => slide.id);
    const model = {
      ...liveModel,
      exportId: 'html-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8),
      slides,
      state: {
        ...(state || {}),
        slideOrder: slideIds,
        skippedSlides: [],
        deletedSlides: [],
        props: {},
      },
    };
    vmEl.textContent = JSON.stringify(model).replace(/</g, '\\u003c');
    const textEl = clone.querySelector('#embedded-text-state');
    if(textEl) textEl.textContent = JSON.stringify(state.text || {}).replace(/</g, '\\u003c');
  }

  function pruneHiddenSlidesForHtmlExport(clone, visibleSlides){
    const visibleIds = new Set((visibleSlides || []).map((slide, index) => getCloneSlideKey(slide, index)).filter(Boolean));
    if(!visibleIds.size) return;
    clone.querySelectorAll('#deck > .slide').forEach((slide, index) => {
      if(!visibleIds.has(getCloneSlideKey(slide, index))){
        slide.remove();
        return;
      }
      slide.hidden = false;
      slide.removeAttribute('hidden');
      slide.removeAttribute('aria-hidden');
      slide.removeAttribute('data-slide-skipped');
    });
  }

  function getCloneSlideKey(slide, index){
    return slide?.dataset?.vmSlideId || slide?.dataset?.vmLayout || slide?.dataset?.layout || `slide-${index + 1}`;
  }

  async function inlineLocalScriptsForHtmlExport(clone){
    const scripts = [...clone.querySelectorAll('script[src^="assets/"]')];
    await Promise.all(scripts.map(async script => {
      const src = script.getAttribute('src');
      try {
        const response = await fetch(src);
        if(!response.ok) return;
        script.textContent = (await response.text()).replace(/<\/script/gi, '<\\/script');
        script.removeAttribute('src');
        script.removeAttribute('crossorigin');
        script.removeAttribute('integrity');
      } catch {}
    }));
  }

  async function embedUnicornAssetsForExport(clone){
    const paths = [...new Set(
      [
        ...[...clone.querySelectorAll('.bt-unicorn-frame[data-unicorn-json-file-path]')]
          .map(frame => frame.dataset.unicornJsonFilePath),
        ...[...clone.querySelectorAll('script')]
          .flatMap(script => [...(script.textContent || '').matchAll(/assets\/unicorn\/[^"'`\\\s)]+\.json/g)].map(match => match[0])),
      ]
        .filter(Boolean)
    )];
    if(!paths.length) return;
    const assets = {};
    await Promise.all(paths.map(async path => {
      try {
        const response = await fetch(path);
        if(response.ok) assets[path] = await response.text();
      } catch {}
    }));
    if(!Object.keys(assets).length) return;
    clone.querySelector('#embedded-unicorn-assets')?.remove();
    const script = document.createElement('script');
    script.id = 'embedded-unicorn-assets';
    script.type = 'application/json';
    script.textContent = JSON.stringify(assets).replace(/</g, '\\u003c');
    clone.querySelector('head')?.appendChild(script);
  }

  function staticUnicornRuntime(){
    const DEFAULT_SDK_URL = 'https://cdn.jsdelivr.net/gh/hiunicornstudio/unicornstudio.js@v2.1.12/dist/unicornStudio.umd.js';
    let sdkPromise = null;
    let embeddedAssetMap = null;
    const embeddedAssetUrls = new Map();

    window.__initUnicornScenes = initUnicornScenes;
    window.__resetUnicornSceneFrame = resetFrame;
    window.__syncUnicornSceneActivity = syncUnicornSceneActivity;

    addEventListener('swiss-slide-change', event => {
      const {index, slide} = event.detail || {};
      syncUnicornSceneActivity(slide);
      setTimeout(() => {
        if((window.__currentSlideIndex || 0) === index) initUnicornScenes(slide);
      }, 80);
    });

    syncUnicornSceneActivity(getCurrentSlide());
    initUnicornScenes(getCurrentSlide());

    function initUnicornScenes(scope = getCurrentSlide(), options = {}){
      const root = scope instanceof Element ? scope : document;
      const selector = '.bt-unicorn-frame[data-unicorn-project-id],.bt-unicorn-frame[data-unicorn-json-file-path]';
      const frames = [
        ...(root.matches?.(selector) ? [root] : []),
        ...Array.from(root.querySelectorAll(selector)),
      ];
      const activeSlide = getCurrentSlide();
      const pending = frames.filter(frame => {
        if(frame.dataset.unicornReady || frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media')) return false;
        return options.force || activeSlide.contains(frame) || frame === activeSlide;
      });
      if(!pending.length) return Promise.resolve([]);
      const sdkUrl = pending[0].dataset.unicornSdkUrl || DEFAULT_SDK_URL;
      return loadSdk(sdkUrl)
        .then(() => Promise.allSettled(pending.map(initFrame)))
        .catch(error => {
          console.warn('[unicorn] failed to load scene runtime', error);
          return [];
        });
    }

    function getCurrentSlide(){
      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
      return slides[window.__currentSlideIndex || 0] || document;
    }

    function loadSdk(sdkUrl){
      if(window.UnicornStudio?.addScene) return Promise.resolve();
      if(sdkPromise) return sdkPromise;
      sdkPromise = new Promise((resolve, reject) => {
        const existing = document.querySelector(`script[src="${sdkUrl}"]`);
        const script = existing || document.createElement('script');
        script.addEventListener('load', resolve, {once:true});
        script.addEventListener('error', reject, {once:true});
        if(!existing){
          script.src = sdkUrl;
          script.async = true;
          document.head.appendChild(script);
        }
      }).then(() => {
        if(!window.UnicornStudio?.addScene) throw new Error('UnicornStudio.addScene not found');
      });
      return sdkPromise;
    }

    function initFrame(frame){
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(!scene || frame.dataset.unicornReady) return;
      const elementId = scene.id || `unicorn-${Math.random().toString(36).slice(2, 11)}`;
      scene.id = elementId;
      frame.dataset.unicornReady = 'true';
      const config = {
        elementId,
        scale: Number(frame.dataset.unicornScale || 1),
        dpi: Number(frame.dataset.unicornDpi || 1.5),
        lazyLoad: false,
        production: true,
        altText: 'Shader scene',
        ariaLabel: 'Shader scene',
      };
      if(frame.dataset.unicornJsonFilePath) config.filePath = resolveUnicornJsonFilePath(frame.dataset.unicornJsonFilePath);
      else config.projectId = frame.dataset.unicornProjectId;
      return window.UnicornStudio.addScene(config).then(sceneInstance => {
        frame.__unicornScene = sceneInstance;
      }).catch(error => {
        frame.removeAttribute('data-unicorn-ready');
        console.warn('[unicorn] failed to initialize scene', error);
      });
    }

    function resetFrame(frame){
      if(!frame) return;
      frame.__unicornScene?.destroy?.();
      frame.__unicornScene = null;
      frame.removeAttribute('data-unicorn-ready');
      const scene = frame.querySelector('.bt-unicorn-scene');
      if(scene){
        scene.innerHTML = '';
        scene.removeAttribute('id');
      }
    }

    function syncUnicornSceneActivity(activeSlide = getCurrentSlide()){
      document.querySelectorAll('.bt-unicorn-frame[data-unicorn-ready]').forEach(frame => {
        if(activeSlide && activeSlide.contains(frame)) return;
        resetFrame(frame);
      });
    }

    function resolveUnicornJsonFilePath(path){
      const source = getEmbeddedUnicornAssets()[path];
      if(!source) return path;
      if(embeddedAssetUrls.has(path)) return embeddedAssetUrls.get(path);
      const url = URL.createObjectURL(new Blob([source], {type:'application/json'}));
      embeddedAssetUrls.set(path, url);
      return url;
    }

    function getEmbeddedUnicornAssets(){
      if(embeddedAssetMap) return embeddedAssetMap;
      const script = document.getElementById('embedded-unicorn-assets');
      if(!script){
        embeddedAssetMap = {};
        return embeddedAssetMap;
      }
      try {
        embeddedAssetMap = JSON.parse(script.textContent || '{}') || {};
      } catch {
        embeddedAssetMap = {};
      }
      return embeddedAssetMap;
    }

    addEventListener('pagehide', () => {
      embeddedAssetUrls.forEach(url => URL.revokeObjectURL(url));
      embeddedAssetUrls.clear();
    });
  }


	  function captureSlideImage(slideEl, options){
	    const image = window.htmlToImage.toPng(slideEl, withSlideCaptureFilter(options));
	    const timeout = new Promise((_, reject) => {
	      setTimeout(() => reject(new Error('Slide image capture timed out')), 20000);
	    });
	    return Promise.race([image, timeout]);
	  }

  const slideCaptureIgnoredTags = new Set(['STYLE', 'SCRIPT', 'NOSCRIPT', 'TEMPLATE']);

  function withSlideCaptureFilter(options = {}){
    const customFilter = options.filter;
    return {
      ...options,
      filter(node){
        if(typeof customFilter === 'function' && !customFilter(node)) return false;
        if(node?.nodeType === 1 && node.tagName === 'IMG' && !(node.currentSrc || node.getAttribute('src'))) return false;
        if(node?.nodeType === 1 && node.tagName === 'VIDEO' && !(node.currentSrc || node.getAttribute('src') || node.querySelector('source[src]'))) return false;
        let current = node?.nodeType === 1 ? node : node?.parentNode;
        while(current){
          if(current.nodeType === 1 && slideCaptureIgnoredTags.has(current.tagName)) return false;
          current = current.parentNode;
        }
        return true;
      },
    };
  }

  async function waitForExportFonts(){
    if(!document.fonts?.ready) return;
    await Promise.race([
      document.fonts.ready.catch(() => {}),
      new Promise(resolve => setTimeout(resolve, 2500)),
    ]);
  }

  async function waitForSlideCaptureReady(slide){
    if(document.fonts?.ready) await document.fonts.ready.catch(() => {});
    const images = [...(slide?.querySelectorAll?.('img') || [])].filter(img => !img.complete);
    await Promise.race([
      Promise.all(images.map(img => new Promise(resolve => {
        img.addEventListener('load', resolve, {once:true});
        img.addEventListener('error', resolve, {once:true});
      }))),
      new Promise(resolve => setTimeout(resolve, 1800)),
    ]);
    slide?.querySelectorAll?.('video').forEach(video => {
      if(video.readyState < 2) video.load?.();
    });
    await nextFrame();
    finishSlideCaptureMotion(slide);
    await nextFrame();
    await nextFrame();
  }

  function runBrowserPrint(){
    const printWindow = arguments[0] || window;
    return new Promise(resolve => {
      let done = false;
      let timer = null;
      const finish = () => {
        if(done) return;
        done = true;
        clearTimeout(timer);
        printWindow.removeEventListener?.('afterprint', finish);
        resolve();
      };
      printWindow.addEventListener?.('afterprint', finish, {once:true});
      timer = setTimeout(finish, 15000);
      printWindow.focus?.();
      if(printWindow === window) window.print();
      else printWindow.print();
    });
  }

  function finishSlideCaptureMotion(slide){
    if(!slide?.getAnimations) return;
    slide.getAnimations({subtree:true}).forEach(animation => {
      const timing = animation.effect?.getComputedTiming?.();
      const endTime = Number(timing?.endTime);
      if(!Number.isFinite(endTime) || endTime <= 0) return;
      try { animation.finish(); } catch {}
    });
  }

  const retainedDownloadUrls = [];
  window.addEventListener('pagehide', releaseRetainedDownloadUrls);
  window.addEventListener('beforeunload', releaseRetainedDownloadUrls);

	  function downloadBlob(blob, filename){
	    const type = blob.type || getDownloadMime(filename);
	    const file = typeof File === 'function'
	      ? new File([blob], filename, {type})
	      : new Blob([blob], {type});
	    const url = URL.createObjectURL(file);
	    retainedDownloadUrls.push(url);
	    const link = document.createElement('a');
	    link.href = url;
	    link.download = filename;
	    link.rel = 'noopener';
	    link.style.display = 'none';
	    document.body.appendChild(link);
	    return new Promise(resolve => {
	      setTimeout(() => {
	        link.click();
	        setTimeout(() => link.remove(), 1000);
	        resolve();
	      }, 0);
	    });
	  }

  function releaseRetainedDownloadUrls(){
    while(retainedDownloadUrls.length){
      URL.revokeObjectURL(retainedDownloadUrls.pop());
    }
  }

  function getDownloadMime(filename){
    const lower = String(filename || '').toLowerCase();
    if(lower.endsWith('.pptx')) return 'application/vnd.openxmlformats-officedocument.presentationml.presentation';
    if(lower.endsWith('.html') || lower.endsWith('.htm')) return 'text/html;charset=utf-8';
    if(lower.endsWith('.pdf')) return 'application/pdf';
    return 'application/octet-stream';
  }

	  function beginDeckExport(label){
	    window.__deckExportLocked = true;
	    document.body.classList.add('exporting-deck');
	    const overlay = document.createElement('div');
	    overlay.className = 'deck-export-overlay';
	    overlay.__deckExportCancelled = false;
	    overlay.innerHTML = `
	      <div class="deck-export-card" role="status" aria-live="polite">
	        <div class="deck-export-title">${label} 导出中</div>
	        <div class="deck-export-detail">准备中...</div>
	        <div class="deck-export-bar"><div class="deck-export-fill"></div></div>
	        <div class="deck-export-actions"><button class="deck-export-cancel" type="button">取消</button></div>
	      </div>`;
	    overlay.querySelector('.deck-export-cancel')?.addEventListener('click', event => {
	      event.preventDefault();
	      event.stopPropagation();
	      requestDeckExportCancel(overlay);
	    });
	    overlay.addEventListener('mousedown', event => event.preventDefault());
	    overlay.addEventListener('click', event => event.preventDefault());
	    document.body.appendChild(overlay);
	    return overlay;
	  }

  function updateDeckExport(overlay, current, total, detail){
    if(!overlay) return;
    const pct = total > 0 ? Math.min(100, Math.max(0, Math.round((current / total) * 100))) : 0;
    const text = detail || `导出进度 ${pct}%`;
    overlay.querySelector('.deck-export-detail').textContent = `${text} · ${pct}%`;
	    overlay.querySelector('.deck-export-fill').style.width = pct + '%';
	  }

  function requestDeckExportCancel(overlay){
    if(!overlay || overlay.__deckExportCancelled) return;
    overlay.__deckExportCancelled = true;
    const cancel = overlay.querySelector('.deck-export-cancel');
    if(cancel){
      cancel.disabled = true;
      cancel.textContent = '正在取消...';
    }
    const detail = overlay.querySelector('.deck-export-detail');
    if(detail) detail.textContent = '正在取消，正在恢复页面状态...';
  }

  function throwIfDeckExportCancelled(overlay){
    if(!overlay?.__deckExportCancelled) return;
    const error = new Error('Deck export cancelled');
    error.name = 'DeckExportCancelled';
    throw error;
  }

  function isDeckExportCancelledError(error){
    return error?.name === 'DeckExportCancelled';
  }

	  function endDeckExport(overlay){
	    window.__deckExportLocked = false;
	    document.body.classList.remove('exporting-deck');
    overlay?.remove();
  }


  function loadExportScript(src, isReady){
    if(isReady()) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const existing = [...document.scripts].find(script => script.getAttribute('src') === src);
      const script = existing || document.createElement('script');
      const done = () => isReady() ? resolve() : reject(new Error(`${src} did not expose its browser API`));
      script.addEventListener('load', done, {once:true});
      script.addEventListener('error', () => reject(new Error(`${src} failed to load`)), {once:true});
      if(existing) setTimeout(done, 0);
      else {
        script.src = src;
        script.async = true;
        document.head.appendChild(script);
      }
    });
  }

  function restorePptxExportState(state){
    if(!state) return;
    go(state.index, {animate:false, force:true});
    setDeckMode(state.mode === 'present' ? 'present' : 'edit');
    if(window.__setEditorPanelsCollapsed) window.__setEditorPanelsCollapsed(Boolean(state.panelsCollapsed));
    else document.body.classList.toggle('editor-panels-collapsed', Boolean(state.panelsCollapsed));
    if(!state.panelsCollapsed){
      document.body.classList.toggle('preview-panel-open', state.panelOpen);
    }
    window.__layoutDeck?.();
  }

  function getCaptureBackground(slide){
    const value = getComputedStyle(slide).backgroundColor;
    return value && value !== 'rgba(0, 0, 0, 0)' ? value : getComputedStyle(document.documentElement).getPropertyValue('--paper').trim() || '#fff';
  }

	  function nextFrame(){
	    return new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
	  }

	  async function waitForUnicornFrames(scope=document, timeout=6000){
	    const start = performance.now();
	    do {
	      await nextFrame();
	      const loading = scope.querySelector?.('[data-unicorn-loading="true"]');
	      const frames = [...(scope.querySelectorAll?.('.bt-unicorn-frame[data-unicorn-json-file-path],.bt-unicorn-frame[data-unicorn-project-id]') || [])]
	        .filter(frame => !frame.closest('.bt-image-slot.has-user-image,.bt-image-slot.has-user-media'));
	      const ready = !frames.length || frames.every(frame => frame.dataset.unicornReady || frame.querySelector('canvas'));
	      if(!loading && ready) return;
	    } while(performance.now() - start < timeout);
	  }

  function getDeckFileName(){
    return (document.title || 'presentation')
      .replace(/[\\/:*?"<>|]+/g, '')
      .replace(/\s+/g, '-')
      .trim() || 'presentation';
  }

  staticUnicornRuntime();
})();

</script>
<script>
/* =============== Text State =============== */
(function(){
  const deck = document.getElementById('deck');
  if(!deck) return;
  const stateEl = document.getElementById('embedded-text-state');
  const textState = readTextState();
  const defaultTextState = window.__deckDefaultTextState || {};
  const textCounters = new Map();

  window.__deckDefaultTextState = defaultTextState;
  window.__getDeckDefaultTextState = () => ({...defaultTextState});
  window.__initEditableText = scope => applyTextState(scope);
  window.__setEditableTextMode = (on, scope = deck) => syncEditableMode(scope, on);
  window.__flushEditableTextState = flushTextState;
  applyTextState(deck);
  deck.addEventListener('pointerdown', handleEditablePointerDown, true);
  deck.addEventListener('focusin', handleFocusIn, true);
  deck.addEventListener('input', handleInput, true);
  deck.addEventListener('blur', handleBlur, true);

  function applyTextState(scope = deck){
    prepareTextElements(scope);
    syncEditableMode(scope);
  }

  function prepareTextElements(scope = deck){
    const root = scope instanceof Element ? scope : deck;
    resetTextCounters(root);
    const candidates = [
      ...(isTextCandidate(root) ? [root] : []),
      ...root.querySelectorAll('*'),
    ];
    candidates.forEach(el => {
      if(el !== root && !root.contains(el)) return;
      if(el !== root && el.parentElement?.closest('[data-editable-id]')) return;
      if(!el.dataset.editableId && !isTextCandidate(el)) return;
      if(!el.dataset.editableId) el.dataset.editableId = nextTextId(el);
      if(defaultTextState[el.dataset.editableId] === undefined) defaultTextState[el.dataset.editableId] = el.innerHTML;
      if(el.dataset.syncText && defaultTextState[`sync:${el.dataset.syncText}`] === undefined){
        defaultTextState[`sync:${el.dataset.syncText}`] = el.innerHTML;
      }
      const synced = el.dataset.syncText ? textState[`sync:${el.dataset.syncText}`] : undefined;
      if(synced !== undefined) el.innerHTML = synced;
      else if(textState[el.dataset.editableId] !== undefined) el.innerHTML = textState[el.dataset.editableId];
      makeEditable(el);
    });
  }

  function resetTextCounters(root){
    let slides = root.classList?.contains('slide') ? [root] : [...(root.querySelectorAll?.('.slide') || [])];
    if(!slides.length){
      const slide = root.closest?.('.slide');
      if(slide) slides = [slide];
    }
    slides.forEach(slide => textCounters.set(getTextSlideKey(slide), 0));
  }

  function makeEditable(el){
    el.dataset.editableReady = 'true';
  }

  function syncEditableMode(scope = deck, on){
    const root = scope instanceof Element ? scope : deck;
    const enabled = Boolean(on ?? canEditDeck()) && canEditDeck();
    const editable = [
      ...(root.dataset?.editableId ? [root] : []),
      ...(root.querySelectorAll?.('[data-editable-id]') || []),
    ];
    editable.forEach(el => {
      if(enabled){
        el.setAttribute('contenteditable', 'true');
        el.setAttribute('spellcheck', 'false');
        el.setAttribute('role', 'textbox');
      } else {
        el.removeAttribute('contenteditable');
        el.removeAttribute('spellcheck');
        el.removeAttribute('role');
      }
    });
  }

  function handleEditablePointerDown(e){
    if(!canEditDeck()) return;
    if(e.defaultPrevented || (e.button !== undefined && e.button !== 0)) return;
    const target = e.target instanceof Element ? e.target : null;
    if(!target || !deck.contains(target)) return;
    if(target.closest('button,input,textarea,select,a,#preview-panel,#preview-panel-collapse')) return;
    if(window.__isDeckFileSlotTarget?.(target)) return;
    if(target.closest('[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]')) return;
    const el = findEditableAtPoint(e.clientX, e.clientY);
    if(!el) return;
    e.preventDefault();
    e.stopPropagation();
    el.focus({preventScroll:true});
    placeCaretAtPoint(el, e.clientX, e.clientY);
  }

  function findEditableAtPoint(x, y){
    const activeSlide = deck.querySelector('.slide.active') || deck;
    const editable = [...activeSlide.querySelectorAll('[data-editable-id][contenteditable="true"]')]
      .filter(el => !window.__isDeckFileSlotTarget?.(el));
    for(let i = editable.length - 1; i >= 0; i--){
      const rects = editable[i].getClientRects();
      for(const rect of rects){
        if(x >= rect.left && x <= rect.right && y >= rect.top && y <= rect.bottom) return editable[i];
      }
    }
    return null;
  }

  function placeCaretAtPoint(el, x, y){
    let range = document.caretRangeFromPoint?.(x, y);
    if(!range && document.caretPositionFromPoint){
      const pos = document.caretPositionFromPoint(x, y);
      if(pos){
        range = document.createRange();
        range.setStart(pos.offsetNode, pos.offset);
        range.collapse(true);
      }
    }
    if(!range || !el.contains(range.startContainer)){
      range = document.createRange();
      range.selectNodeContents(el);
      range.collapse(false);
    }
    const selection = getSelection();
    selection?.removeAllRanges();
    selection?.addRange(range);
  }

	  function handleFocusIn(e){
	    const el = e.target.closest('[data-editable-id]');
	    if(!el || !deck.contains(el)) return;
	    if(!canEditDeck()){
	      el.blur();
	      return;
	    }
	    el.dataset.editing = 'true';
	    el.dataset.editBefore = el.innerHTML;
	  }

  function handleInput(e){
    const el = e.target.closest('[data-editable-id]');
    if(!el || !deck.contains(el)) return;
    saveTextElement(el, {dirty:false});
  }

	  function handleBlur(e){
	    const el = e.target.closest('[data-editable-id]');
	    if(!el || !deck.contains(el)) return;
	    const before = el.dataset.editBefore;
	    const after = el.innerHTML;
      const changed = before !== undefined && before !== after;
	    delete el.dataset.editing;
	    delete el.dataset.editBefore;
	    saveTextElement(el, {dirty:changed});
	    if(changed && !window.__dashiUndo?.applying){
	      const key = el.dataset.editableId;
	      const syncName = el.dataset.syncText || '';
	      window.__dashiUndo?.push?.({
	        label: 'text',
	        undo: () => restoreTextElement(key, syncName, before),
	      });
	    }
	  }

  function saveTextElement(el, opts={}){
    if(!canEditDeck()) return;
    const key = el.dataset.editableId;
    if(!key) return;
    textState[key] = el.innerHTML;
    if(el.dataset.syncText) textState[`sync:${el.dataset.syncText}`] = el.innerHTML;
    if(opts.dirty) window.__markOverviewThumbDirty?.(el.closest('.slide'));
    writeTextState();
  }

  function flushTextState(scope){
    const roots = scope instanceof Element
      ? [scope]
      : (window.__getVisibleSlides?.() || [deck]);
    const seen = new Set();
    roots.forEach(root => {
      [
        ...(root.dataset?.editableId ? [root] : []),
        ...(root.querySelectorAll?.('[data-editable-id]') || []),
      ].forEach(el => {
        if(seen.has(el)) return;
        seen.add(el);
        saveTextElement(el);
      });
    });
    writeTextState();
  }

	  function restoreTextElement(key, syncName, value){
	    if(!key) return;
	    textState[key] = value;
	    if(syncName) textState[`sync:${syncName}`] = value;

  }

  function nextTextId(el){
    const slide = el.closest('.slide');
    const slideKey = getTextSlideKey(slide);
    const count = (textCounters.get(slideKey) || 0) + 1;
    textCounters.set(slideKey, count);
    return `text:${slideKey}:${count}`;
  }

  function getTextSlideKey(slide){
    return slide?.dataset.vmSlideKey || slide?.dataset.vmLayout || slide?.dataset.vmSlideId || 'deck';
  }

  function readTextState(){
    try {
      return JSON.parse(stateEl?.textContent || '{}') || {};
    } catch {
      return {};
    }
  }

  function isTextCandidate(el){
    if(!(el instanceof HTMLElement)) return false;
    if(el.hasAttribute('data-editable-skip')) return false;
    if(el.closest('[data-dashi-page-number]')) return false;

    if(!el.textContent?.trim()) return false;
    return [...el.children].every(child => ['BR','SPAN','B','I','EM','STRONG','SMALL'].includes(child.tagName));
  }
})();

<script>
/* =============== Quiet topbar · 明暗切换 =============== */
(function(){

  const systemDark=()=>matchMedia('(prefers-color-scheme:dark)').matches;
  const current=()=>{const a=document.documentElement.getAttribute('data-pp-theme');return a==='dark'||a==='light'?a:(systemDark()?'dark':'light');};
  function paintIcon(theme){btn.innerHTML=theme==='dark'?SUN:MOON;btn.setAttribute('title',theme==='dark'?'切换到明亮':'切换到暗色');}

  let saved;try{saved=localStorage.getItem(KEY);}catch{}
  if(saved==='dark'||saved==='light') apply(saved); else paintIcon(current());
  btn.addEventListener('click',()=>apply(current()==='dark'?'light':'dark'));
})();
</script>
