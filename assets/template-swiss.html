async function renderOverviewThumbDomPreview(wrap, slide){
  const preview = createOverviewDomPreview(slide);
  wrap.replaceChildren(preview);
  wrap.dataset.overviewMode=preview.dataset.overviewThumbPreview === 'lite' ? 'lite' : 'dom-clone';
  wrap.dataset.overviewRendered='true';
  rememberOverviewThumbFromDom(slide, preview);
}

function shouldUseLiteOverviewPreview(slide){
  const themePack = slide?.dataset?.themePack || '';
  const lazyImportedSlide = slide?.querySelectorAll?.('*').length <= 1;
  return themePack === 'theme10' || lazyImportedSlide;
}

function createOverviewLitePreview(slide){
  const startAt = performance.now();
  const {width, height} = getOverviewSourceSize();
  const root = document.createElement('div');
  root.dataset.overviewThumbPreview='lite';
  applyOverviewPreviewGeometry(root, width, height);
  let defaults = {};
  try {
    defaults = JSON.parse(slide.querySelector('[data-prop-defaults]')?.dataset.propDefaults || '{}') || {};
  } catch {}
  const accent = defaults.accentColor || '#d8ad5f';
  const title = [defaults.titleTop, defaults.title, defaults.titleBottom, defaults.headline].filter(Boolean).join(' ') || slide.dataset.vmLayout || 'Slide';
  const subtitle = defaults.subtitle || defaults.lead || defaults.enSubtitle || defaults.en || defaults.description || '';
  root.style.background = `linear-gradient(135deg,#14110c 0%,#242016 54%,#0d0b08 100%)`;
  root.style.color = '#f7ead2';
  const plate = document.createElement('div');
  plate.style.cssText='position:absolute;inset:96px;display:grid;grid-template-rows:auto 1fr auto;gap:44px;padding:78px 88px;border:2px solid rgba(216,173,95,.34);background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,.02));box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)';
  const kicker = document.createElement('div');
  kicker.textContent = defaults.kicker || defaults.eyebrow || slide.dataset.themePack || '';
  kicker.style.cssText=`font:700 42px/1 var(--sans);letter-spacing:0;text-transform:uppercase;color:${accent}`;
  const titleEl = document.createElement('div');
  titleEl.textContent = title;
  titleEl.style.cssText='align-self:center;max-width:1420px;font:800 132px/1.05 var(--sans-zh);letter-spacing:0;color:#fff';
  const subEl = document.createElement('div');
  subEl.textContent = subtitle;
  subEl.style.cssText='max-width:1180px;font:500 42px/1.35 var(--sans-zh);letter-spacing:0;color:rgba(247,234,210,.72)';
  plate.append(kicker, titleEl, subEl);
  root.appendChild(plate);
  recordOverviewStage('lite-overview-thumbnail', startAt, {
    slideId:getOverviewStableSlideId(slide),
    count:1,
  });
  return root;
}

function createOverviewDomPreview(slide){
  const derivedStartAt = performance.now();
  ensureRuntimeSlideRendered(slide);
  if(shouldUseLiteOverviewPreview(slide) && !slide.firstElementChild) return createOverviewLitePreview(slide);
  const {width, height} = getOverviewSourceSize();
  const clone = slide.cloneNode(true);
  clone.dataset.overviewThumbPreview='true';
  clone.hidden=false;
  clone.classList.add('active');
  clone.setAttribute('data-deck-active', '');
  applyOverviewPreviewGeometry(clone, width, height);
  clone.dataset.overviewSourceWidth=String(width);
  clone.dataset.overviewSourceHeight=String(height);
  clone.style.cssText += ';--deck-scale:1;contain:layout paint style';
  clone.style.animation='none';
  clone.style.transition='none';
  clone.querySelectorAll('script,style,template,noscript').forEach(node => node.remove());
  const freezeStyle = document.createElement('style');
  freezeStyle.textContent='[data-overview-thumb-preview] *,[data-overview-thumb-preview] *::before,[data-overview-thumb-preview] *::after{animation:none!important;animation-delay:0s!important;animation-duration:0s!important;animation-play-state:paused!important;transition:none!important}';
  clone.prepend(freezeStyle);
  clone.querySelectorAll('iframe,video').forEach(node => {
    const placeholder = document.createElement('div');
    placeholder.style.cssText='position:absolute;inset:0;background:rgba(0,0,0,.08)';
    node.replaceWith(placeholder);
  });
  clone.querySelectorAll('[contenteditable],[tabindex],[aria-describedby]').forEach(node => {
    node.removeAttribute('contenteditable');
    node.removeAttribute('tabindex');
    node.removeAttribute('aria-describedby');
  });
  recordOverviewStage('dom-derived-preview', derivedStartAt, {
    slideId:getOverviewStableSlideId(slide),
    candidateCount:clone.querySelectorAll('*').length,
    rectReadCount:0,
    styleReadCount:0,
    count:1,
  });
  return clone;
}

function rememberOverviewThumb(slide, value){
  const entry = {...(value || {})};
  const key = getOverviewThumbCacheKey(slide);
  overviewThumbBitmapCache.set(key, {...entry, usedAt: Date.now()});
  while(overviewThumbBitmapCache.size > OVERVIEW_THUMB_CACHE_LIMIT){
    let oldestKey=null;
    let oldestTime=Infinity;
    overviewThumbBitmapCache.forEach((value, key) => {
      const usedAt = Number(value?.usedAt || 0);
      if(usedAt < oldestTime){
        oldestTime=usedAt;
        oldestKey=key;
      }
    });
    if(!oldestKey) break;
    overviewThumbBitmapCache.delete(oldestKey);
  }
}

function rememberOverviewThumbFromDom(slide, node){
  rememberOverviewThumb(slide, {
    children:[node.cloneNode(true)],
    nodeCount:node.querySelectorAll('*').length + 1,
  });
}

function requestOverviewClosedPrewarm(delay=900){
  if(overviewClosedPrewarmTimer !== null) clearTimeout(overviewClosedPrewarmTimer);
  overviewClosedPrewarmTimer = setTimeout(() => {
    overviewClosedPrewarmTimer=null;
    runOverviewClosedPrewarm();
  }, delay);
}

function runOverviewClosedPrewarm(){
  const runId = ++overviewClosedPrewarmRunId;
  if(isEditMode()) return;
  const catalogSlides = getCatalogSlides();
  const activeIndex = Math.max(0, catalogSlides.indexOf(slides[idx]));
  const start = Math.max(0, activeIndex - 2);
  const targets = catalogSlides.slice(start, start + 24);
  targets.forEach((slide, order) => {
    setTimeout(() => {
      if(isEditMode() || runId !== overviewClosedPrewarmRunId) return;
      predecodeOverviewSlideResources(slide);
      prewarmOverviewThumbCache(slide, runId);
    }, order * 160);
  });
}

function prewarmOverviewThumbCache(slide, runId){
  if(!slide || isEditMode() || runId !== overviewClosedPrewarmRunId) return;
  const key = getOverviewThumbCacheKey(slide);
  if(overviewThumbBitmapCache.has(key)) return;
  const startAt = performance.now();
  try{
    const preview = createOverviewDomPreview(slide);
    rememberOverviewThumbFromDom(slide, preview);
    recordOverviewStage('closed-rail-thumb-prewarm', startAt, {
      slideId:getOverviewStableSlideId(slide),
      count:1,
    });
  }catch(error){
    console.warn('[overview prewarm]', error);
  }finally{
    if(slide !== slides[idx]) window.__releaseRuntimeSlide?.(slide);
  }
}

function predecodeOverviewSlideResources(slide){
  const urls = new Set();
  slide.querySelectorAll('img[src],video[poster],[style*="url("]').forEach(node => {
    const src = node.getAttribute('src') || node.getAttribute('poster');
    if(src) urls.add(src);
    const style = node.getAttribute('style') || '';
    [...style.matchAll(/url\((['"]?)(.*?)\1\)/g)].forEach(match => {
      if(match[2]) urls.add(match[2]);
    });
  });
  [...urls].slice(0, 24).forEach(value => {
    if(!value || /^(data:|blob:)/i.test(value)) return;
    const img = new Image();
    try { img.src = new URL(value, location.href).href; } catch { img.src = value; }
    img.decode?.().catch(() => {});
  });
}

function getOverviewPreviewCost(slide){
  if(!slide) return 0;
  const elementCount = slide.querySelectorAll('*').length;
  const mediaCount = slide.querySelectorAll('img,svg,canvas,video,iframe,[style*="url("]').length;
  return elementCount + mediaCount * 8;
}

async function renderOverviewThumb(wrap, runId=overviewThumbRunId, opts={}){
  if(!isEditMode() || !wrap?.isConnected || wrap.dataset.overviewRendered === 'true') return;
  if(!opts.allowDuringPause && performance.now() < overviewThumbPauseUntil) return;
  delete wrap.dataset.overviewQueued;
  const card = wrap.closest('[data-overview-card="true"]');
  const slide = card?.__overviewSlide || getCatalogSlides()[Number(card?.dataset.index)];
  if(!slide || runId !== overviewThumbRunId) return;
  const previewStartAt = performance.now();
  const trigger = wrap.dataset.overviewTrigger || 'queue';
  try {
    if(runId !== overviewThumbRunId || !isEditMode() || !wrap.isConnected) return;
    const cachedThumb = overviewThumbBitmapCache.get(getOverviewThumbCacheKey(slide));
    if(restoreOverviewThumb(wrap, cachedThumb)){
      fitOverviewThumb(wrap);
      recordOverviewStage('dom-cache-restore', previewStartAt, {slideId:getOverviewStableSlideId(slide)});
      return;
    }
    await renderOverviewThumbDomPreview(wrap, slide);
    fitOverviewThumb(wrap);
    recordOverviewStage('dom-preview-thumbnail', previewStartAt, {slideId:getOverviewStableSlideId(slide)});
  } catch (error) {
    if(runId !== overviewThumbRunId || !isEditMode() || !wrap.isConnected) return;
    console.warn('[overview thumb]', error);
    delete wrap.dataset.overviewRendered;
    wrap.dataset.overviewMode='placeholder';
    wrap.dataset.overviewError='true';
    if(!wrap.querySelector('[data-overview-placeholder="true"]')) wrap.replaceChildren(createOverviewThumbPlaceholder());
    recordOverviewStage('overview-thumb-error', previewStartAt, {
      slideId:getOverviewStableSlideId(slide),
      count:1,
    });
  } finally {
    recordOverviewStage('overview-thumb-task', previewStartAt, {
      slideId:getOverviewStableSlideId(slide),
      trigger,
    });
    if(slide !== slides[idx]) window.__releaseRuntimeSlide?.(slide);
    requestOverviewProgressUpdate();
  }
}

function scheduleOverviewThumbQueue(opts={}){
  const immediate = !!opts.immediate;
  if(overviewThumbProcessing || !isEditMode()) return;
  if(overviewThumbScheduled){
    if(immediate && overviewThumbQueueHandle !== null){
      clearTimeout(overviewThumbQueueHandle);
      overviewThumbQueueHandle=null;
      overviewThumbScheduled=false;
    }else{
      return;
    }
  }
  overviewThumbScheduled=true;
  const runId = overviewThumbRunId;
  overviewThumbQueueHandle = setTimeout(async () => {
    overviewThumbQueueHandle=null;
    overviewThumbScheduled=false;
    if(!isEditMode() || runId !== overviewThumbRunId) return;
    const sliceStartAt = performance.now();
    const budgetMs = 10;
    overviewPerfMarks.queueRuns.push({at:sliceStartAt, scheduler:'time-sliced', budgetMs, queueLength:overviewThumbQueue.length});
    const nextIndex = getNextOverviewThumbQueueIndex();
    if(nextIndex < 0){
      if(overviewThumbQueue.length) scheduleOverviewThumbQueue();
      return;
    }
    let processed=0;
    while(overviewThumbQueue.length && isEditMode() && runId === overviewThumbRunId){
      const itemIndex = getNextOverviewThumbQueueIndex();
      if(itemIndex < 0) break;
      if(processed > 0 || performance.now() - sliceStartAt >= budgetMs) break;
      const paused = performance.now() < overviewThumbPauseUntil;
      const wrap = overviewThumbQueue.splice(itemIndex, 1)[0];
      if(wrap?.dataset) delete wrap.dataset.overviewQueued;
      if(wrap?.isConnected && wrap.dataset.overviewRendered !== 'true'){
        overviewThumbProcessing=true;
        try {
          await renderOverviewThumb(wrap, runId, {allowDuringPause:paused});
        } finally {
          overviewThumbProcessing=false;
        }
      }
      processed += 1;
      if(processed >= 1) break;
    }
    if(isEditMode() && runId === overviewThumbRunId && overviewThumbQueue.length) scheduleOverviewThumbQueue();
  }, immediate ? 0 : OVERVIEW_THUMB_QUEUE_DELAY);
}

function queueOverviewThumb(wrap, priority=false){
  if(!wrap || wrap.dataset.overviewRendered === 'true') return;
  if(wrap.dataset.overviewQueued === 'true'){
    if(priority){
      const existing = overviewThumbQueue.indexOf(wrap);
      if(existing > 0){
        overviewThumbQueue.splice(existing, 1);
        overviewThumbQueue.unshift(wrap);
      }
    }
    return;
  }
  wrap.dataset.overviewQueued='true';
  wrap.dataset.overviewKey = wrap.closest('[data-overview-card="true"]')?.dataset.slideId || '';
  wrap.dataset.overviewTrigger = priority ? 'visible' : 'near';
  if(priority) overviewThumbQueue.unshift(wrap);
  else overviewThumbQueue.push(wrap);
  scheduleOverviewThumbQueue({immediate:priority});
}

function setOverviewThumbQueue(items, opts={}){
  const next=[];
  const queued=new Set();
  items.forEach(item => {
    const wrap = item?.wrap;
    if(!wrap || queued.has(wrap) || wrap.dataset.overviewRendered === 'true') return;
    queued.add(wrap);
    wrap.dataset.overviewQueued='true';
    wrap.dataset.overviewKey = wrap.closest('[data-overview-card="true"]')?.dataset.slideId || '';
    wrap.dataset.overviewTrigger = item.trigger || 'near';
    next.push(wrap);
  });
  overviewThumbQueue.forEach(wrap => {
    if(!queued.has(wrap) && wrap?.dataset) delete wrap.dataset.overviewQueued;
  });
  overviewThumbQueue=next;
  if(overviewThumbQueue.length) scheduleOverviewThumbQueue({immediate:!!opts.immediate});
}

function queueNearbyOverviewThumbs(opts={}){
  if(!isEditMode()) return;
  const startAt = performance.now();
  const range = getOverviewThumbRange(overviewGrid, {includeNear:true});
  const visibleWraps = getOverviewViewportThumbs();
  overviewProgressThumbs = visibleWraps;
  if(deckDiagnosticFlags.disableThumbGeneration){
    setOverviewThumbQueue([]);
    recordOverviewLayoutRead('queue-nearby', 'range-card-metrics', range.cards.length);
    recordOverviewStage('queue-nearby-overview-thumbs', startAt, {count:range.cards.length, queued:0, disabled:true});
    return;
  }
  let activeWrap = null;
  const activeKey = getOverviewSlideKey(slides[idx]);
  range.cards.forEach(card => {
    const wrap = card.querySelector('[data-overview-thumb="true"]');
    if(card?.dataset.slideKey === activeKey) activeWrap = wrap;
  });
  const items = [];
  if(activeWrap) items.push({wrap:activeWrap, trigger:'active'});
  const visibleEntries = visibleWraps
    .map(wrap => {
      const card = wrap.closest('[data-overview-card="true"]');
      return {wrap, trigger:'visible', cost:getOverviewPreviewCost(card?.__overviewSlide)};
    })
    .sort((a, b) => a.cost - b.cost);
  visibleEntries.forEach(item => items.push(item));
  setOverviewThumbQueue(items, {immediate:!!opts.immediate});
  recordOverviewLayoutRead('queue-nearby', 'range-card-metrics', range.cards.length);
  recordOverviewStage('queue-nearby-overview-thumbs', startAt, {count:range.cards.length, queued:items.length});
}
function queueVisibleOverviewThumbs(){
  queueNearbyOverviewThumbs();
}
window.__queueNearbyOverviewThumbs = queueNearbyOverviewThumbs;

function requestOverviewThumbRefresh(afterPause=false, opts={}){
  if(!isEditMode()) return;
  const runId = overviewThumbRunId;
  const refresh = () => {
    overviewThumbRefreshTimer=null;
    overviewThumbRefreshQueued=false;
    if(runId !== overviewThumbRunId) return;
    if(isEditMode()) queueNearbyOverviewThumbs({immediate:!!opts.priority});
  };
  if(afterPause){
    if(overviewThumbRefreshTimer !== null) clearTimeout(overviewThumbRefreshTimer);
    overviewThumbRefreshTimer = setTimeout(refresh, Math.max(0, overviewThumbPauseUntil - performance.now()) + 20);
    return;
  }
  if(overviewThumbRefreshQueued) return;
  overviewThumbRefreshQueued=true;
  requestAnimationFrame(refresh);
}

function observeOverviewThumbs(grid){
  const startAt = performance.now();
  overviewThumbObserver?.disconnect();
  overviewThumbObserver = new IntersectionObserver(entries => {
    if(entries.some(entry => entry.isIntersecting)) requestOverviewThumbRefresh();
  }, {root: ov, rootMargin: '600px 0px', threshold: 0.01});
  const wraps = getOverviewThumbRange(grid, {includeNear:true}).cards
    .map(card => card.querySelector('[data-overview-thumb="true"]'))
    .filter(Boolean);
  wraps.forEach(wrap => overviewThumbObserver.observe(wrap));
  recordOverviewStage('observe-overview-thumbnails', startAt, {count:wraps.length});
}

function scrollOverviewToCurrent(){
  requestAnimationFrame(() => {
    const activeSlide = slides[idx];
    const catalogIndex = getCatalogSlides().indexOf(activeSlide);
    const card = catalogIndex >= 0 ? ov.querySelector(`[data-overview-card="true"][data-index="${catalogIndex}"]`) : null;
    scrollRailCardIntoView(card, {queueThumbs:false});
    const range = getOverviewThumbRange(overviewGrid, {includeNear:true});
    fitOverviewThumbnails(range.cards);
    observeOverviewThumbs(overviewGrid);
    queueVisibleOverviewThumbs();
  });
}

function requestOverviewPostBuildThumbRefresh(){
  setTimeout(() => {
    requestAnimationFrame(() => {
      if(!isEditMode() || !overviewGrid) return;
      const range = getOverviewThumbRange(overviewGrid, {includeNear:true});
      fitOverviewThumbnails(range.cards);
      observeOverviewThumbs(overviewGrid);
      queueNearbyOverviewThumbs({immediate:true});
    });
  }, 80);
}

function syncRailActiveState(scroll=false, opts={}){
  if(!overviewGrid) return;
  refreshOverviewCards(overviewGrid);
  if(!scroll) return;
  requestAnimationFrame(() => {
    const activeSlide = slides[idx];
    const catalogIndex = getCatalogSlides().indexOf(activeSlide);
    const card = catalogIndex >= 0 ? ov.querySelector(`[data-overview-card="true"][data-index="${catalogIndex}"]`) : null;
    if(!card) return;
    const railRect = ov.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    if(!(cardRect.top >= railRect.top + 8 && cardRect.bottom <= railRect.bottom - 8)){
      scrollRailCardIntoView(card, {queueThumbs:true});
    }else if(opts.refreshThumbs === false && overviewProgrammaticThumbRefreshNeeded){
      const wrap = card.querySelector('[data-overview-thumb="true"]');
      if(wrap?.dataset.overviewRendered !== 'true') requestProgrammaticRailThumbRefresh();
      else overviewProgrammaticThumbRefreshNeeded=false;
    }
    if(opts.refreshThumbs !== false){
      const range = getOverviewThumbRange(overviewGrid, {includeNear:true});
      fitOverviewThumbnails(range.cards);
      observeOverviewThumbs(overviewGrid);
      requestOverviewThumbRefresh(true);
    }
  });
}
window.__syncRailActiveState = syncRailActiveState;

function scrollRailCardIntoView(card, opts={}){
  if(!card) return;
  overviewProgrammaticScrollUntil = performance.now() + 500;
  const scroller = card.closest('[data-rail-scroll="true"]') || ov;
  if(scroller){
    const railRect = scroller.getBoundingClientRect();
    const cardRect = card.getBoundingClientRect();
    const target = scroller.scrollTop + (cardRect.top - railRect.top) - Math.max(0, (scroller.clientHeight - cardRect.height) / 2);
    scroller.scrollTop = Math.max(0, target);
  }else{
    card.scrollIntoView({block:'center', inline:'nearest'});
  }
  if(opts.queueThumbs !== false){
    overviewProgrammaticThumbRefreshNeeded=true;
    requestProgrammaticRailThumbRefresh();
  }
}

function requestProgrammaticRailThumbRefresh(){
  requestOverviewThumbRefresh(true, {priority:true});
}

function cloneOverviewThumb(wrap){
  if(wrap?.dataset?.overviewRendered === 'true'){
    const children = [...(wrap?.children || [])].map(child => child.cloneNode(true));
    return {
      children,
      nodeCount: children.reduce((sum, child) => sum + 1 + (child.querySelectorAll?.('*').length || 0), 0),
    };
  }
  return {
    children: [...(wrap?.children || [])].map(child => child.cloneNode(true)),
  };
}

function restoreOverviewThumb(wrap, cached){
  if(cached?.children?.length){
    wrap.replaceChildren(...cached.children.map(child => child.cloneNode(true)));
    wrap.dataset.overviewMode='dom-clone';
    wrap.dataset.overviewRendered='true';
    return true;
  }
  return false;
}

function getOverviewThumbCacheKey(slide){
  const themePack = slide?.dataset.themePack || activeThemePack || document.documentElement.dataset.themePack || 'deck';
  const slideId = getSlideVmId(slide, allSlides.indexOf(slide));
  const revision = slide?.dataset.overviewThumbRevision || '0';
  return `${themePack}|${slideId}|r${revision}|${OVERVIEW_THUMB_WIDTH}x${OVERVIEW_THUMB_HEIGHT}`;
}

function markOverviewThumbDirty(slide){
  if(!slide) return;
  const key = getOverviewStableSlideId(slide);
  slide.dataset.overviewThumbRevision = String(Number(slide.dataset.overviewThumbRevision || 0) + 1);
  [...overviewThumbBitmapCache.keys()].forEach(cacheKey => {
    if(cacheKey.includes(`|${key}|`)) overviewThumbBitmapCache.delete(cacheKey);
  });
  let needsRefresh=false;
  ov.querySelectorAll(`[data-overview-card="true"][data-slide-key="${key}"] [data-overview-thumb="true"]`).forEach(wrap => {
    delete wrap.dataset.overviewRendered;
    delete wrap.dataset.overviewMode;
    delete wrap.dataset.overviewQueued;
    wrap.replaceChildren(createOverviewThumbPlaceholder());
    needsRefresh=true;
  });
  if(isEditMode() && needsRefresh){
    deferOverviewThumbs(650, 'dirty');
    requestOverviewThumbRefresh(true);
  }
  requestOverviewProgressUpdate();
}

function createOverviewThumbPlaceholder(){

function getOverviewStructureSignature(catalogSlides=getCatalogSlides()){
  const skipped = getSlideStateSet('skippedSlides');
  const body = catalogSlides.map((slide, index) => {
    const allIndex = allSlides.indexOf(slide);
    const slideId = getSlideVmId(slide, allIndex);
    return `${slide.dataset.themePack || activeThemePack || ''}:${slideId}:${skipped.has(slideId) ? 'skip' : 'show'}:${index}`;
  }).join('|');
  return `${activeThemePack || 'deck'}|${body}`;
}

function refreshOverviewCards(grid=overviewGrid){
  if(!grid) return;
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  const catalogTotal = catalogSlides.length;
  const playableIndexBySlide = new Map(slides.map((slide, index) => [slide, index]));
  getOverviewCards(grid).forEach((card, index) => {
    const slide = card.__overviewSlide || catalogSlides[index];
    if(!slide) return;
    const playableIndex = playableIndexBySlide.get(slide) ?? -1;
    const active = playableIndex === idx;
    card.dataset.index = index;
    card.dataset.slideKey = getOverviewSlideKey(slide);
    card.dataset.slideId = getOverviewStableSlideId(slide);
    card.dataset.overviewActive = active ? 'true' : 'false';
    card.dataset.railActive = active ? 'true' : 'false';
    card.setAttribute('aria-current', active ? 'true' : 'false');
    const label = card.querySelector('[data-overview-label="true"]');
    if(label) label.textContent = String(index + 1).padStart(2,'0') + '/' + String(catalogTotal).padStart(2,'0');
    const skipped = isSlideSkipped(slide, allSlides.indexOf(slide));
    card.style.opacity = skipped ? '.56' : '1';
    card.style.filter = skipped ? 'saturate(.62)' : 'none';
    let badge = card.querySelector('.rail-skip-badge');
    if(skipped && !badge){
      badge=document.createElement('div');
      badge.className='rail-skip-badge';
      badge.textContent='已跳过';
      card.appendChild(badge);
    }else if(!skipped && badge){
      badge.remove();
    }
  });
}

function applyOverviewReorderLocally(grid, fromIndex, insertIndex, fromRects){
  const cards = getOverviewCards(grid);
  const card = cards[fromIndex];
  if(!card) return null;
  let targetIndex = insertIndex;
  if(fromIndex < targetIndex) targetIndex -= 1;
  const remaining = cards.filter((_, index) => index !== fromIndex);
  targetIndex = Math.max(0, Math.min(remaining.length, targetIndex));
  const marker = grid.querySelector('[data-overview-drop-marker="true"]');
  grid.insertBefore(card, remaining[targetIndex] || marker || null);
  refreshOverviewCards(grid);
  animateOverviewFlow(grid, fromRects);
  return targetIndex;
}

function scheduleOverviewDeckCommit(grid, previousActiveSlide, preferredIndex, detail, dropMark){
  const orderedSlides = getOverviewCards(grid).map(card => card.__overviewSlide).filter(Boolean);
  dropMark.deckCommitScheduledAt = performance.now();
  if(overviewPendingDeckCommit !== null) clearTimeout(overviewPendingDeckCommit);
  overviewPendingDeckCommit = setTimeout(() => {
    overviewPendingDeckCommit=null;
    const commitStartAt = performance.now();
    const movedSlide = orderedSlides[detail.to] || null;
    const referenceSlide = orderedSlides[detail.to + 1] || null;
    let deckMoveCount = 0;
    if(movedSlide){
      deck.insertBefore(movedSlide, referenceSlide);
      deckMoveCount = 1;
    }
    const appendEndAt = performance.now();
    refreshSlideList();
    const activeIndex = previousActiveSlide ? slides.indexOf(previousActiveSlide) : -1;
    idx = total > 0
      ? (activeIndex >= 0 ? activeIndex : Math.max(0, Math.min(total - 1, preferredIndex || 0)))
      : 0;
    window.__currentSlideIndex = idx;
    syncNav();
    layoutDeck();
    writeStoredSlideIndex(idx);
    persistCatalogSlideOrder();
    const mutationEndAt = performance.now();
    dispatchEvent(new CustomEvent('swiss-slide-reorder', {detail:{from:detail.from, to:detail.to, index:idx}}));
    dispatchEvent(new CustomEvent('swiss-slide-catalog-change', {detail:{...detail, skipOverviewRebuild:true}}));
    syncRailActiveState(true, {refreshThumbs:false});
    requestAnimationFrame(() => syncRailActiveState(true, {refreshThumbs:false}));
    setTimeout(() => syncRailActiveState(true, {refreshThumbs:false}), 120);
    dropMark.deckCommittedAt = performance.now();
    dropMark.deckCommitDurationMs = dropMark.deckCommittedAt - commitStartAt;
    dropMark.deckAppendDurationMs = appendEndAt - commitStartAt;
    dropMark.deckMutationDurationMs = mutationEndAt - appendEndAt;
    dropMark.deckMoveCount = deckMoveCount;
    dropMark.deckOrderAfterCommit = getOverviewDeckOrder();
    recordOverviewStage('deck-commit', commitStartAt, {
      count:deckMoveCount,
      appendMs:dropMark.deckAppendDurationMs,
      mutationMs:dropMark.deckMutationDurationMs,
    });
  }, 80);
}

function updateOverviewProgress(){

function buildOverview(fromRects=null, fromThumbs=null){
  const startAt = performance.now();
  if(!ov) return;
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  const catalogTotal = catalogSlides.length;
  const skippedSlides = getSlideStateSet('skippedSlides');
  const allIndexBySlide = new Map(allSlides.map((slide, index) => [slide, index]));
  const playableIndexBySlide = new Map(slides.map((slide, index) => [slide, index]));
  overviewBuiltSignature = getOverviewStructureSignature(catalogSlides);
  teardownOverviewThumbs();
  ov.innerHTML='';
  hideRailContextMenu();
  if(slideRailCount) slideRailCount.textContent = String(catalogTotal);
  const grid=document.createElement('div');
  grid.className='rail-grid';
  grid.style.cssText=`display:grid;grid-template-columns:1fr;gap:${OVERVIEW_CARD_GAP}px;position:relative`;
  const dropMarker=document.createElement('div');
  dropMarker.dataset.overviewDropMarker='true';
  dropMarker.dataset.railDropMarker='true';
  dropMarker.className='rail-drop-marker';
  let restoredThumbCount=0;
  const fullCacheRestore = overviewRestoreAllCachedThumbsOnNextBuild;
  overviewRestoreAllCachedThumbsOnNextBuild=false;
  const syncRestoreLimit = fullCacheRestore ? Infinity : OVERVIEW_SYNC_RESTORE_LIMIT;
  catalogSlides.forEach((s,i)=>{
    const allIndex = allIndexBySlide.get(s) ?? allSlides.indexOf(s);
    const slideId = getSlideVmId(s, allIndex);
    const skipped = skippedSlides.has(slideId);
    const playableIndex = playableIndexBySlide.get(s) ?? -1;
    const card=document.createElement('div');
    card.draggable=true;
    card.className='rail-card';
    card.__overviewSlide=s;
    card.dataset.index=i;
    card.dataset.railCard='true';
    card.dataset.overviewCard='true';
    card.dataset.overviewActive=playableIndex===idx?'true':'false';
    card.dataset.railActive=playableIndex===idx?'true':'false';
    card.setAttribute('aria-current', playableIndex===idx ? 'true' : 'false');
    card.dataset.slideKey=slideId;
    card.dataset.slideId=slideId;
    card.style.opacity=skipped?'.56':'1';
    card.style.filter=skipped?'saturate(.62)':'none';
    card.style.contentVisibility='auto';
    card.style.containIntrinsicSize=`${OVERVIEW_CARD_WIDTH}px ${Math.round((OVERVIEW_CARD_WIDTH / OVERVIEW_ASPECT_W * OVERVIEW_ASPECT_H) + 34)}px`;
    card.onmouseenter=()=>{
      deferOverviewThumbs(650, 'hover');
    };
    card.addEventListener('contextmenu', e => showRailContextMenu(e, Number(card.dataset.index)));
    card.addEventListener('dragstart', e=>{
      pauseOverviewThumbs();
      captureOverviewDragRects(grid);
      overviewDragFrom=Number(card.dataset.index);
      overviewDidDrag=true;
      card.classList.add('is-dragging');
      e.dataTransfer.effectAllowed='move';
      e.dataTransfer.setData('text/plain', String(overviewDragFrom));
    });
    card.addEventListener('dragend', ()=>{
      deferOverviewThumbs(650, 'dragend');
      overviewDragFrom=null;
      overviewDidDrag=false;
      overviewSuppressClickUntil=performance.now() + 180;
      overviewDragRects=[];
      overviewPendingDragEvent=null;
      hideOverviewDropMarker(dropMarker);
      card.classList.remove('is-dragging');
      card.style.transform='none';
      if(isEditMode()) requestOverviewThumbRefresh(true);
    });
    const wrap=document.createElement('div');
    const frame=document.createElement('div');
    frame.className='rail-thumb-frame';
    frame.setAttribute('data-overview-frame', 'true');
    frame.setAttribute('data-rail-frame', 'true');
    const isDark = slideUsesDarkChrome(s);
    frame.style.background=isDark?'var(--ink)':'var(--paper)';
    frame.style.contain='layout paint style';
    wrap.className='rail-thumb';
    wrap.dataset.overviewThumb='true';
    wrap.dataset.railThumb='true';
    wrap.style.background=isDark?'var(--ink)':'var(--paper)';
    const cachedThumb = fromThumbs?.[card.dataset.slideKey] || overviewThumbBitmapCache.get(getOverviewThumbCacheKey(s));
    const canRestoreNow = cachedThumb && (fromThumbs?.[card.dataset.slideKey] || restoredThumbCount < syncRestoreLimit);
    if(canRestoreNow && restoreOverviewThumb(wrap, cachedThumb)){
      restoredThumbCount += 1;
      fitOverviewThumb(wrap);
    }else{
      wrap.appendChild(createOverviewThumbPlaceholder());
    }
    const label=document.createElement('div');
    label.className='rail-label';
    label.setAttribute('data-overview-label', 'true');
    label.textContent=String(i+1).padStart(2,'0')+'/'+String(catalogTotal).padStart(2,'0');
    frame.appendChild(wrap);
    card.appendChild(frame);
    card.appendChild(label);
    if(skipped){
      const badge=document.createElement('div');
      badge.className='rail-skip-badge';
      badge.textContent='已跳过';
      card.appendChild(badge);
    }
    card.onclick=()=>{
      if(performance.now() < overviewSuppressClickUntil) return;
      if(overviewDidDrag){overviewDidDrag=false;return;}
      const targetSlide = card.__overviewSlide || getCatalogSlides()[Number(card.dataset.index)];
      const targetIndex = slides.indexOf(targetSlide);
      if(targetIndex < 0) return;
      pauseOverviewThumbs();
      deferOverviewThumbs(650, 'click');
      go(targetIndex, {animate:false, scrollRail:false});
      syncRailActiveState(true, {refreshThumbs:false});
    };
    grid.appendChild(card);
  });
  grid.appendChild(dropMarker);
  grid.addEventListener('dragover', e=>{
    if(overviewDragFrom===null) return;
    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    deferOverviewThumbs(650, 'dragover');
    overviewPendingDragEvent={clientX:e.clientX, clientY:e.clientY};
    overviewPendingDropMarker=dropMarker;
    overviewPendingDropGrid=grid;
    if(!overviewDragOverQueued){
      overviewDragOverQueued=true;
      requestAnimationFrame(processOverviewDragOver);
    }
  });
  grid.addEventListener('dragleave', e=>{
    if(!e.relatedTarget || !grid.contains(e.relatedTarget)) hideOverviewDropMarker(dropMarker);
  });
  grid.addEventListener('drop', e=>{
    const slot = getOverviewDropSlot({clientX:e.clientX, clientY:e.clientY}, grid, overviewDragRects);
    if(overviewDragFrom===null || !slot) return;
    e.preventDefault();
    e.stopPropagation();
    pauseOverviewThumbs();
    const previousActiveSlide = slides[idx];
    const preferredIndex = idx;
    const dropMark = {
      id:++overviewDropSequence,
      dropStartAt:performance.now(),
      from:overviewDragFrom,
      requestedTo:slot.index,
      overviewOrderBeforeDrop:getOverviewOrderFromCards(grid),
      deckOrderBeforeDrop:getOverviewDeckOrder(),
    };
    const beforeRects = captureOverviewCardRects(grid);
    const targetIndex = applyOverviewReorderLocally(grid, overviewDragFrom, slot.index, beforeRects);
    overviewDidDrag=targetIndex !== null;
    if(overviewDidDrag){
      overviewRestoreAllCachedThumbsOnNextBuild=true;
      dropMark.to=targetIndex;
      dropMark.localDomCommittedAt = performance.now();
      dropMark.overviewOrderAfterLocalDom = getOverviewOrderFromCards(grid);
      dropMark.deckOrderAfterLocalDom = getOverviewDeckOrder();
      dropMark.queueAfterDrop = overviewThumbQueue.length;
      overviewPerfMarks.drops.push(dropMark);
      scheduleOverviewDeckCommit(grid, previousActiveSlide, preferredIndex, {type:'reorder', from:overviewDragFrom, to:targetIndex}, dropMark);
      scrollOverviewToCurrent();
    }
    overviewDragFrom=null;
    overviewDidDrag=false;
    overviewSuppressClickUntil=performance.now() + 180;
    overviewDropIndex=null;
    overviewDragRects=[];
    overviewPendingDragEvent=null;
    hideOverviewDropMarker(dropMarker);
  });
  ov.appendChild(grid);
  overviewGrid=grid;
  animateOverviewFlow(grid, fromRects);
  updateOverviewProgress();
  recordOverviewStage('build-rail-catalog', startAt, {count:catalogTotal});
}

function refreshRailCatalog(){
  const startAt = performance.now();

}

const DECK_NEXT_KEYS=new Set(['ArrowRight','PageDown','ArrowDown']);
const DECK_PREV_KEYS=new Set(['ArrowLeft','PageUp','ArrowUp']);


function handleDeckKeyNavigation(e,{allowSpace=true}={}){
  if(window.__deckExportLocked){e.preventDefault();return;}
  if(e.key==='Escape'){
    if(isPresentMode()){
      if(document.fullscreenElement) return;
      e.preventDefault();
      exitPresentMode();
    }
    return;
  }
  if(isEditMode()){
    if(DECK_NEXT_KEYS.has(e.key)){
      e.preventDefault();
      go(idx+1, {refreshRailThumbs:false});
      return;
    }
    if(DECK_PREV_KEYS.has(e.key)){
      e.preventDefault();
      go(idx-1, {refreshRailThumbs:false});
      return;
    }
    if(e.key==='Home'){e.preventDefault();go(0, {refreshRailThumbs:false});return;}
    if(e.key==='End'){e.preventDefault();go(total-1, {refreshRailThumbs:false});}
    return;
  }
  if(DECK_NEXT_KEYS.has(e.key)||(allowSpace&&e.key===' ')){
    e.preventDefault();
    if(window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+1);
    return;
  }
  if(DECK_PREV_KEYS.has(e.key)){e.preventDefault();go(idx-1);return;}
  if(e.key==='Home'){e.preventDefault();go(0);return;}
  if(e.key==='End'){e.preventDefault();go(total-1);}
}
window.__handleDeckKeyNavigation=handleDeckKeyNavigation;

function isPreviewPanelNavigationTarget(target){
  if(!target?.closest?.('#preview-panel')) return false;
  return !target.closest?.('select,textarea,input[type="text"],input[type="search"],input[type="url"],input[type="email"],input[type="number"],[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]');
}

addEventListener('keydown',e=>{
  if(!isPreviewPanelNavigationTarget(e.target)) return;
  const isDeckKey = DECK_NEXT_KEYS.has(e.key) || DECK_PREV_KEYS.has(e.key) || e.key === 'Home' || e.key === 'End';
  if(!isDeckKey) return;
  e.preventDefault();
  e.stopImmediatePropagation();
  e.target?.blur?.();
  handleDeckKeyNavigation(e);
}, true);

addEventListener('keydown',e=>{
  if(isDeckTypingTarget(e.target)) return;
  handleDeckKeyNavigation(e);
});

function isDeckTypingTarget(target){
  return !!target?.closest?.('input,textarea,select,[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]');
}

let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{
  if(!isPresentMode()) return;
  const dx=(e.changedTouches[0].clientX-tx);
  const dy=(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    if(dx<0 && window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+(dx<0?1:-1));
  }
},{passive:true});

<script>
/* =============== Preview Undo =============== */
(function(){
  const stack = [];
  let applying = false;
  window.__dashiUndo = {
    get applying(){ return applying; },
    push(action){
      if(applying || !action || typeof action.undo !== 'function') return;
      stack.push(action);
      if(stack.length > 80) stack.shift();
    },
    undo(){
      const action = stack.pop();
      if(!action) return false;
      applying = true;
      try { action.undo(); }
      finally { applying = false; }
      return true;
    }
  };
  addEventListener('keydown', event => {
    const key = String(event.key || '').toLowerCase();
    if(key !== 'z' || !(event.metaKey || event.ctrlKey) || event.shiftKey || event.altKey) return;
    if(isDeckTypingTarget(event.target)) return;
    if(window.__dashiUndo.undo()){
      event.preventDefault();
      event.stopImmediatePropagation();
    }
  }, true);
})();
</script>

  };
  window.__getPreviewState = () => ({...state});
  makePreviewControlKeyboardNeutral(themePackSelect, {blurOnPointer:false});

  const count = document.getElementById('preview-slide-count');
  renderThemePackControl();
  refreshDeckSlides();
  window.__setActiveThemePack?.(state.themePack || document.documentElement.dataset.themePack || 'theme3', {navigate:false});
  refreshDeckSlides();
  const TX_COLOR_STOPS = [
    [0, [0,0,0]],
    [0.10, [255,0,0]],
    [0.25, [255,255,0]],
    [0.40, [0,255,0]],
    [0.55, [0,255,255]],
    [0.70, [0,0,255]],
    [0.85, [255,0,255]],
    [1, [255,255,255]],
  ];
  const TX_SLIDER_MAX = 1000;
  function txHex2(n){ return Math.max(0, Math.min(255, Math.round(n))).toString(16).padStart(2,'0'); }
  function txColorAt(t){
    t = Math.max(0, Math.min(1, t));
    for(let i=1;i<TX_COLOR_STOPS.length;i++){
      const [p1,c1] = TX_COLOR_STOPS[i-1];
      const [p2,c2] = TX_COLOR_STOPS[i];
      if(t <= p2){
        const f = p2 === p1 ? 0 : (t - p1) / (p2 - p1);
        return '#' + txHex2(c1[0]+(c2[0]-c1[0])*f) + txHex2(c1[1]+(c2[1]-c1[1])*f) + txHex2(c1[2]+(c2[2]-c1[2])*f);
      }
    }
    return '#ffffff';
  }
  function txHexToRgb(hex){
    const m = /^#?([0-9a-f]{6})$/i.exec(hex || '');
    if(!m) return null;
    const n = parseInt(m[1], 16);
    return [(n>>16)&255, (n>>8)&255, n&255];
  }
  function txColorToPos(hex){
    const target = txHexToRgb(hex);
    if(!target) return 0;
    let bestPos = 0, bestD = Infinity;
    for(let i=0;i<=TX_SLIDER_MAX;i++){
      const c = txHexToRgb(txColorAt(i / TX_SLIDER_MAX));
      const d = (c[0]-target[0])**2 + (c[1]-target[1])**2 + (c[2]-target[2])**2;
      if(d < bestD){ bestD = d; bestPos = i; if(d === 0) break; }
    }
    return bestPos;
  }

  renderTransitionColorOptions();
  syncTransitionControl();
  applyStoredSlideControls();
  renderPropControls();

  function readSaved(){
    try {
      return JSON.parse(localStorage.getItem(window.__previewStoreKey?.() || STORE) || '{}');
    } catch {

    }
  }

  function writeSaved(){

  function refreshDeckSlides(){

  function renderThemePackControl(){
    if(!themePackField || !themePackSelect) return;

      themePackField.classList.add('is-hidden');
      return;
    }
    const counts = countSlidesByThemePack();
    themePackSelect.innerHTML = '';
    entries.forEach(([key, option]) => {

      const slideCount = counts[key] || 0;
      optionEl.value = key;
      optionEl.textContent = option.label || option.displayName || key;

    const nextThemePack = counts[state.themePack] ? state.themePack : entries.find(([key]) => counts[key])?.[0] || state.themePack;
    if(nextThemePack) state.themePack = nextThemePack;
    themePackSelect.value = state.themePack;
    themePackField.classList.remove('is-hidden');
  }

  function countSlidesByThemePack(){
    return [...document.querySelectorAll('#deck > .slide')].reduce((acc, slide) => {

    }, {});
  }

  function normalizeThemePack(value){
    if(!value || !themePacks[value]) return '';
    return value;
  }

  function normalizeTransitionColor(value){
    return /^#[0-9a-f]{6}$/i.test(value || '') ? value.toLowerCase() : '';
  }

  function sanitizeTransitionColors(source){
    const colors = {};
    const defaults = window.__pageTransitionColorDefaults || {};
    Object.entries(source || {}).forEach(([mode, value]) => {

    return colors;
  }

  transitionSelect?.addEventListener('change', () => {
    setPageTransition(transitionSelect.value || 'none', {blur:true});
  });

  function setPageTransition(value, opts={}){
    state.pageTransition = transitionModes.includes(value) ? value : 'none';
    window.__setPageTransition?.(state.pageTransition);

    if(transitionSelect) transitionSelect.value = state.pageTransition;
    if(opts.blur) transitionSelect?.blur();
    writeSaved();
  }

  themePackSelect?.addEventListener('change', () => {
    if(!themePackSelect.value || themePackSelect.selectedOptions[0]?.disabled) return;
    state.themePack = themePackSelect.value;

    writeSaved();

  addEventListener('swiss-slide-change', refreshSlideControls);
  addEventListener('swiss-slide-reorder', refreshSlideControls);
  addEventListener('rd-themechange', refreshSlideControls);
  addEventListener('rd-accentchange', refreshSlideControls);

  function refreshSlideControls(){

    renderPropControls();
  }

  function syncTransitionControl(){
    if(transitionSelect) transitionSelect.value = state.pageTransition || 'none';
    window.__setPageTransition?.(state.pageTransition || 'none');
    Object.entries(state.pageTransitionColors || {}).forEach(([mode, color]) => window.__setPageTransitionColor?.(mode, color));
    syncTransitionColorControl();
  }

  function renderTransitionColorOptions(){
    if(!transitionColorOptions) return;
    transitionColorOptions.innerHTML = '';
    const wrap = document.createElement('div');
    wrap.className = 'preview-transition-color-slider';
    const range = document.createElement('input');
    range.type = 'range';
    range.min = '0';
    range.max = String(TX_SLIDER_MAX);
    range.step = '1';
    range.id = 'preview-transition-color-range';
    range.setAttribute('data-transition-color-range', 'true');
    range.setAttribute('aria-label', '切换色块颜色');
    makePreviewControlKeyboardNeutral(range);
    const readout = document.createElement('span');
    readout.className = 'preview-transition-color-readout';
    readout.setAttribute('data-transition-color-readout', 'true');
    const apply = persist => {
      const color = txColorAt(Number(range.value) / TX_SLIDER_MAX);
      range.style.setProperty('--tx-thumb', color);
      readout.textContent = color.toUpperCase();
      updateTransitionColor(color, {persist, syncControl:false});
    };
    range.addEventListener('input', () => apply(false));
    range.addEventListener('change', () => { apply(true); releasePreviewControlFocus(range); });
    wrap.appendChild(range);
    transitionColorOptions.appendChild(wrap);
    transitionColorOptions.appendChild(readout);
  }

  function syncTransitionColorControl(){
    if(!transitionColorField || !transitionColorOptions) return;
    const mode = state.pageTransition || 'none';
    const canColor = !!window.__isPageTransitionColorMode?.(mode);
    transitionColorField.classList.toggle('is-hidden', !canColor);
    if(!canColor) return;
    const color = normalizeTransitionColor(state.pageTransitionColors?.[mode])
      || normalizeTransitionColor(window.__getPageTransitionColor?.(mode))
      || normalizeTransitionColor(window.__pageTransitionColorDefaults?.[mode])
      || '#000000';
    window.__setPageTransitionColor?.(mode, color);
    syncTransitionColorButtons(window.__getPageTransitionColor?.(mode) || color);
  }

  function updateTransitionColor(value, opts={}){
    const mode = state.pageTransition || 'none';
    if(!window.__isPageTransitionColorMode?.(mode)) return;
    const color = normalizeTransitionColor(value);
    if(!color) return;
    state.pageTransitionColors = {...(state.pageTransitionColors || {}), [mode]: color};
    window.__setPageTransitionColor?.(mode, color);
    if(opts.syncControl !== false) syncTransitionColorButtons(color);
    if(opts.persist) writeSaved();
  }

  function syncTransitionColorButtons(color){
    if(!transitionColorOptions) return;
    const current = normalizeTransitionColor(color) || '#000000';
    const range = transitionColorOptions.querySelector('[data-transition-color-range]');
    const readout = transitionColorOptions.querySelector('[data-transition-color-readout]');
    if(range){
      range.value = String(txColorToPos(current));
      range.style.setProperty('--tx-thumb', current);
    }
    if(readout) readout.textContent = current.toUpperCase();
  }

  function applyStoredSlideControls(){
    const vmState = viewModel?.getState?.() || {};
    const slide = getCurrentSlide();
    if(slide) applyPropValues(slide, getSlidePropValues(slide, vmState), {persist:false});
  }

  function getCurrentPropRoot(){
    return getCurrentSlide()?.querySelector('[data-prop-controls]') || null;
  }

  function parsePropControls(root){
    try {
      return JSON.parse(root?.dataset.propControls || '[]') || [];
    } catch {
      return [];
    }
  }

  function parsePropDefaults(root){
    try {
      return JSON.parse(root?.dataset.propDefaults || '{}') || {};
    } catch {
      return {};
    }
  }

  function getSlidePropValues(slide, vmState = viewModel?.getState?.() || {}){
    const root = slide?.querySelector('[data-prop-controls]');
    if(!root) return {};
    const controls = parsePropControls(root).filter(control => !isHiddenPropControl(control));
    const defaults = parsePropDefaults(root);
    const sourceProps = getSlideSourceProps(slide);
    const savedProps = vmState.props?.[slide.dataset.vmSlideId] || {};
    const values = {...defaults, ...sourceProps, ...savedProps};
    controls.forEach(control => {
      values[control.key] = coercePropValue(control, values[control.key]);
      if(slide?.dataset.themePack === 'theme03' && control.key === 'forceDark'){
        values[control.key] = readTheme03GlobalDark(values[control.key]);
      }
    });
    return values;
  }

  function getSlideSourceProps(slide){
    const slideId = slide?.dataset.vmSlideId;
    if(!slideId) return {};
    return viewModel?.model?.slides?.find(item => item.id === slideId)?.props || {};
  }

  function renderPropControls(){
    if(!propsField || !propsPanel) return;
    const root = getCurrentPropRoot();
    const controls = parsePropControls(root);
    if(!root || !controls.length){
      propsField.classList.add('is-hidden');
      propsPanel.innerHTML = '';
      return;
    }
    const slide = getCurrentSlide();
    const values = getSlidePropValues(slide);
    propsField.classList.remove('is-hidden');
    propsPanel.innerHTML = '';
    controls.forEach(control => {
      if(!shouldRenderPropControl(control, values)) return;
      const row = document.createElement('div');
      row.className = 'preview-prop-row';
      const controlType = normalizePropControlType(control.type, control);
      const isColor = control.display === 'color';
      const label = document.createElement('span');
      label.title = control.label || control.key;
      label.textContent = control.label || control.key;
      row.appendChild(label);
      if(controlType === 'toggle'){
        const sw = document.createElement('label');
        sw.className = 'pp-switch';
        const input = document.createElement('input');
        input.type = 'checkbox';
        input.checked = !!values[control.key];
        makePreviewControlKeyboardNeutral(input);
        input.addEventListener('change', () => {
          updateCurrentProp(control, input.checked);
          releasePreviewControlFocus(input);
        });
        const track = document.createElement('span'); track.className = 'pp-track';
        const knob = document.createElement('span'); knob.className = 'pp-knob';
        sw.appendChild(input); sw.appendChild(track); sw.appendChild(knob);
        row.appendChild(sw);
      } else if(isColor || controlType === 'segment'){
        row.classList.add('is-choice');
        const group = document.createElement('div');
        group.className = 'preview-prop-choice-group' + (isColor ? ' is-color' : '');
        group.setAttribute('role', 'group');
        group.setAttribute('aria-label', control.label || control.key);
        const options = normalizePropOptions(control.options);
        if(isColor){
          group.style.setProperty('--pp-color-cols', '3');

          group.style.gridTemplateColumns = `repeat(${Math.max(1, options.length)}, minmax(0, 1fr))`;
          group.style.setProperty('--pp-choice-count', String(Math.max(1, options.length)));
          const indicator = document.createElement('span');
          indicator.className = 'pp-seg-indicator';
          indicator.setAttribute('aria-hidden', 'true');
          group.appendChild(indicator);
        }
        options.forEach(item => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'preview-prop-choice';
          button.dataset.propValue = String(item.value);
          button.textContent = item.label;
          makePreviewControlKeyboardNeutral(button);
          if(isColor){
            button.textContent = '';
            button.style.background = propSwatchColor(control, item);
            button.title = item.label;
            button.dataset.colorLabel = item.label;
            button.setAttribute('aria-label', item.label);
          }
          button.addEventListener('click', () => {
            updateCurrentProp(control, item.value, {render:false});
            syncSelectionButtons(group, item.value);
            if(!isColor) window.setTimeout(renderPropControls, 420);
            releasePreviewControlFocus(button);
          });
          group.appendChild(button);
        });
        syncSelectionButtons(group, values[control.key]);
        row.appendChild(group);
      } else if(controlType === 'select'){
        const select = document.createElement('select');
        select.setAttribute('aria-label', control.label || control.key);
        makePreviewControlKeyboardNeutral(select, {blurOnPointer:false});
        normalizePropOptions(control.options).forEach(item => {
          const option = document.createElement('option');
          option.value = String(item.value);
          option.textContent = item.label;
          select.appendChild(option);
        });
        select.value = String(values[control.key] ?? '');
        select.addEventListener('change', () => {
          updateCurrentProp(control, select.value);
          releasePreviewControlFocus(select);
        });
        row.appendChild(select);
      } else if(controlType === 'icons'){
        row.classList.add('is-icons');
        const group = document.createElement('div');
        group.className = 'preview-prop-icon-grid';
        group.setAttribute('role', 'group');
        group.setAttribute('aria-label', control.label || control.key);
        [{value:'', label:'无'}, ...normalizePropOptions(control.options)].forEach(item => {
          const button = document.createElement('button');
          button.type = 'button';
          button.className = 'preview-prop-icon-choice';
          button.dataset.propValue = String(item.value ?? '');
          button.title = item.label;
          button.setAttribute('aria-label', item.label);
          makePreviewControlKeyboardNeutral(button);
          if(item.image){
            const img = document.createElement('img');
            img.src = item.image;
            img.alt = '';
            button.appendChild(img);
          } else {
            const empty = document.createElement('span');
            empty.className = 'preview-prop-icon-empty';
            empty.textContent = '无';
            button.appendChild(empty);
          }
          const text = document.createElement('span');
          text.textContent = item.label;
          button.appendChild(text);
          button.addEventListener('click', () => {
            const nextValue = item.value || null;
            updateCurrentProp(control, nextValue, {
              extra: control.key === 'decorSrc' && nextValue ? {showDecor: true} : {},
            });
            syncIconButtons(group, nextValue);
            releasePreviewControlFocus(button);
          });
          group.appendChild(button);
        });
        syncIconButtons(group, values[control.key]);
        row.appendChild(group);
      } else {
        row.classList.add('is-range');
        const min = Number(control.min ?? 0), max = Number(control.max ?? 10), step = Number(control.step ?? 1);
        const span = (max - min) / (step || 1);
        const stepped = Number.isInteger(step) && step >= 1 && Number.isInteger(min) && Number.isInteger(max) && span <= 12;
        const wrap = document.createElement('div');
        wrap.className = 'pp-slider ' + (stepped ? 'is-stepped' : 'is-smooth');
        const track = document.createElement('div');
        track.className = 'pp-slider-track';
        const input = document.createElement('input');
        input.type = 'range';
        input.min = min; input.max = max; input.step = step;
        input.value = values[control.key];
        makePreviewControlKeyboardNeutral(input);
        track.appendChild(input);
        let ticks = null;
        if(stepped){
          ticks = document.createElement('div');
          ticks.className = 'pp-ticks';
          for(let i = 0; i <= span; i++){
            const tick = document.createElement('span');
            tick.dataset.label = formatTickValue(min + i * step);
            ticks.appendChild(tick);
          }
          track.appendChild(ticks);
        }
        const output = document.createElement('output');
        const unit = control.unit || '';
        const sync = () => {
          const v = Number(input.value);
          track.style.setProperty('--pp-pct', (max > min ? (v - min) / (max - min) * 100 : 0) + '%');
          output.textContent = v + unit;
          if(ticks) ticks.querySelectorAll('span').forEach((t, i) => t.classList.toggle('on', i <= (v - min) / step));
        };
        sync();
        input.addEventListener('input', () => { sync(); updateCurrentProp(control, Number(input.value), {render:false}); });
        input.addEventListener('change', () => {
          updateCurrentProp(control, Number(input.value));
          releasePreviewControlFocus(input);
        });
        wrap.appendChild(track);
        wrap.appendChild(output);
        row.appendChild(wrap);
      }
      propsPanel.appendChild(row);
    });
    applyPropValues(slide, values, {persist:false});
  }

  function normalizePropControlType(type, control = {}){
    if(control?.display === 'tab' || type === 'segment' || type === 'selection' || type === 'select' || type === 'color'){
      const optionCount = normalizePropOptions(control.options).length;
      if(control?.display !== 'color' && optionCount > 0 && optionCount <= 5) return 'segment';
      return 'select';
    }
    if(type === 'icons') return 'icons';
    if(type === 'text' || type === 'string' || type === 'input' || type === 'url' || type === 'email') return 'text';
    if(type === 'textarea' || type === 'multiline') return 'textarea';
    if(type === 'images') return 'image-list';
    if(type === 'image' || type === 'media' || type === 'picture') return 'image';
    if(type === 'list' || type === 'array' || type === 'object') return 'list';
    return type || 'range';
  }

  function formatTickValue(value){
    return Number.isInteger(value) ? String(value) : String(Math.round(value * 100) / 100);
  }

  function isHiddenPropControl(control){
    const type = normalizePropControlType(control?.type);
    return type === 'text' || type === 'textarea' || type === 'list' || type === 'image' || type === 'image-list';
  }

  function shouldRenderPropControl(control, values){
    if(control.dependsOn){
      const actual = values[control.dependsOn];
      if(Object.prototype.hasOwnProperty.call(control, 'dependsOnValue')){
        if(String(actual) !== String(control.dependsOnValue)) return false;
      } else if(Array.isArray(control.dependsOnValues)){
        if(!control.dependsOnValues.map(String).includes(String(actual))) return false;
      } else if(!actual) return false;
    }
    if(control.countKey && control.countIndex !== undefined){
      const count = Number(values[control.countKey]);
      const index = Number(control.countIndex);
      if(Number.isFinite(count) && Number.isFinite(index) && index >= count) return false;
    }
    return true;
  }

  function syncSelectionButtons(group, value){
    const current = String(value ?? '');
    const buttons = [...group.querySelectorAll('.preview-prop-choice')];
    let activeIndex = 0;
    buttons.forEach((button, index) => {
      const active = button.dataset.propValue === current;
      button.classList.toggle('is-active', active);
      button.setAttribute('aria-pressed', active ? 'true' : 'false');
      if(active) activeIndex = index;
    });
    group.style.setProperty('--pp-choice-index', String(activeIndex));
  }

  function syncIconButtons(group, value){
    const current = String(value ?? '');
    group.querySelectorAll('.preview-prop-icon-choice').forEach(button => {
      const active = button.dataset.propValue === current;
      button.classList.toggle('is-active', active);
      button.setAttribute('aria-pressed', active ? 'true' : 'false');
    });
  }

  function updateCurrentProp(control, value, opts = {}){
    if(!canEditDeck()) return;
    const slide = getCurrentSlide();
    if(!slide) return;
    const values = getSlidePropValues(slide);
    values[control.key] = coercePropValue(control, value);
    Object.assign(values, opts.extra || {});
    const unicornRefresh = control.key === 'backgroundMode' || control.key === 'unicornScene';
    if(slide.dataset.themePack === 'theme03' && control.key === 'forceDark'){
      applyTheme03GlobalDark(values[control.key], opts);
      if(opts.render !== false) renderPropControls();
      return;
    }
    if(slide.dataset.themePack === 'theme03' && control.key === 'accent'){
      applyTheme03GlobalAccent(values[control.key], opts);
      if(opts.render !== false) renderPropControls();
      return;
    }
    if(slide.dataset.themePack === 'theme02' && control.key === 'scheme'){
      applyTheme02GlobalScheme(values[control.key], opts);
      if(opts.render !== false) renderPropControls();
      return;
    }
    applyPropValues(slide, values, {unicornRefresh});
    if(opts.render !== false) renderPropControls();
  }

  function readTheme03GlobalDark(fallback = true){
    const runtimeValue = window.__getTheme03GlobalDark?.();
    if(typeof runtimeValue === 'boolean') return runtimeValue;
    try {
      const stored = localStorage.getItem('rd-theme');
      if(stored === 'light') return false;
      if(stored === 'dark') return true;
    } catch {}
    if(document.body.classList.contains('rd-force-dark')) return true;
    return fallback !== false;
  }

  function applyTheme03GlobalDark(forceDark, opts = {}){
    const dark = !!forceDark;
    window.__setTheme03GlobalDark?.(dark);
    document.body.classList.toggle('rd-force-dark', dark);
    try {
      localStorage.setItem('rd-theme', dark ? 'dark' : 'light');
    } catch {}
    const vmState = viewModel?.getState?.() || {};
    document.querySelectorAll('#deck > .slide[data-theme-pack="theme03"]').forEach(target => {
      const root = target.querySelector('[data-prop-controls]');
      const controls = parsePropControls(root);
      if(!controls.some(item => item.key === 'forceDark')) return;
      const values = getSlidePropValues(target, vmState);
      values.forceDark = dark;
      if(target === getCurrentSlide()){
        applyPropValues(target, values);
      } else {
        const next = {...parsePropDefaults(root), ...getSlideSourceProps(target), ...values};
        viewModel?.setProps?.(target.dataset.vmSlideId, next);
        if(opts.renderAll) applyPropValues(target, values);
      }
    });
  }

  function applyTheme03GlobalAccent(accent, opts = {}){
    const vmState = viewModel?.getState?.() || {};
    document.querySelectorAll('#deck > .slide[data-theme-pack="theme03"]').forEach(target => {
      const root = target.querySelector('[data-prop-controls]');
      const controls = parsePropControls(root);
      if(!controls.some(item => item.key === 'accent')) return;
      const values = getSlidePropValues(target, vmState);
      values.accent = accent;
      if(target === getCurrentSlide()){
        applyPropValues(target, values);
      } else {
        const next = {...parsePropDefaults(root), ...getSlideSourceProps(target), ...values};
        viewModel?.setProps?.(target.dataset.vmSlideId, next);
        if(opts.renderAll) applyPropValues(target, values);
      }
    });
    window.dispatchEvent(new CustomEvent('rd-accentchange', { detail: { accent } }));
  }

  function applyTheme02GlobalScheme(scheme, opts = {}){
    const nextScheme = String(scheme) === 'violet' ? 'violet' : 'green';
    const vmState = viewModel?.getState?.() || {};
    document.querySelectorAll('#deck > .slide[data-theme-pack="theme02"]').forEach(target => {
      const root = target.querySelector('[data-prop-controls]');
      const controls = parsePropControls(root);
      if(!controls.some(item => item.key === 'scheme')) return;
      const values = getSlidePropValues(target, vmState);
      values.scheme = nextScheme;
      if(target === getCurrentSlide()){
        applyPropValues(target, values);
      } else {
        const next = {...parsePropDefaults(root), ...getSlideSourceProps(target), ...values};
        viewModel?.setProps?.(target.dataset.vmSlideId, next);
        window.__markOverviewThumbDirty?.(target);
        if(opts.renderAll) applyPropValues(target, values);
      }
    });
  }

  function normalizePropOptions(options){
    return (options || []).map(item => Array.isArray(item)
      ? (isPaletteOption(item)
        ? {value:[...item], label:item.join(' / '), image:'', color:paletteSwatchBackground(item)}
        : {value:item[0], label:String(item[1] ?? item[0]), image:item[2] || '', color:item[3] || ''})
      : item && typeof item === 'object' && 'value' in item
        ? {value:item.value, label:String(item.label ?? item.value), image:item.image || item.src || '', color:item.color || item.swatch || item.hex || item.background || ''}
      : {value:item, label:String(item), image:''});
  }

  function isPaletteOption(item){
    return item.length > 1 && item.every(value => /^#[0-9a-f]{3,8}$/i.test(String(value || '')));
  }

  function paletteSwatchBackground(colors){
    const count = Math.max(1, colors.length);
    if(count === 1) return colors[0];
    const stops = colors.map((color, index) => {
      const from = index / count * 100;
      const to = (index + 1) / count * 100;
      return `${color} ${from}% ${to}%`;
    });
    return `linear-gradient(135deg, ${stops.join(', ')})`;
  }

  function propSwatchColor(control, item){
    if(item.color) return item.color;
    const named = {
      scheme: {
        green: 'linear-gradient(135deg,#c9f24d 0 48%,#37f5ff 52% 100%)',
        violet: 'linear-gradient(135deg,#8b5cf6 0 48%,#f472b6 52% 100%)',
      },
      accent: {
        blue: '#2742ec',
        lime: '#c2f53d',
      },
      accentTone: {
        green: '#22c55e',
        yellow: '#facc15',
        blue: '#3b82f6',
        pink: '#ec4899',
      },
    };
    return named[control.key]?.[String(item.value)] || String(item.value || 'transparent');
  }

  function coercePropValue(control, value){
    const controlType = normalizePropControlType(control.type, control);
    if(controlType === 'toggle') return value === true || value === 'true' || value === 1 || value === '1';
    if(controlType === 'range') return Number.isFinite(Number(value)) ? Number(value) : Number(control.min ?? 0);
    if(controlType === 'select' || controlType === 'segment'){
      const options = normalizePropOptions(control.options);
      let match = options.find(item => String(item.value) === String(value));
      if(!match && control.display === 'color'){
        match = options.find(item => Array.isArray(item.value) && String(item.value[0]) === String(value));
      }
      if(match) return match.value;
    }
    if(controlType === 'icons'){
      if(value == null || value === '') return null;
      const match = normalizePropOptions(control.options).find(item => String(item.value) === String(value));
      return match ? match.value : String(value);
    }
    if(controlType === 'image-list') return Array.isArray(value) ? value : [];
    if(controlType === 'image') return value == null ? '' : String(value);
    return value == null ? '' : String(value);
  }

  function applyPropValues(slide, values, opts = {}){
    if(!slide) return;
    const root = slide.querySelector('[data-prop-controls]');
    if(!root) return;
    const next = {...parsePropDefaults(root), ...getSlideSourceProps(slide), ...(values || {})};
    if(opts.persist !== false) viewModel?.setProps?.(slide.dataset.vmSlideId, next);
    if(opts.persist !== false) window.__markOverviewThumbDirty?.(slide);
    if(opts.unicornRefresh){
      slide.querySelectorAll('.bt-unicorn-frame').forEach(frame => window.__resetUnicornSceneFrame?.(frame));
    }
    if(window.__renderRuntimeSlide?.(slide, next)){
      window.__initEditableText?.(slide);
      window.__syncActiveEffects?.(slide);
      requestAnimationFrame(() => window.__initUnicornScenes?.(slide, {force:true}));
    }
  }

  function setEditorPanelsCollapsed(collapsed){
    const next = Boolean(collapsed);
    document.body.classList.toggle('editor-panels-collapsed', next);
    document.body.classList.toggle('preview-panel-open', !next);
    syncEditorPanelState();
    window.__setEditableTextMode?.(canEditDeck());
    requestEditorShellLayout();
  }

  function syncEditorPanelState(){
    const collapsed = document.body.classList.contains('editor-panels-collapsed');
    panel.setAttribute('aria-hidden', collapsed ? 'true' : 'false');
    slideRail?.setAttribute('aria-hidden', collapsed ? 'true' : 'false');
    if(isEditMode()){
      panel.inert = collapsed;
      if(slideRail) slideRail.inert = collapsed;
    }
    if(panelCollapse){
      const label = collapsed ? '展开面板' : '收起面板';
      panelCollapse.classList.toggle('is-collapsed', collapsed);
      panelCollapse.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
      panelCollapse.setAttribute('aria-label', label);
      panelCollapse.setAttribute('title', label);
    }
  }

  function requestEditorShellLayout(){
    requestAnimationFrame(() => {
      window.__layoutDeck?.();
      window.__fitOverviewThumbnails?.();
    });
  }
  window.__setEditorPanelsCollapsed = setEditorPanelsCollapsed;
  window.__getEditorPanelsCollapsed = () => document.body.classList.contains('editor-panels-collapsed');

  panel.addEventListener('mousedown', e => e.stopPropagation());
  panelCollapse?.addEventListener('mousedown', e => e.stopPropagation());
  panelCollapse?.addEventListener('click', () => setEditorPanelsCollapsed(!document.body.classList.contains('editor-panels-collapsed')));
  document.getElementById('preview-present-btn')?.addEventListener('click', () => window.__enterPresentMode?.());
  syncEditorPanelState();
  window.__setEditableTextMode?.(canEditDeck());
  requestEditorShellLayout();

  // merged export dropdown
  const exportWrap = document.getElementById('preview-export-wrap');
  const exportMain = document.getElementById('preview-export-main');
  const setExportOpen = (open) => {
    exportWrap?.classList.toggle('open', open);
    exportMain?.setAttribute('aria-expanded', open ? 'true' : 'false');
  };
  exportMain?.addEventListener('click', e => {
    e.stopPropagation();
    setExportOpen(!exportWrap.classList.contains('open'));
  });
  document.addEventListener('click', e => {
    if(exportWrap && !exportWrap.contains(e.target)) setExportOpen(false);
  });
  document.getElementById('preview-export')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckHtml?.(); });
  document.getElementById('preview-export-pdf')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckPdf?.(); });
  document.getElementById('preview-export-pptx')?.addEventListener('click', () => { setExportOpen(false); window.__exportDeckPptx?.(); });
  document.getElementById('preview-reset')?.addEventListener('click', () => {
    localStorage.removeItem(STORE);
    Object.keys(localStorage).filter(key => key.startsWith(`${STORE}:`)).forEach(key => localStorage.removeItem(key));
    localStorage.removeItem('dashi-ppt-view-model');
    Object.keys(localStorage).filter(key => key.startsWith('dashi-ppt-current-slide:')).forEach(key => localStorage.removeItem(key));
    const next = new URL(location.href);
    next.searchParams.delete('deckState');
    location.replace(next.href);
  });

  function getCurrentSlide(){
    const index = window.__currentSlideIndex || 0;
    return deckSlides[index] || null;
  }
})();

      window.__lastPdfExportResult = result;

  function createPdfExportProgressId(){

    return `pdf-${Date.now().toString(36)}-${random}`;
  }

  function beginPdfExportProgressPolling(exportUi, progressId){
    let stopped = false;
    const read = async () => {
      if(stopped || !progressId) return;
      try {
        const response = await fetch(`/api/export-pdf-progress?id=${encodeURIComponent(progressId)}`, {
          cache: 'no-store',
          credentials: 'same-origin',
        });
        if(!response.ok) return;
        const progress = await response.json();
        const percent = Math.max(0, Math.min(100, Number(progress.percent || 0)));
        const detail = progress.detail || '正在生成截图 PDF';
        updateDeckExport(exportUi, percent, 100, `${detail} · ${Math.round(percent)}%`);
      } catch {}
      if(!stopped) setTimeout(read, 450);
    };
    read();
    return { stop(){ stopped = true; } };
  }

  function buildPdfExportSnapshot(){
    return {
      themePack: document.documentElement.dataset.themePack || '',
      currentIndex: window.__currentSlideIndex || 0,
      state: window.__getDeckViewModelState?.() || {},

        button.disabled = true;

      window.__syncDeckPageNumbers?.();
      window.__flushEditableTextState?.();
      window.__syncDeckViewModelFromDom?.();

      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
      const progressId = createEditablePptxProgressId();
      progressPoll = beginEditablePptxProgressPolling(exportUi, progressId);
      updateDeckExport(exportUi, 1, 100, '提交可编辑 PPTX 生成任务...');
      const response = await fetch('/api/export-editable-pptx', {
        method: 'POST',

      throwIfDeckExportCancelled(exportUi);
      if(!response.ok){
        let detail = '';
        try { detail = (await response.json())?.error || ''; } catch {}
        throw new Error(detail || `Editable PPTX export endpoint failed (${response.status})`);
      }
      const result = await response.json();
      if(!result?.filePath) throw new Error('Editable PPTX export did not return a saved file path.');
      window.__lastPptxExportResult = result;
      throwIfDeckExportCancelled(exportUi);
      const downloadStarted = startServerExportDownload(result.downloadUrl, result.downloadName || `${getDeckFileName()}.pptx`);
      window.__lastPptxExportResult.downloadStarted = downloadStarted;
      updateDeckExport(exportUi, slides.length, slides.length, downloadStarted ? 'PPTX 已开始下载' : `PPTX 已保存：${result.relativePath || result.filePath}`);
      if(!downloadStarted) alert(`PPTX 已保存到：\n${result.filePath}`);
    } catch (error) {
      if(isDeckExportCancelledError(error)) return;
      console.error('[export pptx]', error);
      const message = location.protocol === 'http:' || location.protocol === 'https:'
        ? `可编辑 PPTX 导出失败：当前页面是 HTTP/HTTPS 地址,但没有连到本地预览导出服务、服务目录不匹配，或使用了会影响下载的 HTTP LAN/jadon.local 地址。请确认用 npm run preview:start -- <输出 ppt 目录> <port> 启动，并优先打开本机 HTTP 地址 http://127.0.0.1:<port>/ 或 http://localhost:<port>/ 后导出。错误：${error?.message || '未知错误'}`
        : '可编辑 PPTX 导出失败，请通过本地 HTTP/HTTPS 预览服务打开。直接打开本地 HTML/file:// 不能导出可编辑 PPTX。';
      window.__lastPptxExportErrorMessage = message;
      alert(message);
    } finally {
      progressPoll?.stop?.();
      document.body.classList.remove('pptx-export-capturing');
      endDeckExport(exportUi);
      if(button){
        button.disabled = false;
        button.textContent = buttonLabel;

  function createEditablePptxProgressId(){
    const random = Math.random().toString(36).slice(2, 10);
    return `pptx-${Date.now().toString(36)}-${random}`;
  }

  function isCodexInAppBrowser(){
    const ua = String(navigator.userAgent || '');
    const brands = (navigator.userAgentData?.brands || [])
      .map(item => `${item.brand || ''} ${item.version || ''}`)
      .join(' ');
    return /\b(CodexBrowser|OpenAI Codex|Codex Desktop|ChatGPT-Codex)\b/i.test(`${ua} ${brands}`);
  }

  function beginEditablePptxProgressPolling(exportUi, progressId){
    let stopped = false;
    const read = async () => {
      if(stopped || !progressId) return;
      try {
        const response = await fetch(`/api/export-editable-pptx-progress?id=${encodeURIComponent(progressId)}`, {
          cache: 'no-store',
          credentials: 'same-origin',
        });
        if(!response.ok) return;
        const progress = await response.json();
        const percent = Math.max(1, Math.min(99, Number(progress?.percent || 0)));
        const detail = progress?.detail || '正在生成可编辑 PPTX';
        updateDeckExport(exportUi, percent, 100, detail);
      } catch {}
    };
    const timer = setInterval(read, 500);
    read();
    return {
      stop(){
        stopped = true;
        clearInterval(timer);
      },
    };
  }

  function buildEditablePptxExportSnapshot(){
    return {
      themePack: document.documentElement.dataset.themePack || '',
      currentIndex: window.__currentSlideIndex || 0,
      state: window.__getDeckViewModelState?.() || {},
      canvasSnapshots: collectEditablePptxCanvasSnapshots(),
    };
  }

  function startServerExportDownload(downloadUrl, filename){
    if(!downloadUrl) return false;
    try {
      const url = new URL(downloadUrl, location.href);
      if(url.origin !== location.origin) return false;
      location.assign(url.href);
      return true;
    } catch {
      return false;
    }
  }

  function collectEditablePptxCanvasSnapshots(){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    const out = [];
    slides.forEach((slide, slideIndex) => {
      const slideRect = slide.getBoundingClientRect();
      if(!slideRect.width || !slideRect.height) return;
      slide.querySelectorAll('canvas').forEach((canvas, canvasIndex) => {
        if(canvas.closest('.bt-unicorn-frame')) return;
        const style = getComputedStyle(canvas);
        const rect = canvas.getBoundingClientRect();
        if(style.display === 'none' || style.visibility === 'hidden' || Number(style.opacity || 1) <= 0.01) return;
        if(rect.width <= 1 || rect.height <= 1) return;
        try {
          const data = canvas.toDataURL('image/png');
          out.push({
            slideIndex,
            canvasIndex,
            data,
            left: (rect.left - slideRect.left) / slideRect.width * 100,
            top: (rect.top - slideRect.top) / slideRect.height * 100,
            width: rect.width / slideRect.width * 100,
            height: rect.height / slideRect.height * 100,
          });
        } catch {}
      });
    });
    return out;
  }

  window.__exportDeckHtml = async function(){
    if(window.__deckExportLocked) return;

    try {
      window.__syncDeckPageNumbers?.();
      window.__flushEditableTextState?.();
      window.__syncDeckViewModelFromDom?.();
      const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
      const clone = document.documentElement.cloneNode(true);
      await prepareSimpleHtmlExportClone(clone, slides);

      console.error('[export html]', error);
      alert('HTML 导出失败，请在浏览器控制台查看错误。');
    } finally {
      window.__deckExportLocked = false;
      window.__syncActiveEffects?.();

  };

  async function materializeExportSlides(exportUi, label){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    for(let index = 0; index < slides.length; index++){
      throwIfDeckExportCancelled(exportUi);
      const slide = slides[index];
      updateDeckExport(exportUi, index, slides.length, `${label} 准备第 ${index + 1} / ${slides.length} 页`);
      window.__ensureRuntimeSlideRendered?.(slide);
      if(index % 2 === 1) await nextFrame();
    }
    updateDeckExport(exportUi, slides.length, slides.length, `${label} 页面已准备完成`);
    await nextFrame();
    return slides;
  }

  function prepareSlidesForPrint(slides){
    const states = slides.map(slide => ({
      slide,
      active: slide.classList.contains('active'),
      deckActive: slide.hasAttribute('data-deck-active'),
    }));
    slides.forEach(slide => {
      slide.classList.add('active');
      slide.setAttribute('data-deck-active', '');
    });
    return () => states.forEach(({slide, active, deckActive}) => {
      slide.classList.toggle('active', active);
      if(deckActive) slide.setAttribute('data-deck-active', '');
      else slide.removeAttribute('data-deck-active');
    });

  function captureExportViewState(){
    return {
      index: window.__currentSlideIndex || 0,
      mode: deckMode,
      panelOpen: document.body.classList.contains('preview-panel-open'),

    };
