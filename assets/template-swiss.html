<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>[必填] 替换为 PPT 标题 · Deck Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800;900&family=Caveat:wght@400;600;700&family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Space+Mono:wght@400;700&family=Zhi+Mang+Xing&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#fafaf8;
    --paper-rgb:250,250,248;
    --ink:#0a0a0a;
    --ink-rgb:10,10,10;
    --focus-mark:#46e3c6;
    --focus-bg:#002fa7;
    --focus-fg:#ffffff;
    --border-subtle:rgba(255,255,255,.14);
    --border-strong:rgba(255,255,255,.28);
    --text-secondary:rgba(255,255,255,.66);
    --text-helper:rgba(255,255,255,.46);
    --sans:"Inter","Noto Sans SC",system-ui,-apple-system,sans-serif;
    --sans-zh:"Noto Sans SC","PingFang SC",var(--sans);
    --mono:"Space Mono","JetBrains Mono",ui-monospace,monospace;
    --ease-prod:cubic-bezier(.2,0,.38,.9);
    --preview-panel-w:min(380px,92vw);
    --deck-w:100vw;
    --deck-h:56.25vw;
    --deck-left:0px;
    --deck-top:0px;
    --deck-scale:1;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:var(--sans-zh);letter-spacing:0}
  body{user-select:none}
  #deck-viewport{position:fixed;left:var(--deck-left);top:var(--deck-top);z-index:1;width:var(--deck-w);height:var(--deck-h);overflow:hidden;background:#000}
  #deck{position:absolute;left:0;top:0;z-index:1;display:flex;will-change:transform}
  .slide{position:relative;flex:0 0 var(--deck-w);width:var(--deck-w);height:var(--deck-h);overflow:hidden;background:#02040c;color:#fff}
  .slide[hidden]{display:none!important}
  .slide:not(.active){pointer-events:none}
  .slide.active{pointer-events:auto}
  #hint,#nav{display:none!important}
  #nav .dot{width:6px;height:6px;padding:0;border:0;border-radius:999px;background:rgba(255,255,255,.32);cursor:pointer;transition:width .2s var(--ease-prod),background .2s var(--ease-prod)}
  #nav .dot.active{width:20px;background:var(--focus-mark)}
  /* ========== Preview controller · Figma-inspired · auto light/dark ========== */
  :root{
    --pp-fg:#1e1e1e; --pp-fg2:#6b6b6b; --pp-muted:#b3b3b3; --pp-icon:#444;
    --pp-bg:#fff; --pp-chip:#f4f4f5; --pp-chip-h:#ececed; --pp-border:#e3e3e4; --pp-divider:#ededee;
    --pp-sel-bg:#fff; --pp-sel-bd:#e1e1e1; --pp-sel-sh:0 1px 2px rgba(0,0,0,.08);
    --pp-rail:#e2e2e3; --pp-off:#d9d9db; --pp-blue:#0d99ff; --pp-blue-h:#0c87e0; --pp-blue-soft:#e8f4ff;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --pp-fg:#fff; --pp-fg2:#a0a0a0; --pp-muted:#6f6f6f; --pp-icon:#cfcfcf;
      --pp-bg:#2c2c2c; --pp-chip:#383838; --pp-chip-h:#434343; --pp-border:#222; --pp-divider:#1f1f1f;
      --pp-sel-bg:#4a4a4a; --pp-sel-bd:#5a5a5a; --pp-sel-sh:0 1px 2px rgba(0,0,0,.35);
      --pp-rail:#565656; --pp-off:#565656; --pp-blue:#0d99ff; --pp-blue-h:#2aa5ff; --pp-blue-soft:rgba(13,153,255,.16);
    }
  }
  #preview-toggle{position:fixed;right:18px;top:18px;z-index:25;width:38px;height:38px;display:grid;place-items:center;border:1px solid var(--pp-border);border-radius:9px;background:var(--pp-bg);color:var(--pp-icon);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.12);transition:opacity .2s var(--ease-prod),transform .2s var(--ease-prod),background .15s}
  #preview-toggle:hover{background:var(--pp-chip)}
  #preview-toggle svg{width:19px;height:19px}
  body.preview-panel-open #preview-toggle{opacity:0;transform:scale(.85);pointer-events:none}
  #preview-panel{position:fixed;right:0;top:0;z-index:24;width:var(--preview-panel-w);height:100vh;display:flex;flex-direction:column;background:var(--pp-bg);color:var(--pp-fg);border-left:1px solid var(--pp-divider);box-shadow:-20px 0 60px rgba(0,0,0,.18);transform:translateX(100%);transition:transform .24s var(--ease-prod);overflow:hidden;font-family:var(--sans);font-variant-numeric:tabular-nums;letter-spacing:0}
  body.preview-panel-open #preview-panel{transform:translateX(0)}
  #preview-panel svg{display:block;flex:0 0 auto}
  /* header */
  .preview-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;padding:14px 12px 14px 16px;border-bottom:1px solid var(--pp-divider)}
  .preview-title{font:600 14.5px/1 var(--sans);letter-spacing:-.01em;color:var(--pp-fg);text-transform:none}
  .preview-count{margin-top:6px;font:500 11.5px/1 var(--sans);color:var(--pp-fg2);white-space:nowrap}
  .preview-head-actions{display:flex;gap:2px}
  .pp-ib{width:28px;height:28px;display:grid;place-items:center;border:0;border-radius:6px;background:transparent;color:var(--pp-icon);cursor:pointer}
  .pp-ib:hover{background:var(--pp-chip)}
  .pp-ib svg{width:16px;height:16px}
  /* body / fields */
  .preview-fields{flex:1;overflow:auto;display:block}
  .preview-field{padding:13px 16px;border-bottom:1px solid var(--pp-divider);display:grid;gap:11px}
  .preview-field.is-hidden{display:none}
  .preview-field label,.preview-prop-row>span{font:600 13px/1.2 var(--sans);letter-spacing:0;color:var(--pp-fg);text-transform:none}
  .preview-field select{height:34px;border:1px solid transparent;border-radius:6px;background:var(--pp-chip);color:var(--pp-fg);padding:0 10px;font:500 12.5px/1 var(--sans-zh);cursor:pointer;appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236b6b6b' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='m6 9 6 6 6-6'/></svg>");background-repeat:no-repeat;background-position:right 9px center;padding-right:30px}
  .preview-field select:hover{background-color:var(--pp-chip-h)}
  .preview-props{display:grid;gap:13px}
  /* property rows */
  .preview-prop-row{display:grid;grid-template-columns:78px 1fr;align-items:center;gap:12px}
  .preview-prop-row.is-choice{grid-template-columns:1fr;gap:9px}
  .preview-prop-row>span{display:flex;align-items:center;gap:7px;font:500 12.5px/1 var(--sans);color:var(--pp-fg2)}
  .preview-prop-row>span svg{width:14px;height:14px;color:var(--pp-muted)}
  /* slider (range) */
  .pp-slider{display:flex;align-items:center;gap:11px;width:100%}
  .pp-slider-track{position:relative;flex:1;height:18px;display:flex;align-items:center}
  .preview-prop-row input[type="range"]{-webkit-appearance:none;appearance:none;width:100%;margin:0;cursor:grab;outline:none;background:transparent;touch-action:none}
  .preview-prop-row input[type="range"]:active{cursor:grabbing}
  /* stepped variant */
  .pp-slider.is-stepped input[type="range"]{height:4px;border-radius:99px;background:linear-gradient(var(--pp-blue),var(--pp-blue)) 0/var(--pp-pct,0%) no-repeat var(--pp-rail)}
  .pp-slider.is-stepped input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--pp-bg);border:2px solid var(--pp-blue);box-shadow:0 1px 2px rgba(0,0,0,.22);cursor:grab}
  .pp-ticks{position:absolute;left:1px;right:1px;bottom:-6px;display:flex;justify-content:space-between;pointer-events:none}
  .pp-ticks span{width:2px;height:4px;border-radius:1px;background:var(--pp-rail)}
  .pp-ticks span.on{background:var(--pp-blue)}
  /* smooth variant */
  .pp-slider.is-smooth input[type="range"]{height:8px;border-radius:99px;background:linear-gradient(var(--pp-blue),var(--pp-blue)) 0/var(--pp-pct,0%) no-repeat var(--pp-rail)}
  .pp-slider.is-smooth input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:8px;height:18px;border-radius:4px;background:#fff;border:1px solid rgba(0,0,0,.12);box-shadow:0 1px 3px rgba(0,0,0,.3);cursor:grab}
  .preview-prop-row output{min-width:38px;height:28px;padding:0 8px;display:grid;place-items:center;font:600 12.5px/1 var(--sans);color:var(--pp-fg);background:var(--pp-chip);border-radius:6px;text-align:center}
  /* toggle / switch */
  .pp-switch{justify-self:end;position:relative;width:38px;height:22px;flex:0 0 auto;cursor:pointer}
  .pp-switch input{position:absolute;opacity:0;width:100%;height:100%;margin:0;cursor:pointer}
  .pp-switch .pp-track{position:absolute;inset:0;border-radius:99px;background:var(--pp-off);transition:background .18s}
  .pp-switch .pp-knob{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.28);transition:transform .2s cubic-bezier(.3,.7,.3,1.3)}
  .pp-switch input:checked~.pp-track{background:var(--pp-blue)}
  .pp-switch input:checked~.pp-knob{transform:translateX(16px)}
  /* segmented choice group */
  .preview-prop-choice-group{display:grid;grid-auto-flow:column;grid-auto-columns:1fr;gap:2px;padding:2px;background:var(--pp-chip);border-radius:7px}
  .preview-prop-choice{position:relative;height:30px;display:flex;align-items:center;justify-content:center;border:1px solid transparent;border-radius:5px;background:transparent;color:var(--pp-fg2);font:500 12px/1 var(--sans-zh);cursor:pointer;transition:color .15s}
  .preview-prop-choice:hover:not(.is-active){color:var(--pp-fg)}
  .preview-prop-choice.is-active{background:var(--pp-sel-bg);border-color:var(--pp-sel-bd);box-shadow:var(--pp-sel-sh);color:var(--pp-fg);font-weight:600}
  /* color swatch group (display:color) */
  .preview-prop-choice-group.is-color{display:flex;gap:9px;padding:0;background:transparent;border-radius:0}
  .preview-prop-choice-group.is-color .preview-prop-choice{width:26px;height:26px;min-width:0;flex:0 0 auto;border-radius:6px;box-shadow:inset 0 0 0 1px rgba(0,0,0,.14);transition:transform .12s}
  .preview-prop-choice-group.is-color .preview-prop-choice:hover{transform:scale(1.06)}
  .preview-prop-choice-group.is-color .preview-prop-choice.is-active{box-shadow:inset 0 0 0 1px rgba(0,0,0,.14),0 0 0 2px var(--pp-bg),0 0 0 4px var(--pp-blue)}
  .preview-prop-row.is-icons{grid-template-columns:1fr;gap:9px}
  .preview-prop-icon-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}
  .preview-prop-icon-choice{min-height:72px;display:grid;grid-template-rows:46px auto;place-items:center;gap:5px;padding:6px 4px;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg2);font:500 10px/1.15 var(--sans-zh);cursor:pointer;text-align:center}
  .preview-prop-icon-choice:hover{background:var(--pp-chip-h);color:var(--pp-fg)}
  .preview-prop-icon-choice.is-active{background:var(--pp-sel-bg);border-color:var(--pp-blue);box-shadow:0 0 0 1px var(--pp-blue-soft);color:var(--pp-fg);font-weight:600}
  .preview-prop-icon-choice img{max-width:46px;max-height:46px;width:auto;height:auto;object-fit:contain;display:block}
  .preview-prop-icon-empty{width:34px;height:34px;border-radius:8px;border:1px dashed var(--pp-muted);display:grid;place-items:center;color:var(--pp-muted);font:600 11px/1 var(--sans)}
  .pp-text{width:100%;height:34px;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);padding:0 10px;font:500 12.5px/1 var(--sans-zh);outline:none}
  .pp-textarea{width:100%;min-height:74px;max-height:150px;resize:vertical;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);padding:9px 10px;font:500 12.5px/1.45 var(--sans-zh);outline:none}
  .pp-text:focus,.pp-textarea:focus{border-color:var(--pp-blue);background:var(--pp-bg)}
  .pp-image{display:grid;grid-template-columns:42px 1fr;align-items:center;gap:9px}
  .pp-image-preview{width:42px;height:42px;display:grid;place-items:center;border:1px solid var(--pp-border);border-radius:7px;background:var(--pp-chip);overflow:hidden;cursor:pointer}
  .pp-image-preview img{max-width:100%;max-height:100%;object-fit:contain;display:block}
  .pp-image-preview:not(.has-image)::before{content:"";width:17px;height:13px;border:1.7px solid var(--pp-muted);border-radius:2px;box-sizing:border-box}
  .pp-image-btn{height:34px;border:1px solid var(--pp-border);border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);font:500 12.5px/1 var(--sans-zh);cursor:pointer}
  .pp-image-btn:hover{background:var(--pp-chip-h)}
  .pp-image-file{display:none}
  .preview-prop-row.is-textarea{grid-template-columns:1fr;gap:8px}
  .preview-prop-row.is-json{grid-template-columns:1fr;gap:8px}
  .pp-json{width:100%;min-height:82px;max-height:180px;resize:vertical;border:1px solid transparent;border-radius:7px;background:var(--pp-chip);color:var(--pp-fg);padding:9px 10px;font:500 11.5px/1.45 var(--mono);outline:none}
  .pp-json:focus{border-color:var(--pp-blue);background:var(--pp-bg)}
  .pp-json.is-invalid{border-color:#ef4444;color:#ef4444}
  /* footer actions */
  .preview-actions{display:flex;align-items:stretch;gap:8px;padding:12px 14px;border-top:1px solid var(--pp-divider)}
  .pp-export{position:relative;flex:1}
  #preview-export-main{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;height:36px;border:0;border-radius:6px;cursor:pointer;background:var(--pp-blue);color:#fff;font:600 13px/1 var(--sans-zh)}
  #preview-export-main:hover{background:var(--pp-blue-h)}
  #preview-export-main svg{width:16px;height:16px}
  #preview-export-main .pp-cap{transition:transform .2s}
  .pp-export.open #preview-export-main .pp-cap{transform:rotate(180deg)}
  .pp-export-menu{position:absolute;left:0;right:0;bottom:calc(100% + 6px);z-index:5;display:none;flex-direction:column;padding:4px;background:var(--pp-bg);border:1px solid var(--pp-border);border-radius:8px;box-shadow:0 12px 34px rgba(0,0,0,.22)}
  .pp-export.open .pp-export-menu{display:flex}
  .pp-export-menu button{display:flex;align-items:center;gap:10px;height:36px;padding:0 9px;border:0;border-radius:6px;background:transparent;cursor:pointer;color:var(--pp-fg);font:500 12.5px/1 var(--sans-zh);text-align:left}
  .pp-export-menu button svg{width:16px;height:16px;color:var(--pp-icon)}
  .pp-export-menu button span{flex:1}
  .pp-export-menu button kbd{font:500 10px/1 var(--sans);color:var(--pp-fg2);padding:3px 6px;border-radius:4px;background:var(--pp-chip)}
  .pp-export-menu button:hover{background:var(--pp-blue-soft)}
  .pp-export-menu button:hover svg{color:var(--pp-blue)}
  .overview-context-menu{position:fixed;z-index:130;min-width:138px;display:none;padding:5px;background:var(--pp-bg);border:1px solid var(--pp-border);border-radius:8px;box-shadow:0 14px 36px rgba(0,0,0,.22);color:var(--pp-fg)}
  .overview-context-menu button{display:flex;align-items:center;justify-content:space-between;width:100%;height:34px;padding:0 9px;border:0;border-radius:6px;background:transparent;color:var(--pp-fg);font:500 12.5px/1 var(--sans-zh);text-align:left;cursor:pointer}
  .overview-context-menu button:hover{background:var(--pp-blue-soft)}
  .overview-context-menu button[disabled]{opacity:.42;cursor:not-allowed}
  .overview-context-menu button[disabled]:hover{background:transparent}
  .overview-skip-badge{position:absolute;right:8px;top:8px;z-index:3;padding:5px 8px;border-radius:999px;background:rgba(10,10,10,.72);color:#fff;font:600 11px/1 var(--sans-zh);letter-spacing:0;pointer-events:none}
  .deck-export-overlay{position:fixed;inset:0;z-index:220;display:none;align-items:center;justify-content:center;background:rgba(6,7,10,.78);backdrop-filter:blur(16px);color:#fff;pointer-events:auto}
  body.exporting-deck .deck-export-overlay{display:flex}
  .deck-export-card{width:min(360px,calc(100vw - 48px));display:grid;gap:16px;padding:22px 24px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:rgba(20,22,27,.9);box-shadow:0 22px 70px rgba(0,0,0,.42)}
  .deck-export-title{font:700 15px/1.2 var(--sans-zh)}
  .deck-export-detail{font:500 12px/1.5 var(--sans-zh);color:rgba(255,255,255,.68)}
  .deck-export-bar{height:8px;border-radius:999px;background:rgba(255,255,255,.16);overflow:hidden}
  .deck-export-fill{height:100%;width:0%;border-radius:inherit;background:var(--focus-mark);transition:width .18s var(--ease-prod)}
  .deck-export-actions{display:flex;justify-content:flex-end}
  .deck-export-cancel{height:32px;padding:0 13px;border:1px solid rgba(255,255,255,.2);border-radius:6px;background:rgba(255,255,255,.08);color:#fff;cursor:pointer;font:600 12.5px/1 var(--sans-zh)}
  .deck-export-cancel:hover{background:rgba(255,255,255,.14)}
  .deck-export-cancel[disabled]{opacity:.62;cursor:default}
  #preview-reset{display:flex;align-items:center;justify-content:center;gap:6px;height:36px;padding:0 14px;border:1px solid var(--pp-border);border-radius:6px;background:var(--pp-bg);color:var(--pp-fg2);cursor:pointer;font:500 12.5px/1 var(--sans-zh)}
  #preview-reset:hover{background:var(--pp-chip);color:var(--pp-fg)}
  #preview-reset svg{width:15px;height:15px}
  [contenteditable="true"]{outline:none;overflow-wrap:normal;word-break:normal}
  body.preview-panel-open [contenteditable="true"]{cursor:text;user-select:text}
  body.preview-panel-open [contenteditable="true"]:focus{box-shadow:0 0 0 2px var(--focus-mark);border-radius:6px}
  .page-transition-stage{position:fixed;left:var(--deck-left);top:var(--deck-top);width:var(--deck-w);height:var(--deck-h);z-index:90;pointer-events:none;background:#02040c;opacity:0;overflow:hidden}
  .page-transition-stage.is-active{opacity:1}
  .page-transition-stage .slide{position:absolute;left:0;top:0}
  .bt-unicorn-frame{background:#05070b}
  .bt-unicorn-scene{position:absolute;inset:0;width:100%;height:100%;overflow:hidden}
  .bt-unicorn-scene canvas{width:100%!important;height:100%!important;display:block}
  @media (prefers-reduced-motion:no-preference){
    [data-deck-active] [data-chart-motion]{animation-delay:calc(var(--chart-motion-i,0) * 28ms)}
    [data-deck-active] [data-chart-motion="bar"]{transform-box:fill-box;transform-origin:center bottom;animation:deck-chart-grow-y .58s cubic-bezier(.2,.8,.2,1) both}
    [data-deck-active] [data-chart-motion="row"]{transform-box:fill-box;transform-origin:left center;animation:deck-chart-grow-x .58s cubic-bezier(.2,.8,.2,1) both}
    [data-deck-active] [data-chart-motion="line"]{stroke-dasharray:var(--chart-motion-len,640);animation:deck-chart-draw .82s cubic-bezier(.3,.7,.2,1) both}
    [data-deck-active] [data-chart-motion="cell"],
    [data-deck-active] [data-chart-motion="point"]{transform-box:fill-box;transform-origin:center;animation:deck-chart-pop .48s cubic-bezier(.2,.9,.3,1.15) both}
    [data-deck-active] [data-chart-motion="area"]{transform-box:fill-box;transform-origin:center bottom;animation:deck-chart-area .7s cubic-bezier(.2,.8,.2,1) both}
  }
  @media (prefers-reduced-motion:reduce){
    [data-deck-active] [data-chart-motion]{animation:deck-chart-fade .16s ease both}
  }
  @keyframes deck-chart-grow-y{from{transform:scaleY(.04);opacity:.35}to{transform:scaleY(1);opacity:1}}
  @keyframes deck-chart-grow-x{from{transform:scaleX(.04);opacity:.35}to{transform:scaleX(1);opacity:1}}
  @keyframes deck-chart-draw{from{stroke-dashoffset:var(--chart-motion-len,640);opacity:.45}to{stroke-dashoffset:0;opacity:1}}
  @keyframes deck-chart-pop{from{transform:scale(.72);opacity:.28}to{transform:scale(1);opacity:1}}
  @keyframes deck-chart-area{from{transform:scaleY(.18);opacity:.28}to{transform:scaleY(1);opacity:1}}
  @keyframes deck-chart-fade{from{opacity:.75}to{opacity:1}}
  .imported-theme-root{position:absolute;left:0;top:0;width:1920px;height:1080px;overflow:hidden;transform:scale(var(--deck-scale));transform-origin:top left}
  .imported-theme-root *{box-sizing:border-box}
  .bg-blue{background:radial-gradient(125% 135% at 16% 102%,#5a8dff 0%,#2f6bff 20%,#1d4ad8 40%,#122e93 60%,#08164a 80%,#03081e 100%)}
  .bg-deep{background:radial-gradient(115% 120% at 24% 90%,#224bd6 0%,#15369f 26%,#0c205f 50%,#070f38 72%,#03071a 100%)}
  .bg-electric{background:radial-gradient(120% 130% at 28% 102%,#5f8eff 0%,#386df3 20%,#2350d6 38%,#1638a0 56%,#0c2160 74%,#050e36 90%,#02060f 100%)}
  .bg-night{background:radial-gradient(125% 120% at 78% 8%,#1c3aa8 0%,#142b78 22%,#0b1a4c 44%,#060f30 66%,#03081c 84%,#01030c 100%)}
  @page{size:20in 11.25in;margin:0}

<script>
/* =============== Deck ViewModel Runtime =============== */
(function(){
  const vmEl = document.getElementById('deck-view-model');
  const textEl = document.getElementById('embedded-text-state');
  if(!vmEl) return;

  const STORE = 'dashi-ppt-view-model';
  const vm = readJson(vmEl, {});
  vm.state = vm.state || {};
  const embeddedText = readJson(textEl, {});
  const deckSignature = createDeckSignature(vm, {...(vm.state?.text || {}), ...embeddedText});
  const saved = readSaved(deckSignature);
  vm.state.slideOrder = saved.slideOrder || vm.state.slideOrder || (vm.slides || []).map(slide => slide.id);
  vm.state.skippedSlides = saved.skippedSlides || vm.state.skippedSlides || [];
  vm.state.deletedSlides = saved.deletedSlides || vm.state.deletedSlides || [];
  vm.state.text = {...(vm.state.text || {}), ...embeddedText, ...(saved.text || {})};
  vm.state.props = {...(vm.state.props || {}), ...(saved.props || {})};
  vm.state.__deckSignature = deckSignature;

  writeJson(textEl, vm.state.text);
  writeVm();

  window.__deckViewModel = {
    model: vm,
    getState,
    setTextState,
    setSlideOrder,
    setSkippedSlides,
    setDeletedSlides,
    setProps,
    syncFromDom,
    write: writeVm,
    persist,
  };
  window.__getDeckViewModelState = getState;
  window.__syncDeckViewModelFromDom = syncFromDom;

  function getState(){
    return JSON.parse(JSON.stringify(vm.state || {}));
  }


  function setTextState(text){
    vm.state.text = {...(text || {})};
    writeJson(textEl, vm.state.text);
    writeVm();
    persist();
  }

  function setSlideOrder(order){
    vm.state.slideOrder = [...(order || [])];
    writeVm();
    persist();
  }

  function setSkippedSlides(ids){
    vm.state.skippedSlides = uniqueIds(ids);
    writeVm();
    persist();
  }

  function setDeletedSlides(ids){
    vm.state.deletedSlides = uniqueIds(ids);
    writeVm();
    persist();
  }

  function setProps(slideId, props){
    if(!slideId) return;
    vm.state.props[slideId] = {...(props || {})};
    writeVm();
    persist();
  }

  function syncFromDom(){
    const slides = window.__getVisibleSlides?.() || [...document.querySelectorAll('#deck > .slide:not([hidden])')];
    setSlideOrder(slides.map((slide, index) => slide.dataset.vmSlideId || vm.slides?.[index]?.id || `slide-${index + 1}`));
    return getState();
  }

  function readSaved(signature){
    try {
      const saved = JSON.parse(localStorage.getItem(STORE) || '{}') || {};
      return saved.__deckSignature === signature ? saved : {};
    } catch {
      return {};
    }
  }

  function persist(){
    vm.state.__deckSignature = deckSignature;
    try {
      localStorage.setItem(STORE, JSON.stringify(vm.state || {}));
    } catch (error) {
      console.warn('[deck view model] state could not be persisted', error);
    }
  }

  function writeVm(){
    writeJson(vmEl, vm);
  }

  function uniqueIds(ids){
    return [...new Set((ids || []).filter(Boolean).map(String))];
  }

  function readJson(el, fallback){
    if(!el) return fallback;
    try {
      return JSON.parse(el.textContent || '') || fallback;
    } catch {
      return fallback;
    }
  }

  function writeJson(el, data){
    if(el) el.textContent = JSON.stringify(data || {}).replace(/</g, '\\u003c');
  }

  function createDeckSignature(model, text){
    const payload = JSON.stringify({
      title: model.title,
      slides: (model.slides || []).map(slide => [slide.id, slide.key, slide.layout, slide.dataLayout, slide.props]),
      text,
    });
    let hash = 0;
    for(let i = 0; i < payload.length; i += 1){
      hash = ((hash << 5) - hash + payload.charCodeAt(i)) | 0;
    }
    return String(hash);
  }
})();

</script>
<script>
/* =============== 导航 =============== */
const deck=document.getElementById('deck');
function collectDeckSlides(root=deck){
  return [...(root?.children || [])].filter(el => el.classList?.contains('slide'));
}
let allSlides=collectDeckSlides();
let slides=[...allSlides];
const nav=document.getElementById('nav');
let idx=0,total=0,lock=false;
let deckW=innerWidth;
let deckH=innerHeight;
let deckLeft=0;
let deckTop=0;
let deckScale=1;
let activeThemePack=document.documentElement.dataset.themePack || '';
const CURRENT_SLIDE_STORE='dashi-ppt-current-slide';
const DECK_ASPECT_W=16;
const DECK_ASPECT_H=9;

function getVisibleSlides(){
  return slides;
}
window.__getVisibleSlides = getVisibleSlides;

function currentSlideStoreKey(){
  const signature = window.__deckViewModel?.model?.state?.__deckSignature || location.pathname || 'deck';
  return `${CURRENT_SLIDE_STORE}:${signature}`;
}

function readStoredSlideIndex(){
  try {
    const raw = localStorage.getItem(currentSlideStoreKey());
    if(!raw) return null;
    const saved = JSON.parse(raw);
    const value = typeof saved === 'number' ? saved : saved?.index;
    return Number.isFinite(Number(value)) ? Number(value) : null;
  } catch {
    return null;
  }
}

function writeStoredSlideIndex(index){
  try {
    localStorage.setItem(currentSlideStoreKey(), JSON.stringify({
      index,
      updatedAt: new Date().toISOString(),
    }));
  } catch {}
}

function previewStoreKey(){
  const signature = window.__deckViewModel?.model?.state?.__deckSignature || location.pathname || 'deck';
  return `dashi-ppt-preview:${signature}`;
}
window.__previewStoreKey = previewStoreKey;

function getSlideVmId(slide, index=allSlides.indexOf(slide)){
  return slide?.dataset?.vmSlideId || slide?.id || slide?.dataset?.layout || `slide-${Math.max(0, index) + 1}`;
}

function getSlideStateSet(key){
  return new Set((window.__deckViewModel?.getState?.()?.[key] || []).filter(Boolean).map(String));
}

function isSlideHiddenByThemePack(slide){
  return !!(activeThemePack && slide?.dataset.themePack && slide.dataset.themePack !== activeThemePack);
}

function isSlideDeleted(slide, index=allSlides.indexOf(slide)){
  return getSlideStateSet('deletedSlides').has(getSlideVmId(slide, index));
}

function isSlideSkipped(slide, index=allSlides.indexOf(slide)){
  return getSlideStateSet('skippedSlides').has(getSlideVmId(slide, index));
}

function getCatalogSlides(){
  allSlides=collectDeckSlides();
  return allSlides.filter((slide, index) => !isSlideHiddenByThemePack(slide) && !isSlideDeleted(slide, index));
}

function persistCatalogSlideOrder(){
  window.__deckViewModel?.setSlideOrder?.(getCatalogSlides().map((slide, index) => getSlideVmId(slide, index)));
}

function refreshSlideList(){
  allSlides=collectDeckSlides();
  const skipped = getSlideStateSet('skippedSlides');
  const deleted = getSlideStateSet('deletedSlides');
  allSlides.forEach((slide, index) => {
    const slideId = getSlideVmId(slide, index);
    const hiddenByPack = isSlideHiddenByThemePack(slide);
    const hiddenByState = deleted.has(slideId) || skipped.has(slideId);
    const hidden = hiddenByPack || hiddenByState;
    slide.hidden = hidden;
    if(skipped.has(slideId)) slide.dataset.slideSkipped = 'true';
    else delete slide.dataset.slideSkipped;
    if(hidden) slide.setAttribute('aria-hidden', 'true');
    else slide.removeAttribute('aria-hidden');
  });
  slides=allSlides.filter(slide => !slide.hidden);
  total=slides.length;
  if(total === 0) idx=0;
  if(idx >= total) idx=Math.max(0,total-1);
}

function ensureRuntimeSlideRendered(slide, values){
  if(!slide) return false;
  const slideId = slide.dataset.vmSlideId;
  const sourceProps = window.__deckViewModel?.model?.slides?.find(item => item.id === slideId)?.props || {};
  const savedProps = window.__deckViewModel?.getState?.().props?.[slideId] || {};
  const next = {...sourceProps, ...savedProps, ...(values || {})};
  const rendered = !!window.__renderRuntimeSlide?.(slide, next);
  if(rendered) window.__initEditableText?.(slide);
  return rendered;
}
window.__ensureRuntimeSlideRendered = ensureRuntimeSlideRendered;

function setActiveThemePack(themePack, opts={}){
  activeThemePack=themePack || '';
  if(activeThemePack) document.documentElement.dataset.themePack=activeThemePack;
  else document.documentElement.removeAttribute('data-theme-pack');
  refreshSlideList();
  renderNav();
  layoutDeck();
  if(opts.navigate !== false) go(0, {animate:false});
  else commitSlideIndex(idx);
}
window.__setActiveThemePack=setActiveThemePack;

function applyDeckTransform(){
  deck.style.transform=`translateX(${-idx*deckW}px)`;
}

function measureDeckStage(availableW, availableH, offsetLeft=0){
  const safeW=Math.max(320,availableW);
  const safeH=Math.max(180,availableH);
  const width=Math.min(safeW,safeH*DECK_ASPECT_W/DECK_ASPECT_H);
  const height=width*DECK_ASPECT_H/DECK_ASPECT_W;
  return {
    width,
    height,
    left:offsetLeft+(safeW-width)/2,
    top:(safeH-height)/2,
  };
}

function layoutDeck(){
  const panel=document.getElementById('preview-panel');
  const panelOpen=document.body.classList.contains('preview-panel-open');
  const panelW=panelOpen && panel ? panel.offsetWidth : 0;
  const stage=measureDeckStage(innerWidth-panelW,innerHeight);
  deckW=stage.width;
  deckH=stage.height;
  deckLeft=stage.left;
  deckTop=stage.top;
  deckScale=deckW/1920;
  document.documentElement.style.setProperty('--deck-w',`${deckW}px`);
  document.documentElement.style.setProperty('--deck-h',`${deckH}px`);
  document.documentElement.style.setProperty('--deck-left',`${deckLeft}px`);
  document.documentElement.style.setProperty('--deck-top',`${deckTop}px`);
  document.documentElement.style.setProperty('--deck-scale',String(deckScale));
  deck.style.width=(total*deckW)+'px';
  deck.style.height=deckH+'px';
  applyDeckTransform();
}
window.__layoutDeck=layoutDeck;
addEventListener('resize',layoutDeck);

deck.addEventListener('mousedown', e=>{
  if(document.body.classList.contains('preview-panel-open')) return;
  if(overviewOn) return;
  if(isDeckInteractiveTarget(e.target)) return;
  if(e.button===0){
    e.preventDefault();
    if(window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+1);
  } else if(e.button===2){
    e.preventDefault();
    go(idx-1);
  }
});
deck.addEventListener('contextmenu', e=>e.preventDefault());

function syncNav(){
  nav.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('active',i===idx));
}

function renderNav(){
  refreshSlideList();
  nav.innerHTML='';
  slides.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='dot';b.dataset.i=i;b.setAttribute('aria-label','Page '+(i+1));
    b.onclick=()=>go(i);
    nav.appendChild(b);
  });
  syncNav();
}
setActiveThemePack(activeThemePack, {navigate:false});

function slideUsesDarkChrome(el){
  return !!el && (el.classList.contains('dark') || el.classList.contains('accent'));
}

function syncSlideTone(el=slides[idx]){
  const isDark=slideUsesDarkChrome(el);
  document.body.classList.toggle('dark-bg', isDark);
}
window.__syncSlideTone=syncSlideTone;

function getActiveSlide(){
  return slides[window.__currentSlideIndex || idx || 0] || slides[0];
}

function isDeckFileSlotTarget(target){
  if(!(target instanceof Element)) return false;
  if(target.closest('[data-dashi-host-image-slot],image-slot,[role="button"],.gxn-slot,.pulse-imgframe,.acl-slot,.kx-imgslot,.dslot')) return true;
  return target.matches?.('input[type="file"]') || !!target.closest('input[type="file"]');
}
window.__isDeckFileSlotTarget = isDeckFileSlotTarget;

function isDeckEditableTextTarget(target){
  if(!target?.closest) return false;
  if(target.closest('[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]')) return true;
  return document.body.classList.contains('preview-panel-open') && !!target.closest('[data-editable-id]');
}
window.__isDeckEditableTextTarget = isDeckEditableTextTarget;

function isDeckInteractiveTarget(target){
  if(!(target instanceof Element)) return false;
  return !!target.closest('button,select,input,textarea,a,#preview-panel,#preview-toggle') ||
    isDeckFileSlotTarget(target) ||
    isDeckEditableTextTarget(target);
}
window.__isDeckInteractiveTarget = isDeckInteractiveTarget;

function syncAmbientGrid(){ }

function syncVideoActivity(activeSlide=getActiveSlide()){
  slides.forEach(slide => {
    const active = slide === activeSlide && !document.hidden;
    slide.querySelectorAll('video').forEach(video => {
      if(active) video.play?.().catch(() => {});
      else video.pause?.();
    });
  });
}

function syncIframeActivity(activeSlide=getActiveSlide()){
  slides.forEach(slide => {
    const active = slide === activeSlide && !document.hidden;
    slide.querySelectorAll('iframe').forEach(iframe => {
      if(!iframe.dataset.effectSrc) iframe.dataset.effectSrc = iframe.getAttribute('src') || '';
      if(active){
        if(!iframe.getAttribute('src') && iframe.dataset.effectSrc) iframe.setAttribute('src', iframe.dataset.effectSrc);
      } else if(iframe.getAttribute('src')){
        iframe.removeAttribute('src');
      }
    });
  });
}

const theme10SkipTags = new Set(['STYLE','SCRIPT','BR','HR','DEFS']);
const theme10AtomicTags = new Set(['SVG','CANVAS','IMG','VIDEO','IMAGE-SLOT']);

function theme10ElementChildren(node){
  const out = [];
  for(let child = node?.firstElementChild; child; child = child.nextElementSibling){
    if(!theme10SkipTags.has(child.tagName)) out.push(child);
  }
  return out;
}

function playTheme10Motion(slide){
  if(!slide?.hasAttribute?.('data-deck-active')) return false;
  const wrap = slide?.querySelector?.('.ds-slidewrap');
  const root = wrap?.firstElementChild || wrap;
  if(!root) return false;
  const groups = theme10ElementChildren(root);
  let targets = [];
  groups.forEach(group => {
    const children = theme10ElementChildren(group);
    if(children.length >= 2 && children.length <= 10 && !theme10AtomicTags.has(group.tagName)) targets.push(...children);
    else targets.push(group);
  });
  if(targets.length < 2 || targets.length > 26) targets = groups;
  if(!targets.length) return false;
  targets = targets.map(el => {
    const rect = el.getBoundingClientRect();
    return {el, top:rect.top, left:rect.left};
  }).sort((a,b) => {
    const band = Math.round(a.top / 64) - Math.round(b.top / 64);
    return band !== 0 ? band : a.left - b.left;
  }).map(item => item.el);
  targets.forEach(el => {
    el.classList.remove('ds-anim','ds-fade');
    el.style.removeProperty('--ds-d');
  });
  void root.offsetWidth;
  const step = Math.max(34, Math.min(72, Math.round(620 / targets.length)));
  targets.forEach((el, index) => {
    const position = getComputedStyle(el).position;
    const fade = position === 'absolute' || position === 'fixed' || theme10AtomicTags.has(el.tagName);
    el.style.setProperty('--ds-d', `${50 + index * step}ms`);
    el.classList.add(fade ? 'ds-fade' : 'ds-anim');
  });
  return true;
}

function syncTheme10Motion(activeSlide=getActiveSlide()){
  if(!activeSlide?.querySelector?.('.ds-slidewrap')) return;
  let tries = 0;
  function attempt(){
    if(!activeSlide?.isConnected || !activeSlide.hasAttribute('data-deck-active')) return;
    if(playTheme10Motion(activeSlide)) return;
    if(tries++ < 15) requestAnimationFrame(attempt);
  }
  requestAnimationFrame(attempt);
}

var chartMotionInclude = /chart|plot|axis|bar|bars|column|line|area|stream|trend|slope|spark|curve|donut|pie|ring|radar|rose|polar|funnel|waterfall|matrix|heat|map|mekko|scatter|bubble|treemap|waffle|gauge|meter|rank|score|stack/i;
var chartMotionExclude = /icon|logo|avatar|photo|image|media|slot|decor|ornament|bg|backdrop|button|toggle|nav|caption/i;

function chartMotionClassText(el){
  const value = el?.className;
  if(!value) return '';
  if(typeof value === 'string') return value;
  return value.baseVal || '';
}

function hasAnimatedAncestor(el, boundary){
  let current = el;
  let depth = 0;
  while(current && current !== boundary && depth++ < 4){
    const style = getComputedStyle(current);
    if(style.animationName && style.animationName !== 'none') return true;
    current = current.parentElement;
  }
  return false;
}

function isChartMotionContext(el, boundary){
  if(!chartMotionInclude || !chartMotionExclude) return false;
  let current = el;
  let depth = 0;
  while(current && current !== boundary && depth++ < 5){
    const text = chartMotionClassText(current);
    if(chartMotionInclude.test(text)) return !chartMotionExclude.test(text);
    current = current.parentElement;
  }
  const svg = el.closest?.('svg');
  const rootText = `${boundary?.dataset?.pageKey || ''} ${boundary?.dataset?.propControls || ''} ${boundary?.dataset?.propDefaults || ''}`;
  if(svg && chartMotionInclude.test(rootText) && svg.querySelectorAll('path,polyline,line,rect,circle,ellipse').length >= 3) return true;
  return false;
}

function chartMotionRole(el, boundary){
  if(!isChartMotionContext(el, boundary) || hasAnimatedAncestor(el, boundary)) return '';
  const tag = String(el.tagName || '').toUpperCase();
  const text = chartMotionClassText(el);
  const context = `${chartMotionClassText(el.parentElement)} ${text}`;
  if((tag === 'PATH' || tag === 'POLYLINE' || tag === 'LINE') && getComputedStyle(el).stroke !== 'none') return /area|stream/i.test(context) ? 'area' : 'line';
  if(tag === 'CIRCLE' || tag === 'ELLIPSE') return getComputedStyle(el).stroke !== 'none' ? 'line' : 'point';
  if(tag === 'RECT') return /heat|matrix|waffle|treemap/i.test(context) ? 'cell' : 'bar';
  if(/bar|column|fill|seg|meter|progress/i.test(text)) return /row|rank|funnel|waterfall|dumbbell/i.test(context) ? 'row' : 'bar';
  if(/cell|tile|block|bucket|node|dot|point/i.test(text)) return 'cell';
  return '';
}

function syncChartGrowthMotion(activeSlide=getActiveSlide(), tries=0){
  if(!activeSlide?.isConnected || !activeSlide.hasAttribute('data-deck-active')) return;
  const root = activeSlide?.querySelector?.('.imported-theme-root');
  if(!root) return;
  if(root.dataset.themeKey === 'theme10') return;
  const candidates = [...root.querySelectorAll('svg path,svg polyline,svg line,svg rect,svg circle,svg ellipse,div,span,i,li')];
  let index = 0;
  for(const el of candidates){
    const role = chartMotionRole(el, root);
    if(!role) continue;
    el.dataset.chartMotion = role;
    el.style.setProperty('--chart-motion-i', String(Math.min(index, 24)));
    if(role === 'line' && typeof el.getTotalLength === 'function'){
      try { el.style.setProperty('--chart-motion-len', String(Math.ceil(el.getTotalLength()) || 640)); } catch {}
    }
    index += 1;
    if(index >= 160) break;
  }
  if(index === 0 && tries < 8) requestAnimationFrame(() => syncChartGrowthMotion(activeSlide, tries + 1));
}

function commitSlideIndex(nextIndex){
  if(total <= 0){
    idx=0;
    window.__currentSlideIndex = idx;
    deck.style.transform='translateX(0px)';
    allSlides.forEach(slide => {
      slide.classList.remove('active');
      slide.removeAttribute('data-deck-active');
    });
    syncNav();
    writeStoredSlideIndex(idx);
    dispatchEvent(new CustomEvent('swiss-slide-change', {detail:{index:idx, slide:null}}));
    return;
  }
  idx=nextIndex;
  window.__currentSlideIndex = idx;
  applyDeckTransform();
  const activeSlide = slides[idx];
  allSlides.forEach(slide => {
    const active = slide === activeSlide;
    slide.classList.toggle('active', active);
    if(active) slide.setAttribute('data-deck-active', '');
    else slide.removeAttribute('data-deck-active');
  });
  syncNav();
  const el=slides[idx];
  ensureRuntimeSlideRendered(el);
  window.__releaseInactiveRuntimeSlides?.(el);
  syncSlideTone(el);
  syncActiveEffects(el);
  writeStoredSlideIndex(idx);
  dispatchEvent(new CustomEvent('swiss-slide-change', {detail:{index:idx, slide:el}}));
  if(window.__playSlide) window.__playSlide(idx);
}

function go(n, opts={}){
  blurActiveEditableText();
  if(window.__deckExportLocked && !opts.force) return;
  if(lock)return;
  refreshSlideList();
  if(total <= 0){
    lock=true;
    commitSlideIndex(0);
    requestAnimationFrame(()=>lock=false);
    return;
  }
  const nextIndex=Math.max(0,Math.min(total-1,n));
  const currentSlide=slides[idx];
  const nextSlide=slides[nextIndex];
  const mode = opts.animate === false || nextIndex === idx
    ? 'none'
    : (window.__getPageTransition?.() || 'none');
  if(mode !== 'none' && typeof window.__playPageTransition === 'function' && currentSlide && nextSlide){
    lock=true;
    let committed=false;
    const commit=()=>{
      if(committed) return;
      committed=true;
      commitSlideIndex(nextIndex);
    };
    Promise.resolve(window.__playPageTransition(mode, currentSlide, nextSlide, nextIndex >= idx ? 1 : -1, commit))
      .catch(error => console.warn('[page transition]', error))
      .finally(() => {
        commit();
        requestAnimationFrame(()=>lock=false);
      });
    return;
  }
  lock=true;
  commitSlideIndex(nextIndex);
  requestAnimationFrame(()=>lock=false);
}

function moveSlide(fromIndex, insertIndex){
  refreshSlideList();
  if(fromIndex < 0 || fromIndex >= total) return false;
  const activeSlide = slides[idx];
  const [slide] = slides.splice(fromIndex, 1);
  if(fromIndex < insertIndex) insertIndex -= 1;
  insertIndex = Math.max(0, Math.min(slides.length, insertIndex));
  slides.splice(insertIndex, 0, slide);
  slides.forEach(item => deck.appendChild(item));
  refreshSlideList();
  idx = Math.max(0, slides.indexOf(activeSlide));
  window.__currentSlideIndex = idx;
  renderNav();
  layoutDeck();
  const active = slides[idx];
  slides.forEach((slide, index) => {
    const isActive = index === idx;
    slide.classList.toggle('active', isActive);
    if(isActive) slide.setAttribute('data-deck-active', '');
    else slide.removeAttribute('data-deck-active');
  });
  ensureRuntimeSlideRendered(active);
  window.__releaseInactiveRuntimeSlides?.(active);
  syncSlideTone(active);
  syncActiveEffects(active);
  window.__deckViewModel?.setSlideOrder?.(slides.map((item, index) => item.dataset.vmSlideId || `slide-${index + 1}`));
  persistCatalogSlideOrder();
  dispatchEvent(new CustomEvent('swiss-slide-reorder', {detail:{from:fromIndex, to:insertIndex, index:idx}}));
  dispatchEvent(new CustomEvent('swiss-slide-change', {detail:{index:idx, slide:active}}));
  if(window.__playSlide) window.__playSlide(idx);
  return true;
}

function updateAfterCatalogMutation(previousActiveSlide, preferredIndex, detail={}){
  refreshSlideList();
  const activeIndex = slides.indexOf(previousActiveSlide);
  idx = total > 0
    ? (activeIndex >= 0 ? activeIndex : Math.max(0, Math.min(total - 1, preferredIndex || 0)))
    : 0;
  renderNav();
  layoutDeck();
  commitSlideIndex(idx);
  persistCatalogSlideOrder();
  if(overviewOn && !detail.skipOverviewRebuild) buildOverview();
  dispatchEvent(new CustomEvent('swiss-slide-catalog-change', {detail}));
}

function moveCatalogSlide(fromIndex, insertIndex){
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  if(fromIndex < 0 || fromIndex >= catalogSlides.length) return false;
  const previousActiveSlide = slides[idx];
  const [slide] = catalogSlides.splice(fromIndex, 1);
  if(fromIndex < insertIndex) insertIndex -= 1;
  insertIndex = Math.max(0, Math.min(catalogSlides.length, insertIndex));
  catalogSlides.splice(insertIndex, 0, slide);
  catalogSlides.forEach(item => deck.appendChild(item));
  updateAfterCatalogMutation(previousActiveSlide, idx, {type:'reorder', from:fromIndex, to:insertIndex, skipOverviewRebuild:true});
  dispatchEvent(new CustomEvent('swiss-slide-reorder', {detail:{from:fromIndex, to:insertIndex, index:idx}}));
  return true;
}

function deleteCatalogSlide(catalogIndex){
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  if(catalogSlides.length <= 1) return false;
  const slide = catalogSlides[catalogIndex];
  if(!slide) return false;
  const previousActiveSlide = slides[idx];
  const preferredIndex = Math.max(0, slides.indexOf(slide));
  const slideId = getSlideVmId(slide, allSlides.indexOf(slide));
  const deleted = getSlideStateSet('deletedSlides');
  const skipped = getSlideStateSet('skippedSlides');
  deleted.add(slideId);
  skipped.delete(slideId);
  window.__deckViewModel?.setDeletedSlides?.([...deleted]);
  window.__deckViewModel?.setSkippedSlides?.([...skipped]);
  slide.remove();
  updateAfterCatalogMutation(previousActiveSlide === slide ? null : previousActiveSlide, preferredIndex, {type:'delete', slideId});
  return true;
}

function toggleCatalogSlideSkipped(catalogIndex){
  refreshSlideList();
  const catalogSlides = getCatalogSlides();
  const slide = catalogSlides[catalogIndex];
  if(!slide) return false;
  const slideId = getSlideVmId(slide, allSlides.indexOf(slide));
  const skipped = getSlideStateSet('skippedSlides');
  const currentlySkipped = skipped.has(slideId);
  if(!currentlySkipped && slides.length <= 1) return false;
  const previousActiveSlide = slides[idx];
  const preferredIndex = Math.max(0, slides.indexOf(slide));
  if(currentlySkipped) skipped.delete(slideId);
  else skipped.add(slideId);
  window.__deckViewModel?.setSkippedSlides?.([...skipped]);
  updateAfterCatalogMutation(previousActiveSlide === slide ? null : previousActiveSlide, preferredIndex, {type:currentlySkipped ? 'unskip' : 'skip', slideId});
  return true;
}

let overviewOn=false;
let overviewDragFrom=null, overviewDidDrag=false, overviewDropIndex=null;
let overviewThumbObserver=null;
let overviewThumbQueue=[];
let overviewThumbScheduled=false;
let overviewScrollQueued=false;
let overviewCardUid=0;
const OVERVIEW_ASPECT_W=16;
const OVERVIEW_ASPECT_H=9;
const ov=document.createElement('div');
ov.id='overview';
ov.style.cssText='position:fixed;inset:0;z-index:100;background:rgba(250,250,248,.96);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:4vh 4vw';

function getOverviewCards(grid){
  return Array.from(grid.querySelectorAll('[data-overview-card="true"]'));
}

function getOverviewSlideKey(slide){
  if(!slide) return '';
  if(!slide.dataset.overviewId) slide.dataset.overviewId = 'overview-' + (++overviewCardUid);
  return slide.dataset.overviewId;
}

function captureOverviewCardRects(grid){
  const rects = {};
  getOverviewCards(grid).forEach(card => {
    rects[card.dataset.slideKey || card.dataset.index] = card.getBoundingClientRect();
  });
  return rects;
}

function captureOverviewThumbs(grid){
  const thumbs = {};
  getOverviewCards(grid).forEach(card => {
    const key = card.dataset.slideKey || card.dataset.index;
    const wrap = card.querySelector('[data-overview-thumb="true"]');
    if(key && wrap?.dataset.overviewRendered === 'true') thumbs[key] = wrap.cloneNode(true);
  });
  return thumbs;
}

function animateOverviewFlow(grid, fromRects){
  if(!fromRects) return;
  requestAnimationFrame(() => {
    getOverviewCards(grid).forEach(card => {
      const from = fromRects[card.dataset.slideKey || card.dataset.index];
      if(!from) return;
      const to = card.getBoundingClientRect();
      const dx = from.left - to.left;
      const dy = from.top - to.top;
      if(Math.abs(dx) < 1 && Math.abs(dy) < 1) return;
      card.style.transition = 'none';
      card.style.transform = `translate(${dx}px, ${dy}px)`;
      requestAnimationFrame(() => {
        card.style.transition = 'outline-color .2s,opacity .2s,transform .32s cubic-bezier(.2,.8,.2,1)';
        card.style.transform = 'translate(0, 0)';
      });
    });
  });
}

function getOverviewDropSlot(e, grid){
  const cards = getOverviewCards(grid);
  if(!cards.length) return null;
  const x = e.clientX;
  const y = e.clientY;
  let best = null;
  cards.forEach((card, index) => {
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const dx = Math.max(rect.left - x, 0, x - rect.right);
    const dy = Math.max(rect.top - y, 0, y - rect.bottom);
    const distance = dx * dx + dy * dy;
    if(!best || distance < best.distance) best = {card, index, rect, distance, before:x < cx, cy};
  });
  if(!best) return null;
  return {
    index: best.before ? best.index : best.index + 1,
    kind: 'vertical',
    x: best.before ? best.rect.left : best.rect.right,
    y: best.rect.top,
    h: best.rect.height,
  };
}

function showOverviewDropMarker(marker, slot, grid){
  const gridRect = grid.getBoundingClientRect();
  marker.style.display = 'block';
  marker.style.left = (slot.x - gridRect.left - 2) + 'px';
  marker.style.top = (slot.y - gridRect.top) + 'px';
  marker.style.width = '4px';
  marker.style.height = slot.h + 'px';
}

function hideOverviewDropMarker(marker){
  marker.style.display = 'none';
  overviewDropIndex = null;
}

function getOverviewSourceSize(){
  const width = Math.max(320, deckW || innerWidth);
  const height = Math.max(180, deckH || width * OVERVIEW_ASPECT_H / OVERVIEW_ASPECT_W);
  return {
    width,
    height,
  };
}

function fitOverviewThumb(wrap, sourceSize=getOverviewSourceSize()){
    const clone = wrap.firstElementChild;
    if(!clone) return;
    const {width, height} = sourceSize;
    wrap.style.aspectRatio = `${OVERVIEW_ASPECT_W} / ${OVERVIEW_ASPECT_H}`;
    clone.style.width = `${width}px`;
    clone.style.height = `${height}px`;
    const rect = wrap.getBoundingClientRect();
    if(!rect.width || !rect.height) return;
    const scale = Math.min(rect.width / width, rect.height / height);
    const x = (rect.width - width * scale) / 2;
    const y = (rect.height - height * scale) / 2;
    clone.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
}

function fitOverviewThumbnails(){
  const sourceSize = getOverviewSourceSize();
  ov.querySelectorAll('[data-overview-thumb="true"]').forEach(wrap => fitOverviewThumb(wrap, sourceSize));
}

function scheduleOverviewFit(){
  requestAnimationFrame(fitOverviewThumbnails);
}
window.__scheduleOverviewFit = scheduleOverviewFit;
window.__fitOverviewThumbnails = fitOverviewThumbnails;

function teardownOverviewThumbs(){
  overviewThumbObserver?.disconnect();
  overviewThumbObserver=null;
  overviewThumbQueue=[];
  overviewThumbScheduled=false;
}

function renderOverviewThumb(wrap){
  if(!overviewOn || !wrap?.isConnected || wrap.dataset.overviewRendered === 'true') return;
  const card = wrap.closest('[data-overview-card="true"]');
  const slide = getCatalogSlides()[Number(card?.dataset.index)];
  if(!slide) return;
  ensureRuntimeSlideRendered(slide);
  wrap.replaceChildren();
  const {width, height} = getOverviewSourceSize();
  const clone=slide.cloneNode(true);
  clone.style.cssText='width:'+width+'px;height:'+height+'px;transform-origin:top left;position:absolute;top:0;left:0;pointer-events:none';
  wrap.appendChild(clone);
  wrap.dataset.overviewRendered='true';
  fitOverviewThumb(wrap, {width, height});
}

function scheduleOverviewThumbQueue(){
  if(overviewThumbScheduled) return;
  overviewThumbScheduled=true;
  setTimeout(() => {
    overviewThumbScheduled=false;
    let count=0;
    while(overviewOn && overviewThumbQueue.length && count < 2){
      const wrap = overviewThumbQueue.shift();
      if(wrap?.isConnected) renderOverviewThumb(wrap);
      count++;
    }
    if(overviewOn && overviewThumbQueue.length) scheduleOverviewThumbQueue();
  }, 36);
}

function queueOverviewThumb(wrap, priority=false){
  if(!wrap || wrap.dataset.overviewRendered === 'true') return;
  if(wrap.dataset.overviewQueued === 'true'){
    if(priority){
      const existing = overviewThumbQueue.indexOf(wrap);
      if(existing > 0){
        overviewThumbQueue.splice(existing, 1);
        overviewThumbQueue.unshift(wrap);
      }
    }
    return;
  }
  wrap.dataset.overviewQueued='true';
  if(priority) overviewThumbQueue.unshift(wrap);
  else overviewThumbQueue.push(wrap);
  scheduleOverviewThumbQueue();
}

function queueVisibleOverviewThumbs(){
  if(!overviewOn) return;
  const rootRect = ov.getBoundingClientRect();
  ov.querySelectorAll('[data-overview-thumb="true"]').forEach(wrap => {
    const rect = wrap.getBoundingClientRect();
    const visible = rect.bottom >= rootRect.top && rect.top <= rootRect.bottom;
    const near = rect.bottom >= rootRect.top - 500 && rect.top <= rootRect.bottom + 500;
    if(visible) queueOverviewThumb(wrap, true);
    else if(near) queueOverviewThumb(wrap);
  });
}

function observeOverviewThumbs(grid){
  overviewThumbObserver?.disconnect();
  overviewThumbObserver = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if(entry.isIntersecting) queueOverviewThumb(entry.target);
    });
  }, {root: ov, rootMargin: '600px 0px', threshold: 0.01});
  grid.querySelectorAll('[data-overview-thumb="true"]').forEach(wrap => overviewThumbObserver.observe(wrap));
}

function scrollOverviewToCurrent(){
  requestAnimationFrame(() => {
    const activeSlide = slides[idx];
    const catalogIndex = getCatalogSlides().indexOf(activeSlide);
    const card = catalogIndex >= 0 ? ov.querySelector(`[data-overview-card="true"][data-index="${catalogIndex}"]`) : null;
    card?.scrollIntoView({block:'center', inline:'nearest'});
    queueVisibleOverviewThumbs();
  });
}

    e.preventDefault();
    e.dataTransfer.dropEffect='move';
    overviewDropIndex = slot.index;
    showOverviewDropMarker(dropMarker, slot, grid);
  });
  grid.addEventListener('dragleave', e=>{
    if(!e.relatedTarget || !grid.contains(e.relatedTarget)) hideOverviewDropMarker(dropMarker);
  });
  grid.addEventListener('drop', e=>{
    const slot = getOverviewDropSlot(e, grid);
    if(overviewDragFrom===null || !slot) return;
    e.preventDefault();
    e.stopPropagation();
    const beforeRects = captureOverviewCardRects(grid);
    const beforeThumbs = captureOverviewThumbs(grid);
    overviewDidDrag=moveCatalogSlide(overviewDragFrom, slot.index);
    overviewDragFrom=null;
    overviewDropIndex=null;
    buildOverview(overviewDidDrag ? beforeRects : null, overviewDidDrag ? beforeThumbs : null);
  });
  ov.appendChild(grid);
  observeOverviewThumbs(grid);
  scheduleOverviewFit();
  animateOverviewFlow(grid, fromRects);
  requestAnimationFrame(queueVisibleOverviewThumbs);
}

function toggleOverview(){
  overviewOn=!overviewOn;
  document.body.classList.toggle('overview-on', overviewOn);
  if(overviewOn){ov.style.display='block';buildOverview();fitOverviewThumbnails();scrollOverviewToCurrent();}
  else{teardownOverviewThumbs();hideOverviewContextMenu();ov.style.display='none';}
}
window.__toggleOverview = toggleOverview;

ov.addEventListener('scroll', () => {
  if(!overviewOn || overviewScrollQueued) return;
  overviewScrollQueued=true;
  requestAnimationFrame(() => {
    overviewScrollQueued=false;
    queueVisibleOverviewThumbs();
  });
}, {passive:true});

addEventListener('resize', () => {
  if(overviewOn) scheduleOverviewFit();
});

const DECK_NEXT_KEYS=new Set(['ArrowRight','PageDown','ArrowDown']);
const DECK_PREV_KEYS=new Set(['ArrowLeft','PageUp','ArrowUp']);


function handleDeckKeyNavigation(e,{allowSpace=true}={}){
  if(window.__deckExportLocked){e.preventDefault();return;}
  if(e.key==='Escape'){e.preventDefault();toggleOverview();return;}
  if(overviewOn)return;
  if(DECK_NEXT_KEYS.has(e.key)||(allowSpace&&e.key===' ')){
    e.preventDefault();
    if(window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+1);
    return;
  }
  if(DECK_PREV_KEYS.has(e.key)){e.preventDefault();go(idx-1);return;}
  if(e.key==='Home'){e.preventDefault();go(0);return;}
  if(e.key==='End'){e.preventDefault();go(total-1);}
}
window.__handleDeckKeyNavigation=handleDeckKeyNavigation;

addEventListener('keydown',e=>{
  if(isDeckTypingTarget(e.target)) return;
  handleDeckKeyNavigation(e);
});

function isDeckTypingTarget(target){
  return !!target?.closest?.('input,textarea,select,[contenteditable="true"],[contenteditable="plaintext-only"],[role="textbox"]');
}

let tx=0,ty=0;
addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
addEventListener('touchend',e=>{
  const dx=(e.changedTouches[0].clientX-tx);
  const dy=(e.changedTouches[0].clientY-ty);
  if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)){
    if(dx<0 && window.__pipeAdvance && window.__pipeAdvance()) return;
    go(idx+(dx<0?1:-1));
  }
},{passive:true});

const initialSlideParam = new URLSearchParams(location.search).get('slide');
const storedSlide = readStoredSlideIndex();
const initialSlide = initialSlideParam ? Number(initialSlideParam) - 1 : (storedSlide ?? 0);
layoutDeck();
go(Number.isFinite(initialSlide) ? initialSlide : 0, {animate:false});
